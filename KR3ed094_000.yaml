急必齘齒可與此湯金匱痙病問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食此湯主之同上腹滿脈數而滑者實此有宿食下之愈宜此湯同上下痢不欲食者以宿食也當下之愈此湯主之同上脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可下之宜此湯傷寒可下證下利已差至其年月日時復發者以病不盡故也當下之宜此湯同上下利三部脈皆平按之心下堅者急下之金匱嘔吐下利脈遲而滑者實也利未欲止急下之同上下利脈反滑者當有所去下乃愈宜此湯同上病解能食七八日更發熱者為胃實宜此湯同上産後産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜此湯熱在裡結在膀胱也同上熱邪傳裡腹中堅結而有燥屎者主之溫疫論大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一兩沸分溫再服得下余勿服大陷胸湯太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃此湯主之傷寒論太陽下傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者主之向上傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者主之同上太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者主之同上大黃六兩去皮芒硝一升甘遂一錢匕上三味以水六升先煮取大黃二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服大陷胸丸結胸者項亦強如柔痓狀下之則和宜之傷寒大黃半斤葶藶半升熬芒硝半升杏仁半升去皮尖熬黑上四味搗篩二味內杏仁芒硝含研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法大青龍湯太陽中風脈浮緊發熱惡寒身疼痛不出汗而煩躁者主之若脈微弱汗出惡風者不可服之服之厥逆筋惕肉瞤此為逆也傷寒論太陽中傷寒脈浮緩身不疼但重乍有輕時無少陰症者發之同上病溢飲者當發其汗主之小青龍湯亦主之金匱痰飲麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十個去皮尖生薑三兩擘大棗十枚擘石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫內諸藥煎取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服若復服汗多亡陽遂逆虛惡風煩躁不得眠也大建中湯心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近者宜此湯金匱寒疝蜀椒二合去汗乾薑四兩人參二兩上三味以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜溫覆之大建中湯治虛勞寒澼飲在脅下泱泱有聲已如從一邊下決決然有頭並沖皮起引兩乳內痛裡急善夢失精氣短目䀮䀮惚惚多忘方千金方蜀椒二合半夏一升甘草生薑二兩人參三兩飴糖八兩上六味㕮咀以水一斗煮三升去滓內糖溫服七合裡急拘引加芍藥桂心各三兩手足厥腰背冷加附子一枚勞者加黃耆一兩大建中湯治五勞七傷小腹急臍下彭亨兩脅脹滿腰脊相引鼻口乾燥目暗䀮䀮憒憒不樂胸中氣急逆不下食飲莖中策策痛小便黃赤尿有餘瀝夢與鬼神交通失精驚恐虛乏方飴糖半斤黃耆遠志當歸千金翼無澤瀉各三兩芍藥人參龍骨甘草各二兩生薑八兩大棗十一枚上十一味㕮咀以水一斗煮取二升半湯成內糖令煬一服八合消息又一服深師無飴糖遠志澤瀉龍骨有桂心六兩半夏一升附子一枚大半夏湯胃反嘔吐者主之金匱嘔吐治胃反不受食食已即嘔吐方千金治嘔心下痞硬者外臺半夏二升洗浣用人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮取二升半溫服一升余分再服千金有白朮一升生薑三兩大半夏湯肉極虛寒脾咳其狀右脅下痛陰陰引肩背痛不可以動動則咳腹脹滿留飲痰癖大小便不利小腹切痛膈上寒主之外臺半夏一升洗白朮茯苓人參甘草炙附子炮橘皮各二兩生薑八兩桂心三兩上九味以水一斗煮三升去滓分為四服忌羊肉餳桃李雀肉生蔥海藻菘菜豬肉冷水大半夏湯胃反不食食已嘔吐同上人參一兩茯苓四兩青竹茹五兩大黃六兩橘皮乾薑各三兩澤瀉甘草炙桂心各二兩上九味切以水八升煮取三升服七合日三夜一已利去大黃用泉水東流水尤佳忌海藻菘菜生蔥大酢千金備急張文仲同方中無半夏未詳其名大半夏湯治胃中虛冷腹滿塞下氣方千金方半夏一升大棗二十枚甘草附子當歸人參厚朴茯苓枳實各二兩桂心五兩生薑八兩蜀椒二百粒上十二味㕮咀以水一斗煮取三升分二服大黃湯療兩眼痛方外臺大黃四兩芍藥五兩細辛甘草炙各四兩黃芩二兩上五味切以水七升煮取二升半溫分為三服甚妙大黃牡丹湯腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下之金匱按謂小便如淋則當不自調令見其病小便澀數此書小便自調疑有脫字矣腸癰其病之狀小腹重而微強抑之即痛小便似淋時時汗出病源候論腸癰之病少腹痞堅或偏在膀胱左右其色或白堅大如掌熱小便欲調時自汗出其脈遲堅者未成膿可下之當有血脈數膿成不可下千金方大黃四兩牡丹一兩桃仁五十枚瓜子半升芒硝三兩上五味以水六升煮取一升去滓內芒硝再煎沸頓服之有膿當下如無膿當下血正宗不用瓜子有白芥二錢名大黃湯大黃附子湯脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜此湯寒氣厥逆赤丸主之金匱腹滿大黃三兩附子三枚細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服如人行四五里進一服大黃黃連瀉心湯太陽病醫發汗遂發熱惡寒因復下下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈傷寒論太陽下傷寒心下痞按之濡其脈關上浮者主之同上傷寒大下後發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜此湯同上大黃二兩黃連一兩上二味以麻沸湯二升漬之須更絞去滓分溫再服按臣億等看詳大黃黃連瀉心湯諸本皆二味又後附子瀉心湯用大黃黃連黃芩附子恐是前方中亦有黃芩後但加附子也故後云附子瀉心湯本方加附子也大黃甘遂湯婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也主之金匱婦人大黃四兩甘遂二兩阿膠二兩上三味以水三升煮取一升頓服之其血當下大黃硝石湯黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜此湯同上黃疸大黃黃蘗硝石各四兩梔子十五枚上四味以水六升煮取三升去滓內硝石更煮取一升頓服大黃甘草湯食已即吐者用此方金匱嘔吐治吐水外臺大黃四兩甘草一兩上二味以水三升煮取一升分溫再服大黃蟅蟲丸五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛主之金匱血痹大黃十分熬黃芩二兩甘草三兩桃仁一升芍藥四兩乾漆一分乾地黃十兩虻蟲一升水蛭百枚蠐螬一升蟅蟲半升杏仁一升上十二味末之煉蜜和丸小豆大酒飲服五丸日三服大連翹飲治小兒傷風感冒發熱痰塞風熱丹毒腫痛頸項有核腮赤癰癤眼目赤腫口舌生瘡咽喉疼痛小便淋瀝胎毒痘疹餘毒一切熱毒並治之萬病回春連翹藋麥滑石車前子牛蒡子赤芍各八分梔子木通當歸防風各四分柴胡黃芩荊芥各一錢二分蟬退五分甘草一錢六分上銼竹葉十個燈心十莖水煎不拘時溫服大補中當歸湯産後虛損不足腹中拘急或溺血少腹苦痛或從高墮下犯內及金瘡血多內傷男子亦宜服之千金方當歸續斷桂枝川芎各一兩乾薑麥門冬各三兩芍藥四兩吳茱萸一升乾地黃六兩白芷各二兩大棗四十枚甘草二兩上十二味㕮咀以酒一斗漬藥一宿明旦以水一斗合煮取五升去滓分五服日三夜二有入黃耆二兩益佳大竹葉湯療虛勞客熱百病後虛勞煩擾不得眠臥骨間勞熱面目青黃口乾躁煩不自安短氣少食不得味縱食不生肌膚胸中痰熱煩滿潰悶主之外臺甘草二兩炙小麥五合完用黃耆二兩人參二兩知母二兩大棗二十枚擘半夏三兩栝蔞一兩粳米一升黃芩一兩桂心二兩竹葉切一兩當歸二兩龍骨三兩前胡芍藥各二兩麥門冬六合去心生薑四兩上十八味切用東流水一斗煮取五升去滓分服一升日三夜二不過兩劑如湯沃雪效忌海藻菘菜羊肉餳生蔥大定心湯治心氣虛悸恍惚多忘或夢寤驚魘志少不足千金方人參茯苓茯神遠志赤石脂龍骨乾薑當歸甘草白朮芍藥桂心紫菀防風各二兩大棗三十枚上十五味㕮咀以水一斗二升煮取三升半分五服日二夜二大防風湯治三陰之氣不足風邪乘之兩膝作痛久則膝愈大而腿愈細因名曰鶴膝風乃敗症也非此方不能治又治附骨疽皮色不變大腿通腫疼痛無奈及痢後腳痛緩弱不能行或腿膝腫痛外科正宗人參二錢防風白朮附子當歸白芍川芎杜仲黃耆羌活牛膝甘草熟地黃各一錢水二鍾薑三片煎八分食前服大犀角湯療腳氣毒衝心變成水身體遍腫悶絶死者外臺犀角二兩旋覆花二兩崔氏無白朮二兩桂枝二兩防己二兩黃芩三兩生薑一兩香豉一升橘皮三兩茯苓三兩前胡四兩桑根白皮四兩紫蘇莖一握大棗十枚擘上十四味切以水九升浸一宿煮取二升七合或水一斗煮取三升分三服服相去如人行十里久以下氣利小便為度若得氣下小便利腳腫即消能食若服湯訖不下氣急不定仍服後湯忌桃李雀肉生蔥醋物大溫脾湯療脾胃中冷不得食又谷不消向向脹滿時若下痢方外臺黃芩人參芍藥附子炮各一兩甘草炙乾薑大黃厚朴炙各二兩上八味切以水八升煮取二升八合分為二服亦可四服得下佳不下須更復服甚良忌豬肉海藻菘菜大青湯治傷寒熱病不解下利因篤聖劑大青阿膠銼炒燥各一兩山梔子赤石脂甘草炙銼各半兩上五味粗搗篩每服五錢匕水一錢半豉一百粒薤白五寸切同煎至八分去滓溫服不拘時候大七氣湯治積聚癥瘕隨氣上下心腹㽱痛上氣窒塞小腹脹滿大小便不利準繩治六聚狀如癥瘕隨氣上下發作有時心腹㽱痛攻刺腰脅上氣窒塞喘咳滿悶小腹䐜脹大小便不通或復泄瀉淋瀝無度濟生方京三稜蓬莪朮青皮陳皮各去白桔梗藿香葉肉桂不見火益知仁各一兩半甘草炙七錢半香附炒去毛一兩半上㕮咀為末每服五錢水二盞煎至一盞食前溫服大保元湯治項陷根窠雖紅而皮軟且薄血有餘而氣不足也保赤全書黃耆三錢人參一錢五分甘草一錢川芎一錢官桂一分白朮炒一錢上加薑棗水煎服如氣不行去桂加木香若不食加人乳半鍾又方加白何首烏黑豆水煮大三五七湯治頭風口喎目斜耳聾方千金方天雄細辛各三兩山茱萸乾薑各五兩薯蕷防風各七兩上六味治下篩清酒服五分匕日再不知稍加千金翼云又治面骨痛疼大豬膽汁方陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎而通之若土瓜根及此方皆可導傷寒大豬膽一枚瀉汁和少許法醋以灌穀道內如一食頃當大便出宿食惡物甚效大便出血及口鼻皆血出血上心胸氣急此勞熱所致之方千金方生地八兩蒲黃一升地骨五兩黃芩芍藥生竹茹各三兩上六味㕮咀以水八升煮取二升七合分溫三服大烏頭煎腹痛脈弦而緊弦則衛氣不行即惡寒緊則不飲食邪正相搏即為寒疝繞臍痛若發則自汗出手足厥冷其脈沉弦者主之金匱寒疝烏頭大者五枚熬去皮不㕮咀上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人五合不瘥明日更服不可一日再服小柴胡湯傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者主之傷寒論太陽中血弱氣盡腠理開邪氣因入之與正氣相搏結於胸下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛心下邪高痛下故便嘔也此湯主之服此湯已渴者屬陽明以法治之同上太陽病十日以去脈浮細而嗜臥外已解也設胸滿脅痛者與此湯同上得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便黃者與此湯後必下重本渴飲水而嘔此湯不中與也食谷者噦同上傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者主之同上傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者此湯主之同上傷寒中風有柴胡證但見一證便是不必悉具凡服此湯病證而下之若此湯證不罷者復與此湯蒸蒸而振卻發熱汗出而解同上太陽病過經必十餘日反二三下之後四五日此湯證仍在者先與此湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈同上傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本此湯證下之以不得利今反利者知醫以丸藥下之此非其治也潮熱者實也先宜服此湯以解外後以柴胡加芒硝湯主之同上婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時此湯主之同太陽下傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與此湯設不了了者得屎而解同上婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而瀉之同上傷寒五六日嘔而發熱者此湯證具而以他藥下之此湯證仍在者復與此湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞此湯不中與之宜半夏瀉心湯同上陽明病大便溏小便自可胸脅滿不去者與此湯同上陽明陽明病脅下硬滿不大便而嘔舌上白胎者可與此湯上焦得通津液得下胃氣因和身濈然而汗出解同上陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與此湯脈但浮無餘證者與麻黃湯若不屎腹滿加噦者不治同上本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與此湯同上嘔而發熱者主之同上厥陰傷寒瘥以後更發熱者主之脈浮者以汗解之脈沉實者以下解之同陰陽易諸黃腹痛而嘔者宜此湯金匱問曰新産婦人有三病一者病痓二者鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痓亡血復汗寒多故令鬱冒亡津液胃燥故大便難産婦鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒處欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食者主之同上治婦人在草蓐自發露得風四肢苦煩熱頭痛者與此湯頭不痛但煩者三物黃芩湯主之同上柴胡半斤黃芩人參各三兩甘草炙生薑各二兩切半夏半斤洗大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔者去半夏人參加栝蔞實一枚若渴去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩傷寒六書加陳皮芍藥柴胡雙解散又全生集方加枳實桔梗二味小承氣湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與此湯微和胃氣勿令之大泄下傷寒陽明陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與此湯湯入腹中轉矢氣者此有燥屎也乃可攻之若不轉矢氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以此湯和之不轉矢氣者慎不可攻也同上陽明病其人多汗以津液外出胃中燥大便必硬硬則讝語此湯主之若一服讝語止者更莫復服同上陽明病讝語發潮熱脈滑而疾者此湯主之因與此湯一升腹中轉矢氣者更服一升不轉氣者勿更與之明日又不便脈反微澀者裡虛也為難治不可更與此湯也同上太陽病若吐若下若發汗後微煩小便數大便因硬者與此湯和之愈同上太陽得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以此湯少少與微和之令小安至六日與此湯一升若不大便六七日少者雖不受食一云不大便但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯同上傷寒不大便六七日頭痛有熱者與此湯其小便清者知不在裡仍在表也鬚髮汗也同太陽下利讝語者有燥屎也宜此湯同上厥陰治大便不通噦數讝語金匱熱邪傳裡但上焦痞滿者宜此湯溫疫大黃四兩酒洗厚朴二兩炙去皮枳實三枚大者炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若不更衣者勿服之小青龍湯傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者主之傷寒太陽傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也主之同上病溢飲者當發其汗大青龍湯主之此湯亦主之金匱肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之三日一劑可至三四劑此先服此湯一劑乃進同上咳逆倚息不得臥此湯主之此湯下已多唾口燥乍脈沉尺脈微手足厥逆氣從少腹上衝胸咽手足痹其面翕翕發熱如醉狀因腹下流陰股小便難時覆冒者茯苓桂枝五味甘草湯治其氣衝沖氣即低而反更咳胸滿者用桂枝茯苓五味甘草湯去桂加乾薑細辛以治其咳滿咳滿即止而復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為攴飲也攴飲者法當冒冒者必嘔嘔者復半夏以去其水水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃髮其陽故也若面熱如醉此為胃上衝熏其面加大黃以利之金匱痰飲婦人吐涎沫醫反下之心下即痞當先治其吐涎沫此湯主之同上婦人麻黃去節芍藥三兩乾薑三兩五味子半升甘草三兩去皮半夏半升洗細辛三兩桂枝三兩去皮上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升若渴去半夏加栝蔞根三兩若微利去麻黃加芫花如一雞子熬令赤色若噎者去麻黃加附子一枚炮若小便不利小腹滿者去麻黃加茯苓四兩若喘去麻黃加杏仁半斤去皮尖小青龍加石膏湯肺脹咳而上氣煩躁而喘脈浮者心下有水此湯主之千金證治同外臺如脅下痛引缺盆肺痿篇麻黃芍藥桂枝細辛甘草乾薑各三兩五味子半夏各半兩石膏二兩上九味以水一斗先煮麻黃去上沫內諸藥煮取三升強人服一升羸者減之日三服小兒服四合小建中湯傷寒陽脈澀陰脈弦法當腹中急痛者先與此湯不瘥者與小柴胡湯主之傷寒太陽傷寒二三日心中悸而煩者主之同上虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥者主之金匱男子黃小便自利當與此湯同上婦人腹中痛主之同上凡男子因積勞虛損或大病後不復常苦四體沉滯骨肉疼酸吸吸少氣行動喘息或小腹拘急腰背強痛心中虛悸咽乾唇燥面體少色或飲食無味陰陽虛弱悲憂慘戚多臥少起久者積年輕者百日漸致瘦削王臟氣竭則難可復振治之外臺桂枝三兩去皮甘草二兩炙大棗十二枚擘芍藥六兩生薑三兩切膠飴一升上六味以水七升煮取三升去滓內飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也小陷胸湯小結胸病正在心下按之則痛脈浮滑者主之傷寒太陽太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也同上黃連一兩半夏半升洗栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去滓內諸藥煮取二升去滓分溫三服小半夏湯嘔家本渴渴者為欲解今反不渴心下有攴飲故也此湯主之千金黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者主之金匱諸嘔吐谷不得下者主之同上有人常積氣結而死其心上暖以此湯少許汁入口遂活千金半夏一升生薑半升上二味以水七升煮取一升半分溫再服小半夏加茯苓湯卒嘔吐心下痞膈間有水眩悸者主之金匱先渴後嘔為水停心下此屬飲家此湯主之同上半夏一升生薑半斤茯苓三兩一法曰四兩上三味以水七升煮取一升五合分溫再服小品射干湯主春冬傷寒秋夏中冷咳嗽曲拗不後氣息喉鳴音啞失聲干嗽無唾喉中如硬者方外臺半夏麻黃射干杏仁乾薑甘草紫菀桂枝吳萸當歸橘皮獨活若病久者初服可大黃二兩秋夏日暴冷及天行暴寒熱伏於內宜生薑四兩代乾薑除吳茱萸用枳殼三兩小品葛根湯療妊娠臨月因發風痙忽悶憒不識人吐逆眩倒小醒復發名為子癇主痓冒方外臺貝母去心葛根丹皮去心木防己防風當歸芎藭肉桂茯苓澤瀉甘草炙各二兩獨活石膏碎人參各三兩上十四味切以水九升煮取三升分二服貝母令人易産若未臨月者升麻代之忌海藻菘菜酢小品當歸湯療心腹絞痛諸虛冷氣滿方同上當歸三兩乾薑四兩甘草三兩炙芍藥二兩厚朴三兩炙黃耆二兩蜀椒一兩半夏二兩洗肉桂二兩人參三兩上十味切以水一斗煮取三升二合強人可一升羸人服八合大冷者加附子一枚炮忌海藻菘菜羊肉餳生蔥小品地膚湯療下焦諸結熱小便赤黃數起出少大痛或便血溫病後餘熱及霍亂後當風取熱過度飲酒房勞及步行冒熱冷飲逐熱熱結下焦及乳石熱動關格少腹堅胞脹如斗大諸淋服之即通方同上地膚草二兩知母豬苓去皮瞿麥黃芩升麻通草各二兩海藻一兩葵子一升枳實二兩炙上十味切以水九升煮取三升分為三服大小便皆閉者加大黃三兩婦人房勞腎中有熱小便難不利腹滿痛脈沉細者加豬腎一具小品黃耆湯療虛勞少氣小便過多者同上黃耆二兩麥門冬二兩去心大棗三十枚擘芍藥二兩乾地黃二兩黃芩一兩桂心二兩生薑二兩當歸二兩甘草一兩炙上十味切以水九升煮取三升去滓分三服忌海藻菘菜生蔥蕪荑豬肉冷水一方黃連有一兩小品黃耆湯療虛勞胸中客熱冷癖痞滿宿食不消吐噫脅間水氣或流飲腸鳴不生肌肉頭痛上重下輕目視䀮䀮惚惚志損常躁熱臥不得安少腹急小便赤餘瀝臨事不起陰下濕或小便白濁多方同上黃耆三兩人參一兩芍藥二兩生薑半斤桂肉三兩大棗十四枚當歸一兩甘草一兩炙上八味切以水一斗煮取四升分四服有寒加厚朴二兩忌生蔥海藻菘菜小續命湯治卒中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情悶亂諸風服之皆驗不令人虛方千金麻黃防己崔氏外臺不用人參黃芩桂心芍藥甘草芎藭杏仁各一兩防風一兩半附子一枚生薑五兩上十二味㕮咀以水一斗二升先煮麻黃三沸去滓內諸藥煮取三升分三服甚良不瘥更合三四劑必隹取汗隨人風輕重虛實也有人腳弱服此方至六七劑得差有風疹家天陰節變輒合服之可以防瘖一本云恍惚者加茯神遠志如骨節煩疼本有熱者去附子倍芍藥小品千金翼同古今録驗有白朮不用杏仁救急無芎藭杏仁止十味延年無防風小烏沉湯調中快氣治心腹刺痛局方烏藥一兩去心香附子炒盆內淅去皮毛焙乾二兩甘草一分一本烏藥十兩香附子二十兩甘草炒一兩上為細末每服一錢入鹽少許或不著鹽沸湯點服不拘時小柴胡去半夏加栝蔞湯治瘧病發渴者金匱柴胡八兩黃芩二兩人參三兩大棗十二枚擘甘草三兩炙生薑三兩栝蔞根四兩上七味切以水一斗二升煮六升去滓更煎取三升溫服一升日三忌海藻菘菜經心録療勞瘧小兒疳蟲蝕齒方金匱雄黃葶藶上二味末之取臘日豬脂熔以槐枝綿裹頭四五枚點藥烙之土瓜根散帶下經水不利少腹滿痛經一月再見者主之陰㿗腫亦主之金匱婦人土瓜根芍藥桂枝蟅蟲各三分上四味杵為散酒服方寸匕日三服己椒藶黃丸腹滿口舌乾燥此腸間有水氣主之金匱痰飲防己椒目葶藶熬大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩下瘀血湯師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍此湯主之亦主經水不利金匱婦人大黃二兩桃仁六枚蟅蟲二十枚熬去皮上三味末之煉蜜和為四丸以酒一升煎一丸取八合預服之新血下如豚肝女曲散痢後虛腫水腫者服此藥小便利得止腫亦消千金方女曲一升乾薑細辛椒目附子桂心各半兩上六味治下篩酒服方寸匕不知加二三匕日三産虛滿大良上焦熱膈傷吐血衄血或下血連日不止欲絶並主之外臺艾葉竹茹各一升阿膠如手掌大乾薑二兩上四味㕮咀以水三升煮取一升去滓內馬通汁半升煮取一升頓服四畫五味子湯治小兒傷寒病久不除瘥後復劇瘦瘠骨立方千金五味子十銖大黃黃連黃芩麥門冬前胡各六銖芒硝五銖石膏一兩甘草當歸各十二銖上十味㕮咀以水三升煮取一升半服二合得下便止計大小增損之五味子湯肺氣不足寒從背起如含霜雪語無聲音劇者吐血方外臺五味子三兩大棗五十枚擘桑白根皮一升藁本二兩鍾乳三兩款冬花二兩雞蘇二兩上七味切以水九升煮取三升分溫三服每服如人行七八里進一服忌豬魚炙肉熱面陳臭等物此方甚良五味子湯小兒夜啼此腹痛故至夜輒劇狀似鬼祟聖劑五味子當歸芍藥白朮各四分甘草炙桂心各二分上六味切以水一升煎取五合分服之增減量之五味子湯治唾中有膿血胸脅痛方千金五味子桔梗紫菀甘草續斷各二兩竹茹三兩赤小豆一升桑白地黃各五兩上九味㕮咀以水九升煮取一升七合分為三服五皮散治脾受濕面目四肢虛腫通利小便百一選方大腹皮茯苓皮橘皮生薑皮桑白皮上各等分每服三錢水一盞半煎七分一日三四服局方五皮散有五加皮地骨皮無桑白皮橘皮又大全良方有木香俱六味引指迷方五痹湯治風寒濕邪客留肌體手足緩弱痹麻不仁或氣血失順痹滯不仁並皆治之局方羌活白朮防己各一兩片子薑黃一兩洗去灰土甘草微炙半兩上㕮咀每服四錢水一盞半生薑十片煎至八分去滓病在上食後服病在下食前服五靈湯治膜外水氣聖劑木通銼訶勒皮防己銼赤茯去黑皮陳皮一兩水煎五錢覺熱吃好茶五瀉湯治瞳人幹缺肝火旺及五藏虛火妄動此藥能瀉火熱甚加羚羊角犀角黃連銀海精微黃蘗知母木通梔子生地黃甘草玄參桔梗黃芩防風上㕮咀每服六七錢用水煎食後服五積散調中順氣除風冷化痰飲治脾胃宿冷腹脅脹痛胸膈停痰嘔逆噁心或外感風寒內傷生冷心腹痞悶頭目昏痛肩背拘急肢體怠惰寒熱往來飲食不進及婦人氣血不調心腹撮痛經候不勻或閉不通並宜服之局方治傷寒脾胃不和嘔逆寒熱聖惠方無生薑橘皮去白枳殼去穰銼炒麻黃去根節六兩白芍藥當歸去蘆洗川芎甘草炙銼茯苓去皮半夏洗七次肉桂去粗皮白芷各三分厚朴去粗皮薑製乾薑炮各三兩桔梗去蘆皮十二兩蒼朮米泔浸淨洗去皮十四兩上除肉桂枳殼外別為粗末外一十三味同為粗末熳火炒令色轉攤冷次入肉桂枳殼末令勻每服三錢水一盞半入生薑三片煎至一中盞去滓稍熱服如冷氣奔沖心腹脹滿刺痛反胃嘔吐瀉痢清穀及痃癖癥瘕膀胱小腸氣痛即入煨生薑三片鹽少許同煎如傷寒時疫頭痛體疼惡寒發熱項背強痛入蔥白三寸豉七粒同煎若但覺惡寒或身不甚熱肢體拘急或手足厥冷即入炒茱萸七粒鹽少許同煎如寒熱不調咳嗽喘滿入棗煎服婦人難産入醋一合同煎服之並不拘時候活人濟生並同得效方除麻黃名異功散又易簡方十五味並不炒入生薑蔥煎服名生料五積散五苓散太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者此方主之傷寒太陽傷寒汗出而渴者主之同上發汗已脈浮數煩渴者主之同上中風發熱六七日不解而煩有表裡症渴欲飲水水入則吐者名曰水逆主之同上未持脈時病人手叉自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此同上發汗後飲水多必喘以水灌之亦喘同上病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上栗起意欲飲水反不渴者服文蛤散若不差者與此湯寒實結胸無熱者與三物小陷胸湯同上本以下之故心下痞與瀉心湯痞不解其人渴而口煩躁小便不利者主之同上太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜此散同上陽明霍亂頭痛發熱身疼痛熱多欲飲水者主之同上霍亂假令瘦人臍下有悸吐涎沫而癲眩者此水也主之金匱痰飲脈浮小便不利微熱消渴者宜利小便發汗主之同上消渴豬苓十八銖去黑皮澤瀉一兩六銖茯苓十八銖桂枝半兩去皮白朮十八銖上五味搗為散以白飲和服方寸匕日三服多飲暖水汗出愈如法將息六成湯瘟疫愈後大便數日不行別無他症是足三陰不足以致大腸虛燥此不可攻飲食漸加津液流通自能潤下也覺穀道塞悶宜作蜜煎導甚則宜此湯方溫疫論當歸一錢五分白芍藥一錢地黃五錢天門冬一錢肉蓯蓉三錢麥門冬一錢照常煎服日後更燥者宜六味丸少減澤瀉六君子湯治胸膈痞塞脾寒不嗜食服燥藥不得者宜此楊氏方半夏白朮枳殼人參茯苓上等分每五錢水二盞生薑五片煎一盞溫服易簡方濟生方無茯苓有甘草得效方無枳殼有甘草今人多用此方六和湯治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食婦人胎前産後並宜服之縮砂仁半夏湯泡七次杏仁去皮尖人參甘草炙各一兩赤茯苓去皮藿香葉拂去塵白扁豆薑汁略炒木瓜各二兩香薷厚朴薑汁製各四兩上銼每服四錢水一盞半生薑三片棗子一枚煎至八分去滓不拘時候服局方升麻和氣飲治瘡疥發於四肢臀脾痛癢不常甚至憎寒發熱攻刺疼痛浸淫浮腫及癩風入藏陰下濕癢耳鳴眼痛並皆治之局方熟半夏茯苓白芷當歸各二錢熟蒼朮乾葛桔梗升麻各一兩熟枳殼乾薑各半錢大黃蒸半兩芍藥七錢半一本作六錢半陳橘皮甘草各一兩半上為銼散每服四大錢水一盞半薑三片燈心十五莖煎至七分去滓食前服升麻葛根湯治大人小兒時氣瘟疫頭痛發熱肢體煩疼及瘡疹已發及未發疑似之間並宜服之局方治初熱壯盛疑似未明服此或痘已出而表熱甚者保赤全書治傷寒頭痛時疫憎寒壯熱肢體痛惡寒鼻乾不得睡兼治寒暄不時人多病疫乍暖脫衣及瘡疹已發未發疑似之間宜服之活幼升麻乾葛一本作一十五兩白芍甘草炙各一十兩上為粗末每服三錢用水一盞半煎取一中盞一本作一鍾盞去滓稍熱服不拘時候日二三服以病氣去身清涼為度小兒量歲數加減服升麻鱉甲湯陽毒之為病面赤斑斑如錦文咽喉痛唾膿血五日可治七日不可治此湯主之金匱陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治此湯去雄黃蜀椒主之傷寒六書升麻二兩當歸一兩蜀椒炒去汁一兩甘草二兩鱉甲手指大一片炙雄黃半兩研上六味以水四升煮取一升頓服之老小再服取汗肘後千金方陽毒升麻湯無鱉甲有桂陰毒用甘草湯無雄黃升陽散火湯傷寒叉手抹胸尋衣摸床譫語昏沉不醒人事俗醫不識見病便呼為風症用風藥誤人死者多矣殊不知肝熱乘於肺金元氣虛不持自主特名曰撮空證小便利者可治小便不利者不可治傷寒六書人參當歸柴胡芍藥黃芩甘草白朮麥門冬陳皮茯苓水二鍾薑三片棗一枚槌法入金銀首飾煎之熱服有痰者加薑汁半夏大便燥實譫語發渴加大黃泄漏加升麻炒白朮內疏黃連湯癰疽腫硬發熱作嘔大便祕澀煩躁飲冷噦啘心煩舌乾口苦六脈沉實有力此邪毒在藏也急宜服此以內除之使邪氣不得傳變經絡外科正宗木香黃連山梔當歸黃芩白芍薄荷檳榔桔梗連翹各一錢甘草五分大黃二錢水二茶鍾煎八分食前服臨服加蜜二匙亦可內托黃耆湯治濕熱腿內近膝股患癰或附骨癰初起腫痛此太陰厥陰之分也脈細而弦按之洪緩有力同上黃耆鹽水拌炒當歸柴胡木瓜連翹各一錢羌活肉桂生地黃黃蘗各五分水酒各一鍾煎一半空心熱服內補黃耆湯治婦人七傷身體疼痛小腹急滿面目黃黑不能食飲並諸虛乏不足少氣心悸不安方千金方黃耆當歸芍藥乾地黃半夏各三分茯苓人參桂心遠志麥門冬甘草五味子白朮澤瀉各二兩乾薑四兩大棗三十枚上十六味㕮咀以水一斗半煮取三升去滓一服五合日三夜一服牛膝湯療筋虛極傷風為風所傷入筋縮攣腰背不伸強直苦痛或為腳氣方外臺牛膝防風甘李根皮丹參前胡各四兩石斛五兩杜仲秦艽續斷鱉甲炙各三兩陳橘皮二兩大麻仁二升熬研上十二味切以水一斗四升煮取五升去滓下麻仁更煎取二升分三服忌莧菜牛膝湯治婦女逾年月水不通臍下結塊方聖濟牛膝牡丹皮芍藥當歸川芎鱉甲羌活薔薇附子三稜桂枝上十二味切以水一斗二升煮取三升分溫服牛蒡子散治風熱成歷節攻手指作赤腫麻木甚則攻肩背兩膝遇暑熱大便祕即作本事方牛蒡子三兩黃耆一兩半地黃二兩半羌活一兩豆豉炒一兩細末湯調二錢服空心食前三服此病多胸膈生痰久則赤腫附著肢節久不退遂成厲風此孫真人所預戒也宜早治之牛蒡子湯治風熱上壅初發牙關緊急已發咽喉腫痛或生瘡癰及愈後復攻胸脅氣促身熱不能言臥入門牛蒡子二錢玄參犀角升麻黃芩木通桔梗甘草各一錢食後水煎服如有痰加瓜蔞貝母肝火加柴胡吳茱黃連腎火加當歸地黃知母倍玄參畏下陷加升麻牛蒡子湯治乳癰乳疽結腫疼痛無論新久但未成膿服正宗陳皮牛蒡子山梔子金銀花甘草黃芩瓜蔞仁天花粉連翹角針各一錢柴胡青皮各五分上水二鍾煎八分入酒一杯和勻食遠服木防己湯胸間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈此湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之金匱木防己三兩石膏十二枚雞子大桂枝二兩人參四兩上四味以水六升煮取二升分溫再服木防己去石膏加茯苓芒硝湯木防己桂枝各二兩芒硝三合人參茯苓各四兩上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈木香流氣飲治流注瘰癧及鬱結為腫或血氣凝滯遍身走注作痛或心胸痞悶嗌咽不利脅腹膨脹嘔吐不食上氣喘急咳嗽痰盛或四肢面目浮腫者並服之正宗川芎當歸紫蘇桔梗青皮烏藥黃耆枳實茯苓防風半夏白芍各一錢甘草節大腹皮木香檳榔澤瀉枳殼各五分牛膝下部加一錢水二鍾薑三片棗一枚煎八分食遠服文蛤散渴欲飲水不止者主之金匱消渴病在陽應以汗解之反以冷水潠之若灌之其熱被卻不得去彌更益煩肉上栗起意欲飲水反不渴者服此方若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯傷寒太陽文蛤五兩金匱作四兩上一味杵為散以沸湯和方寸匕湯用五合文蛤湯吐後渴欲得水而食飲者主之兼微風脈緊頭痛金匱嘔吐文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十枚大棗十二枚上七味以水六升煮取二升溫服一升汗出即愈分心氣飲治男子婦人一切氣不和多因憂愁思慮怒氣傷神或臨食憂戚或事不隨意使鬱抑之氣留滯不散停於胸膈之間不能流暢致心胸痞悶脅肋虛脹噎塞不通噫氣吞酸嘔噦噁心頭目昏眩四肢倦怠面色萎黃口苦舌乾飲食減少日漸羸瘦或大腸虛祕或因病之後胸膈虛否不思飲食並皆治之局方木香不見火丁香皮一兩人參去蘆銼厚朴去粗皮薑汁製大腹子炮大腹皮炙桑白皮炒草果仁桔梗去蘆炒麥門冬子去心白朮各半兩香附子炒去毛紫蘇去梗藿香去土陳皮去白各一兩半甘草炙一兩上㕮咀每服二錢水一盞生薑三片燈心十莖棗子一個擘破去核煎至七分去滓溫服不拘時候分心氣飲治證與前方同同上大腹皮赤芍藥木通去節半夏湯洗七次桑白皮微炒赤茯苓肉桂去粗皮甘草炙陳橘皮去穰青橘皮去白羌活各一兩紫蘇去粗梗四兩上為粗末每服三錢水一盞生薑三片棗二枚燈心五莖同煎至七分去滓溫服不拘時候常服消化滯氣升降陰陽調順三焦和脾進食不換金正氣散治四時傷寒瘴疫時氣頭疼壯熱腰背拘急五勞七傷山嵐瘴氣寒熱往來五膈氣噎咳嗽痰涎行步喘乏或霍亂吐瀉藏腑虛寒下利赤白並宜服之同上厚朴去皮藿香去苗陳皮去白半夏蒼朮米泔浸甘草炙各等分上為銼散每服三錢水一盞半生薑三片棗子二枚煎至八分去滓食前稍熱服忌生冷油膩毒物若四方人不伏水土宜服之常服能闢嵐氣調和脾胃進飲食王宇泰曰風寒暑濕皆能中人惟濕氣積久留滯關節故能中非如風寒暑之有暴中也中濕之症關節沉重而痛浮腫喘滿腹脹煩悶不知人其脈必沉而緩或沉而微細宜除濕湯於本方加白朮茯苓丹參煮散治筋實極則兩腳下滿而痛不得遠行腳心如割筋斷折痛不可忍方外臺丹參十二分川芎杜仲續斷地骨皮各八分通草當歸乾地黃麥門冬去心禹餘糧煉麻黃去節七分甘草炙桂枝各五分牛膝九分生薑薄切炒取焦燥牡蠣各十分熬升麻六分上十七味搗下篩為散以絹袋子盛散二方寸匕以井華水二升煮數動絹囊子煮取一升為一服日再煮忌海藻菘菜生蔥蕪荑勻氣散此方前代曾服有效風藥服之十三日安可治腰腿疼半身不遂手足不能屈伸口眼喎斜風氣中風中氣便用風藥治之十無一愈當以氣藥治之氣順則風散近有人服之見效瑞竹堂方白朮四兩沉香五兩天麻一兩烏藥三兩青皮五錢白芷人參甘草各五錢上為㕮咀每服三錢水一錢半生薑三片紫蘇五葉木瓜三片棗子一枚煎至七分去滓空心溫服止熱極湯療脈熱極遇風為痹痹感心顏脫面色白不澤脈空虛口唇色赤乾燥升麻潤色消痹方外臺升麻射干芎藭人參各三兩赤小豆五合生薑麥門冬去心萎蕤各四兩生地黃切一升甘草二兩炙竹葉切一升上十一味切以水一斗煮取二升去滓分為三服忌海藻菘菜蕪荑心腹急滿湯治妊娠體腫有水氣千金方茯苓白朮各四兩崔氏無黃芩杏仁各五兩旋覆花二兩上五味㕮咀以水六升煮取二升半分作三服化斑解毒湯治三焦風熱上攻致生火丹延及遍身癢痛者正宗玄參知母石膏人中黃黃連升麻連翹牛蒡子等分甘草五分上水二鍾淡竹葉二十片煎八分不拘時候服王不留行散病金瘡主之金匱浸淫王不留行十分八月八日採蒴藋細葉十分七月十日採桑東南根白皮十分二月二日採甘草十分川椒三分除目及閉口去汗黃芩二分乾薑二分厚朴二分芍藥二分上九味桑根皮以上三味燒灰存性勿令灰過各別杵篩合治之為散服方寸七小瘡即粉之大瘡但服之産後亦可服如風寒桑東根勿取之前三物皆陰乾百日反胃大驗方外臺前胡生薑各四兩阿膠一兩炙大麻子仁熬吳茱萸各五合桂心三寸甘草五寸炙大棗十枚上八物切以酒二升水三升煮取一升七合分再服忌生蔥海藻菘菜酢物等一方用橘皮三兩五畫甘草乾薑湯傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作此湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之傷寒太陽問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而讝語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子溫脛亡陽故也厥逆咽中乾燥陽明內結讝語煩亂更飲此湯夜半陽氣還兩足當熱脛當微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則正其譫語故知病可愈同上肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾以此湯溫之若服湯已渴者屬消渴金匱肺痿甘草四兩炙乾薑二兩上二味㕮咀以水三升煮取一升五合去滓分溫再服甘草瀉心湯傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也主之傷寒論太陽下狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲喝此湯主之金匱百合甘草四兩炙黃芩乾薑各三兩半夏半斤洗黃連一兩大棗十二枚擘上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服按千金並外臺祕要治傷寒𧈟食用此方皆有人參知脫落無疑甘草粉蜜湯蛔蟲之為病令人吐涎心痛發作有時毒藥不止主之金匱蛔蟲甘草二兩粉一兩蜜四兩上三味以水二升煮甘草取二升去滓內蜜攪令和煎如薄粥溫服一升瘥即止按本經逢原曰金匱甘草粉蜜湯治蛔蟲吐涎心痛專取胡粉殺蟲甘草安胃蜜以誘人蟲口也甘草湯少陰病二三日咽痛者主之傷寒少陰甘草二兩上一味以水三升煮減半分溫服七合日二服甘草附子湯風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者主之傷寒太陽甘草二兩炙附子二枚炮去皮破術二兩桂枝四兩去皮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗止復煩者將服五合恐一升多者宜服六七合為始甘草麻黃湯里水主之金匱水氣甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆令汗出不汗再服慎風寒甘草乾薑茯苓白朮湯腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣里冷濕久久得之腰以下冷痛腰重如帶五千錢者主之金匱風寒甘草白朮各二兩乾薑茯苓各西兩上四味以水五升煮取三升分溫三服腰中即溫甘桔湯治麻疹咽痛口舌生瘡醫通甘草桔梗山豆根黑玄參鼠黏子荊芥等分麥門冬倍用上水煎溫服甘連湯小兒初生先須此方幼幼新書甘草五分黃連三分辰砂少許上水煎一方加茯苓甘麥大棗湯婦人藏躁喜悲傷哭象如神靈所作數欠伸此湯主之亦補脾氣金匱産後甘草三兩小麥一升大麥十枚上三味以水六升煮取三升分溫再服甘露飲治丈夫婦人小兒胃中客熱牙宣口氣齒齦腫爛時出膿血目瞼垂重常欲合閉或即飢煩不欲飲食及赤目腫痛不任涼藥口舌生瘡咽喉腫痛瘡疹已發未發皆可服之又療脾胃受濕瘀熱在裡或醉飽房勞濕熱相搏致生疸病身面皆黃肢體微腫胸滿氣短大便不調小便黃澀或時身熱並宜服之局方熟乾地黃麥門冬去心焙枳谷去穰麩焙甘草炙山茵陳去梗枇杷葉刷去毛淨石斛去蘆黃芩生乾地黃天門冬去心焙上等分為末每服二錢水一盞煎七分去滓食後臨臥溫服小兒一服分兩服仍量歲數加減與之甘露丸治大人小兒風壅痰熱心膈煩躁夜臥不安譫語狂妄目赤鼻衄口燥咽乾療中暑解熱毒同上鉛白露龍腦各三分甘草炙一兩牙硝枯過三兩寒水石粉三十二兩上為細末用糯米糊丸如彈子大每服用生薑蜜水磨下半丸新汲水亦得小兒一丸分五服食後服甘遂半夏湯病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也主之同上痰飲甘遂大者三枚半夏十二枚以水一升煮取半升去滓芍藥五枚甘草如指大一枚炙上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之四物湯調益榮衛滋養氣血治衝任虛損月水不調臍腹㽱痛崩中漏下血瘕塊硬發歇疼痛妊娠宿冷將理失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下結生瘕聚少腹堅痛時作寒熱局方熟乾地黃淨洗酒灑蒸焙白芍藥當歸去蘆酒浸微炒川芎各等分上為粗末每服三錢水一盞半煎至八分去滓熱服空心食前若妊娠胎動不安下血不止者加艾十葉阿膠一片同煎如前方或血藏虛冷崩中去血過多亦加膠艾煎四逆湯傷寒若重發汗復加燒針者此湯主之傷寒太陽上篇傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者當救表救里宜此湯救表宜桂枝湯同上中篇病發熱頭痛脈反沉若不差身體疼痛當救其里宜此湯同上脈浮而遲表熱裡寒下利清穀者宜此湯若胃中虛冷不能食者飲水噦同上陽明自利不渴者屬太陰以其藏者寒故也當溫之宜服四逆輩同上太陽少陰病脈沉者急溫之溫之宜此湯同上少陰少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當可吐之若膈上有寒飲乾嘔不可吐也當溫之宜此湯同上少陰大汗出熱不去內拘急四肢痛又下利厥逆而惡寒者主之同上厥陰大汗若大下利而厥冷者主之同上夫六府氣絶於外者手足寒上氣腳縮五藏氣絶於內者利不禁下甚者手足不仁全匱嘔吐嘔吐脈弱小便復利身有微熱見厥者難治主之同上下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜此湯攻表宜桂枝湯傷寒厥陰吐利汗出發熱惡寒四肢拘急手足厥冷者主之同上霍亂既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者主之同上甘草二兩炙乾薑一兩半附子一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩四逆加人參湯惡寒脈微而復利利止亡血也主之傷寒霍亂附子一枚生去皮破八片乾薑一兩半人參一兩甘草三兩炙上四味以水三升煮取一升二合去滓分溫再服四逆散少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者主之傷寒甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令折泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服四君子湯治榮衛氣虛藏腑怯弱心腹脹滿全不思食腸鳴泄瀉嘔噦吐逆大宜服之局方人參去蘆茯苓去皮甘草炙白朮各等分上為細末每服二錢水一盞煎至七分通口服不拘時入鹽少許白湯點服亦得常服溫和脾胃進益飲食闢寒邪瘴氣四柱散治丈夫元臟氣虛真陽耗散兩耳常鳴臍腹冷痛頭旋目暈四肢怠倦小便滑數泄瀉不止同上人參附子炮去皮尖木香濕紙羅曝茯苓各一兩上為末每服二錢水一大盞生薑二片棗子一個鹽少許煎七分空心食前服凡臟氣虛弱者悉宜服之四順清涼飲治湯潑火燒熱極逼毒入里或外被涼水所濯火毒內攻致生煩躁內熱口乾大便祕實者服正宗連翹赤芍羌活防風當歸山梔甘草各一錢大黃炒二錢上水二鍾燈心二十根煎八分食遠服四苓湯溫疫煩渴思飲酌量與之若引飲過多自覺水停心下名停飲宜此湯若大渴思飲冰水者無論四時皆可量與不欲飲冷當易百滾湯與之乃至不思飲則知胃和溫疫茯苓二錢澤瀉一錢五分豬苓一錢五分陳皮一錢取長流水煎服今不用白朮者疫邪傳胃而渴白朮性壅恐以實填實也加陳皮者和中利氣也半夏茯苓湯療妊娠阻病心中憒悶空煩吐逆惡聞食氣頭眩重四肢百節疼煩沉重多臥少起惡寒汗出疲極黃瘦方外臺半夏洗生薑各五兩旋覆花一兩橘皮二兩茯苓三兩細辛芎藭人參桔梗甘草炙各二兩芍藥二兩乾地黃三兩上十二味切以水一斗煮取三升分三服忌豬羊肉餳菘菜海藻生菜蕪荑半夏茯苓湯療胸膈心腹中痰水冷氣心下汪洋嘈煩或水鳴多唾口中清水自出脅肋急脹痛不欲食此皆胃氣弱受冷故也其脈喜沉弦細遲悉主之方同上半夏五兩洗生薑五兩茯苓三兩陳橘皮人參桔梗芍藥甘草炙各二兩桂心一兩旋覆花一兩上十味切以水九升煮取三升分三服欲得利者加大黃須微調者用乾地黃病有先時喜水下者加白朮三兩除旋覆花若大便不調宜加大黃及乾地黃並用三兩忌同前半夏瀉心湯傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也但滿而不痛此為痞柴胡不中與之宜此湯傷寒太陽篇下嘔而腸鳴心下痞堅金匱嘔吐上焦虛寒腸鳴下利心下痞堅外臺無大棗有桂心三兩半夏半升洗黃芩三兩擘人參甘草炙乾薑各三兩黃連一兩大棗十二枚上七味以水一斗煮取六升滓再煎三升溫服一升日三服半夏白朮天麻湯治痰厥頭痛眼黑頭旋噁心煩悶氣短促上喘無力與言心神顛倒目不敢開如在風雲之中頭苦痛如裂身如山四肢厥冷不得安臥此乃胃氣虛損停痰而致也回春半夏薑汁製白朮米泔浸陳皮去白麥芽各七分半茯苓去皮黃耆炒人參澤瀉蒼朮天麻各三分半神麯炒五分黃蘗酒炒乾薑炒各二分上銼一劑生薑三片水煎食前熱服半夏乾薑散乾嘔吐逆吐涎沫方金匱反胃半夏乾薑各等分上二味杵為散取方寸匕漿水一升半煎取七合頓服之半夏散及湯少陰病咽中痛者主之傷寒半夏洗桂枝去皮甘草炙上三味等分各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散一兩方寸匕更煎三沸下火令小冷少少咽之半夏有毒不當散服半夏麻黃丸心下悸者主之金匱半夏麻黃各等分上二味末之煉蜜和丸小豆大飲服三丸日三服半夏厚朴湯婦人咽中如有炙臠主之金匱胸滿心下堅咽中帖帖如有炙肉吐之不出吞之不下千金半夏一斤厚朴三兩茯苓二兩生薑五兩干蘇葉二兩上五味以水七升煮取四升分溫四服日三夜一服半夏藿香湯疫邪留於心胸胃口熱甚皆令嘔不止下之嘔當去今反嘔者此屬胃氣虛寒主之溫疫論半夏一錢五分真藿香一錢乾薑炒一錢白茯苓一錢廣陳皮一錢白朮炒一錢甘草五分水薑煎服半夏飲治反胃不食食即吐逆羸瘦少力聖濟半夏湯洗七遍去滑盡焙二兩厚朴去粗皮生薑汁炙一兩半糯米二合橘皮湯洗去白焙一兩生薑切片一兩半上五味粗搗篩每服三錢匕棗二枚擘破水一盞去滓空腹溫服如人行五里再服半夏湯治胸中客熱心中煩滿氣上大小便難方千金半夏一升生薑八兩前胡四兩茯苓白朮各五兩甘草一兩黃芩人參各二兩杏仁枳實各二兩上十味㕮咀以水九升煮取三升分三服胸中大熱者沉冷服之一方用梔子仁二兩為十一味半夏湯治脾勞實四肢不用五臟乖反脹滿肩息氣急不安承氣泄實熱方同上半夏宿薑各八兩茯苓白朮杏仁各三兩大棗二十枚竹葉切一升橘皮芍藥各四兩上九味㕮咀以水一斗煮取三升分四服半夏湯治陰黃小便色不清欲自利腹滿而喘者必噦半夏湯洗七遍去滑一兩人參二兩葛根二兩上三味銼如麻豆每服四錢匕以水一盞入生薑半分切煎取七分去滓不計時候溫服聖濟白虎湯傷寒脈浮滑此以表有熱里有寒主之傷寒太陽三陽合病腹滿身重難以轉側口不仁面垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗出者主之同上陽明傷寒脈滑而厥者里有熱也同上厥陰瘟疫脈長洪而數大渴復大汗通身發熱者宜此湯溫疫知母六兩石膏一斤碎甘草二兩炙粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服白虎加人參湯服桂枝湯大汗出後大煩渴不解若脈洪大者主之寒傷太陽傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者主之同上傷寒無大熱口燥渴心煩背微惡寒者主之同上傷寒脈浮發熱無汗其表不解者不可與此湯渴欲飲水無表證者此湯主之同上陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反讝語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子湯主之若渴欲飲水口乾舌燥者此湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之同上陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也同上太陽中熱者暍是也汗出惡寒身熱而渴者主之金匱渴欲飲水口乾舌燥者主之同上知母六兩石膏一斤碎綿裹甘草炙三兩粳米六合人參三兩上五味以水一斗煮米熟成湯去滓溫服一升日三服白虎加桂枝湯溫瘧者其脈如平身無寒熱骨節疼煩時嘔主之金匱知母六兩甘草二兩炙石膏一斤粳米二合桂枝去皮二兩上銼每五錢水一盞半煎至八分去滓溫服汗出即愈白通湯少陰病下利者主之傷寒少陰少陰病下利脈微者與此湯同上蔥白四莖乾薑一兩附子一枚生去皮破八片上三味以水三升煮取一升去滓分溫再服白通加豬膽汁湯服白通利不止厥逆無脈乾嘔煩者此湯主之服湯脈暴出者死微續者生傷寒少陰蔥白四莖乾薑一兩附子一枚生去皮破八片人屎五合豬膽汁一合上五味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服若無膽亦可用白朮散妊娠養胎主之金匱白朮川芎各二兩蜀椒三分去汁牡蠣二分上四味杵為散酒服一錢匙日三服夜一服若痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以酸漿水服之若嘔以酸漿水服之復不解者小麥汁服之已後渴者大麥粥服之病雖愈服之勿置白薇湯人平居無苦疾忽如死人身不動搖默默不知人目閉不能開口噤不能言或微知人惡聞人聲但如眩冒移時方寤此由發汗過多血少氣並於血陽獨上不下氣壅塞而不行故身如死氣過血還陰陽復通故移時方寤名曰鬱冒亦名血厥婦人多有之本事方白薇當歸洗去蘆薄切焙乾各一兩人參去蘆半兩甘草五分炙上粗末每服五錢水二盞煎至一盞去滓溫服白頭翁湯熱利下重者主之金匱下欲利欲飲水者以有熱故也主之傷寒厥陰白頭翁二兩黃連三兩黃蘗三兩秦皮三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升白頭翁加甘草阿膠湯産後下利虛極主之金匱婦人白頭翁甘草阿膠各二兩秦皮黃連黃蘗各三兩上六味以水七升煮取二升半內膠令消盡分溫三服白蘚皮湯肺受風而色枯白頰時赤皮膚乾燥鼻塞干痛此為虛風主之準繩白蘚皮麥門冬去心茯苓去皮杏仁去皮尖雙人炒細辛去苗桑白皮白芷各一兩半石膏研各一兩每服三錢水三盞先煮大豆三合取汁一盞去豆下藥煎至七分去滓不拘時服白蘚皮湯治少小客魃挾實方千金方白蘚皮大黃甘草各一兩芍藥茯苓細辛桂心各十八銖上七味㕮咀以水二升煮取九合分三服白扁豆散治久嗽咯血成肺痿多吐白涎胸膈滿悶不食本事方白扁豆飯上蒸生薑各半兩枇杷葉去毛半夏湯洗七次人參去蘆白朮各一分白茅根三分上細銼水三升煎至一升去滓下檳榔末一錢和勻分四服不拘時候生薑甘草湯治肺痿咳唾涎沫不止咽燥而渴金匱生薑五兩人參三兩甘草四兩大棗十五枚上四味以水七升煮取三升分溫三服生薑半夏湯病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈何者用此湯同上半夏半斤生薑汁一升上二味以水三升煮半夏取二升內生薑汁煮一升半小冷分四服日三夜一服嘔止停後服生薑瀉心湯傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者主之傷寒太陽生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服生薑湯療吐逆乾嘔外臺生薑四兩澤瀉三兩桂心二兩橘皮三兩甘草二兩茯苓四兩人參一兩大黃四兩上八味切以水七升煮取三升服五合日三忌海藻菘菜醋物生蔥生脈散滋生精氣培養真元補心潤肺入門麥門冬人參各三錢五味子十五粒水煎不拘時服渣再煎則可充一日茶湯生蘆根五味飲許仁則療嘔吐病有兩種一者積熱在胃嘔逆不下食一者積冷在胃亦嘔逆不下食二事正反須細察之必其食飲寢處將息傷熱又素無冷病壯年力強膚肉充滿此則是積熱在胃生此嘔逆如將息食飲寢處不熱又素有冷病年衰力弱膚肉瘦悴此則積冷在胃生此嘔逆經久急須救之不爾甚成反胃病積熱在胃嘔逆不下食宜此湯同上生蘆根切一升生麥門冬一升去心青竹茹一升生薑汁五合茯苓五兩上藥切以水八升煮取二升半去滓加竹瀝六大合攪調合三服相去如人行十里久始服一劑忌醋物加味遺糧湯治楊梅瘡初起筋骨疼痛及已成數月延綿不已並楊梅風毒誤服輕粉癱瘓骨疼不能動履川芎當歸防風薏苡仁木瓜金銀花木通白蘚皮蒼朮威靈仙各一錢甘草五分皂莢子五個切片微炒仙遺糧二兩人參瘡久氣虛者加水二碗煎八分量上下食前後腿腳之下加牛膝一錢病淺者一月可退病深者百日可痊忌牛肉燒酒海腥煎炒此瘡發時多先起於下疳若以此方預服之可以止其不發梅瘡也加味金沸草散麻疹其症重者主之準繩旋覆花去梗麻黃去節水煮去沫曬乾前胡去蘆各七錢荊芥穗一兩甘草炙半夏湯泡七次薑汁拌炒赤芍藥各五兩鼠黏子炒浮萍各七錢上為末每服三錢生薑二片薄荷葉三五片煎加味茯苓湯治痰迷心胞健忘失事言語如癡得效方人參去蘆半夏湯洗陳皮去白兩半白茯苓去皮一兩粉草五錢益智去殼香附子炒去毛各一兩上銼散每服四錢水一盞半生薑三片烏梅半個同煎不拘時溫服加味香薷飲治伏暑成瘧煩悶多渴微微振寒寒罷大熱小便黃赤或背寒面垢濟生方香薷半斤扁豆四兩厚朴薑製炒六兩檳榔二兩黃連去須三兩上㕮咀每服四錢水一盞用酒半盞煎至八分去滓沉冷服不拘時候加味逍遙散治便毒下疳血疝服疏導攻伐之劑不能消散虛熱不已口無食味及肚腹重墜水道澀痛或兩胯痛足膝無力者薛己治患顛疾歌唱無時逾牆上屋乃榮血迷於心胞所致加遠志去心桃仁去皮尖蘇木紅花各一錢水一杯半煎得效方當歸去苗芍藥白者白朮柴胡茯苓牡丹皮山梔子各一兩甘草炙半兩上為粗末每服二錢水一大盞煅生薑一塊切破薄荷少許同煎至七分去滓熱服不拘時候加減鼠黏子湯痘疔證屬有餘首尾俱宜此方為要正宗鼠黏子天花粉知母荊芥山梔子各六分甘草三分水二盞淡竹葉燈心各二十件煎服身熱加柴胡黃芩有痰加麥冬貝母咽啞加玄參桔梗咬牙加薄荷石膏便祕加蜂蜜玄胡粉昏憒加黃連硃砂痂枯加當歸地黃戀疤加蟬蛻川芎加減二陳湯痰屬濕乃津液所化因風濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲故曰痰因火動降火為先火因氣逆順氣為要壽世陳皮去白一錢半夏制錢半茯苓酒炒各一錢防風去蘆五分貝母一錢半枳實一錢白朮去蘆一錢二分連翹五分黃芩酒炒各一錢天花粉七分香附子炒一錢甘草三分上銼生薑三片水煎溫服加減二陳湯治痰飲屬寒者局方半夏五錢陳皮茯苓乾薑桂枝各三錢甘草一分上水煎溫服按張氏醫通云婦人月水及期嘔吐煩悶頭痛者是心下寒飲也宜此湯古今録驗解五蒸湯外臺方甘草一兩炙茯苓三兩人參二兩竹葉二把葛根乾地黃各三兩知母黃芩各二兩石膏五兩碎粳米一合上十味切以水九升煮取二升半分為三服亦可以水三升煮小麥一升乃煮藥忌海藻菘菜蕪荑火醋範汪同一方無甘草茯苓人參竹葉止六味古今録驗療氣忽發滿胸急者方同上桑根白皮切二升郁李仁一升碎赤小豆二升橘皮三兩蘇葉三兩茅根切二升上六味切以水一斗煮取三升適冷暖稍稍飲之古今録驗桂心湯療人心痛懊憹胸悶築築引兩乳又或如刺困極方同上桂心半兩芍藥吳茱二兩當歸二兩生薑半斤無代乾薑五兩上五味切以水一斗二升煮取四升服一升晝三夜一良有驗忌生蔥古今録驗白頭翁湯療寒氣急下及滯下方同上白頭翁乾薑各二兩甘草一兩當歸一兩黃連秦皮各一兩半石榴皮一兩上七味切以水八升煮取三升分為四服古今録驗羚羊角湯療噎塞氣不通不下食方同上羚羊角屑二兩厚朴炙橘皮通草吳茱萸乾薑各三兩烏頭十五枚炮上七味切以水九升煮三升分三服日三忌豬肉冷水古今祕苑第二方治瘧疾何首烏生用三錢陳皮茯苓柴胡黃芩各八分白朮一錢當歸一錢威靈仙一錢生薑三片上井水河水各一碗煎八分加酒五分再煎一滾空心服二三煎並治久瘧加蓬朮一錢此方妙在補瀉互用虛實皆宜不用參耆並去常山草果平平無奇卻有神效即極弱之人纏極重之病十劑之後立有起色功奏萬全所云加減一二即不靈應者正此一方也切勿早用人參如閉賊於重門之內必搏擊害人所傷者大矣正氣天香湯治婦人一切諸氣作痛上湊心胸或攻築脅肋腹中結塊發渴刺痛月水因之而不調或眩暈嘔吐往來寒熱胎前産後一切氣症方入門香附子一錢半烏藥六錢紫蘇陳皮乾薑各六分水煎熱服正脾散治大病之後脾氣虛弱中滿腹脹四肢虛浮狀如水氣此藥主之楊氏方莪朮炮切香附子炒茴香炒陳皮去白甘草炙等分為細末每服二錢煎燈心木瓜湯調下外臺茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食同上茯苓人參白朮各三兩枳實橘皮生薑四兩上六味以水六升煮取一升六合分溫三服如人行八九里進之外臺黃芩湯治乾嘔下痢同上黃芩人參乾薑各三兩桂枝一兩大棗十二枚半夏半升上六味以水七升煮取三升溫分三服必效療痢兼湯方外臺麥門冬去心三兩烏梅二大枚上二味以水一大升煮取強半絞去滓待冷細細咽之即定仍含之必勝湯痧有因於血實者此方主之生衡紅花香附子各四兩桃仁去皮尖大黃貝母山楂赤芍藥青皮五靈脂各二錢水二鍾煎七分微溫服朮附湯治風虛頭重眩苦極不知食味補中益精氣金匱白朮二兩附子一枚半炮去皮甘草炙一兩上三味銼每五錢匕薑五片棗一枚水盞半煎七分去滓溫服瓜蒂散病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝喉咽不得息者此為胸有寒也當吐之宜之傷害論太陽下病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜此方同上厥陰宿食在上脘當吐之宜此湯金匱腹滿治諸黃同上黃疸瓜蒂一分熬黃赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與之此湯仙遺糧湯治楊梅結毒初起筋骨疼痛已破肌肉潰爛者正宗仙遺糧即稱土茯苓四兩防風荊芥川芎當歸天花粉金銀花白蒺藜薏苡仁威靈仙各一錢山梔子黃連連翹乾葛白芷甘草黃芩各六分牛膝下部加之水三鍾煎二碗量病上下食前後服渣再煎一碗服後飲酒一杯忌牛肉火酒房事等件更妙平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色萎黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎八痞膈氣翻胃並宜服之局方蒼朮去粗皮米泔浸二日焙乾五斤炒厚朴去粗皮水浸一宿銼生薑汁製焙乾五十兩陳皮去白五十兩甘草銼炒十兩上為細末每服二錢以水一盞入生薑二片干棗兩枚同煎至七分去棗薑帶熱服食前入鹽一捻沸湯點服亦得常服調氣暖胃化宿食消痰飲闢風寒冷濕四時非節之氣石膏湯治腳氣風毒熱毒氣上衝頭面面赤鼻塞來時令人昏憒心胸恍惚或若驚悸身體戰掉手足緩縱或酸痹頭目眩重眼反鼻辛熱氣出口中或患味甜諸惡不可名狀者方千金石膏龍膽升麻芍藥貝齒甘草鱉甲黃芩羚羊角各一兩橘皮當歸各二兩上十一味㕮咀以水八升煮取三升分為三服六畫竹皮大丸婦人乳中虛煩亂嘔逆安中益氣金匱産後桂枝一分甘草七分白薇一分生竹茹一分石膏二分上五味末之棗肉和丸彈子大以飲服一丸日三夜二脈有熱者倍白薇煩喘者加柏實一分竹茹溫膽湯治傷寒日數過多其熱不退夢寐不寧心驚恍惚煩躁多痰不得眠者回春柴胡一錢竹茹桔梗枳實麩炒各一錢黃連錢半人參五分陳皮半夏茯苓各一錢香附八分甘草三分上銼一劑生薑三片棗一枚水煎服竹茹湯治吐血汗血大小便下血方千金方竹茹二升甘草芎藭黃芩當歸各六分芍藥白朮人參桂心各一兩上九味㕮咀以水一斗煮取三升分四服日三夜一竹葉黃芩湯治精極實熱眼視無明齒焦發落形衰體痛通身虛熱方千金方竹葉切二升黃芩茯苓各三兩甘草麥門冬各二兩生薑六兩芍藥四兩大黃二兩生地黃切一升上九味㕮咀以水九升煮取三升去滓分三服竹葉石膏湯治痘不惡寒壯熱煩渴小便赤澀保赤全書石膏知母甘草麥門冬淡竹葉上水煎服竹葉石膏湯傷寒解後虛羸少氣氣逆欲吐主之傷寒勞復竹葉二把石膏一斤麥門一升去心半夏半升洗人參二兩甘草二兩炙粳米半升上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣消弱不能消穀故令微煩損谷則愈竹葉湯産後中風發熱面正赤喘而頭痛主之金匱産後竹葉一把葛根三兩防風桔梗桂枝人參甘草各一兩附子一枚泡大棗十五枚生薑五兩上十味以水一斗煮取二升半分溫三服溫覆使汗出頸項強用大附子一枚破之如豆大煎藥揚出沫嘔者加半夏半升洗竹葉湯治五心熱手足煩痛口乾唇燥胸中熱方千金方竹葉小麥各一升知母石膏各三兩茯苓黃芩麥門冬各二兩人參一兩半栝蔞根半夏甘草各一兩生薑五兩上十二味㕮咀以水一斗二升煮竹葉小麥取八升去滓內藥煮取三升分三服老小分五服竹葉湯療氣極傷熱氣喘甚則唾血氣短乏不欲食口燥咽乾方外臺祕要竹葉切一升麥門冬去心小麥生地黃切各一升生薑六兩干棗十枚擘去核麻黃三兩去節甘草一兩炙石膏六兩碎裹綿上九味切以水一斗煮取三升去滓分為三服忌海藻菘菜蕪荑竹葉湯療煩躁而渴不止惡寒仍熱盛者此湯常用亦佳不徒療天行凡虛羸久病及瘧後胸上痰熱者服之妙方同上甘草三兩炙大棗十五枚擘半夏一兩洗芍藥三兩前胡一兩黃芩一兩小麥五合人參二兩粳米一升知母三兩麥門冬四合去心栝蔞根一兩生薑四兩竹葉一把須以竹條飲代水煮湯小用其葉上十四味切以竹條飲一斗五升煮取五升分三服若非天行而虛羸久病胸生痰熱亦可服之加黃耆二兩除黃芩減知母一兩除栝蔞用之效忌羊肉海藻菘菜餳竹葉湯療霍亂吐利已服理中及四順湯不解者同上竹葉一虎口小麥一升生薑十兩甘草一兩炙人參一兩附子一兩炮肉桂二兩芍藥一兩白朮三兩橘皮二兩當歸二兩上十一味以水一斗半先煮小麥竹葉取八升汁去滓內諸藥煮取二升半分三服吐利後腹滿加厚朴二兩炙上氣加吳茱萸半升差理中四順則大熱熱毒霍亂宜竹葉湯忌生蔥海藻菘菜豬肉桃李麻雀肉等竹葉湯治脾疸煩悶口甘咽乾煩渴聖濟淡竹葉切四兩柴胡去苗二兩犀角鎊屑芍藥各一兩半黃芩去黑心大黃銼炒各半兩山梔子七枚上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓下朴硝半錢匕溫服竹葉飲療骨蒸唇乾口燥欲飲水止渴外臺祕要竹葉一握麥門冬一升去心大棗二十枚擘甘草三兩炙半夏一升湯洗令滑盡粳米五合生薑三兩上七味切以水五升煮取二升半分溫服忌羊肉餳海藻菘菜竹瀝湯第一方治四肢不收心神恍惚不知人不能言千金方竹瀝二升生葛汁一升生薑汁三合上三味相和溫暖分三服平旦日晡夜各一服服訖覺四體有異似好次進後湯方竹瀝湯第二方同上竹瀝一升生葛汁五合芎藭防己附子人參芍藥黃芩甘草桂心各一兩生薑四兩羚羊角三兩石膏六兩杏仁四十枚麻黃防風各一兩半上十六味㕮咀以水七升煮減半內瀝煮取二升五合分三服取汗間五日更服一劑頻與三劑漸覺少損仍進後方竹瀝湯第三方同上竹瀝三升防風升麻羚羊角防己桂心芎藭各二兩麻黃三兩上八味㕮咀以水四升合竹瀝煮取二升半分三服兩日服一劑常用加獨活三兩最佳此方神良頻進三劑若手足冷者加生薑五兩白朮二兩若未除更進後方竹瀝湯第四方同上竹瀝一升甘草一本作根二兩人參芎藭獨活升麻各一兩防風麻黃芍藥各一兩半生薑羚羊角石膏防己桂心黃芩附子一作杏仁白朮各二兩上十七味㕮咀以水八升煮減半內瀝煮取二升半分三服相去如人行十里久更服若有氣者加橘皮牛膝五加皮各一兩百合知母湯百合病發汗後者主之金匱百合七枚擘知母三兩切上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煮知母取一升去滓後合和煎取一升五合分溫服百合雞子湯百合病吐之後者主之同上百合七枚擘雞子黃一枚上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內雞子黃攪勻煎五分溫服百合地黃湯百合病不經吐下發汗病形如初者主之同上百合七枚擘生地黃汁一升上以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內地黃汁煎取一升五合分溫再服中病勿更服大便當如漆百合洗方百合病一月不解變成渴者主之同上百合一升上以水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也百合滑石湯百合病變發熱一本作發寒熱者主之同上百合一兩炙滑石三兩上為散飲服方寸匕日三服當微利者止服熱則除安中散治遠年近日脾疼翻胃口吐酸水寒邪之氣留滯於內停滯不消胸膈脹滿攻刺腹脅噁心嘔逆面黃肌瘦四肢倦怠又治婦人血氣刺痛小腹連腰攻注重痛並能治之局方甘草一十兩炒玄胡索去皮良薑炒乾薑炮茴香炒肉桂各五錢牡蠣四兩炒上為細末每服二錢熱酒調下婦人淡醋湯調服如不飲者用鹽湯點下並不拘時安心養血湯若誤用承氣及寒涼剝削之劑變證蜂起卒至殞命宜服此湯溫疫茯神酸棗仁當歸遠志桔梗芍藥地黃陳皮甘草加龍眼肉水煎服安石榴湯廩丘公云吾患痢三十餘年諸療無效唯服比方得愈也療大疰痢及白滯困篤欲死腸已滑醫所不能療方外臺乾薑二兩生薑倍之黃蘗一兩細切石榴一枚小者二枚阿膠二兩別研漬之上四味切以水三升煮取一升二合去滓內膠令煬頓服不差復作療老小亦良人羸者稍稍服之不必頓盡須臾復服石榴預取之肘後同一方無黃蘗用黃連安蟲散蟲痛面皎白心腹痛口中吐沫及清水發痛有時此方主之小兒本怯者多此病積痛食痛虛痛大同小異惟蟲痛者當口淡而沫自出治之隨其證用藥小兒真訣胡粉炒檳榔川楝子鶴蝨炒各二兩白礬五錢上為細末每一字大者半盞溫米飲調下痛時宜服按局方化蟲丹幼幼新書化蟲丹同托裡舉斑湯邪留血分裡氣壅閉則伏邪不得外透而為斑若下之內壅一通則衛氣亦從而疏暢或出表為斑則毒邪亦從而外解矣若下後斑漸出不可更大下設有下證少與承氣緩緩下之若復大下中氣不振斑毒內陷則危宜此湯方溫疫白芍當歸各一錢升麻五分白芷柴胡各七分川山甲二錢炙黃水薑煎服下後斑漸出復大下斑毒後隱反加循衣摸床撮空理線脈漸微者危本方加人參一錢補不及者死若未下而先發斑者設有下證少與承氣須從緩下托裡消毒飲治癰疽已成不得內消者宜服此藥以托之未成者可消已成者即潰腐肉易去新肉易生此時不可用泄氣寒涼等藥致傷脾胃為要正宗人參川芎白芍黃耆當歸白朮茯苓金銀花各一錢白芷甘草皂角針桔梗各五分水二鍾煎八分食遠服脾弱者去白芷加人參行氣香蘇散治內傷生冷飲食厚味堅硬之物肚腹脹滿疼痛外感風寒濕氣頭痛身痛手痛足痛肩臂痛遍身骨節痛麻木發七情惱怒相沖諸氣痞塞飲食不下心腹氣痛古今醫鑑紫蘇一錢陳皮八分香附一錢蒼朮川芎羌活枳殼各八分麻黃一錢甘草三分上銼生薑水煎溫服外感風寒加蔥白三根回春無蒼朮西州續命湯治中風痱一作入藏身體不知自收口不能言冒昧不識人拘急背痛不得轉側方千金麻黃六兩石膏四兩桂心二兩甘草芎藭乾薑黃芩當歸各一兩杏仁三十枚上九味㕮咀以水一斗二升煮取麻黃再沸去上沫後下諸藥煮取四升初服一升猶能自覺者勿熟眠臥可厚覆小汗出已漸減衣勿復大覆可熟眠矣前服不汗者後復一升汗後稍稍五合一服安穩乃服勿頓服也汗出則愈勿復服飲食如常無禁忌勿見風並治上氣咳逆若面目大腫但得臥服之大善凡服此湯不下者當以人口噓其背則下矣病人先患冷汗者不可服此湯若虛羸人當稍與五合為佳間有輒行此湯與産婦及羸人而有害者皆為頓服三升傷多且湯濁不清故也但得清澄而稍稍服微取汗者皆無害也胡洽方古今録驗名大續命湯按外臺有生薑郁李仁防風三味療中風入臟及四肢拘急不隨緩急風方云云肉豆蔻散治脾胃氣虛腹脅脹滿水穀不消藏府滑瀉腹內虛鳴困倦少力口苦舌乾不思飲食漸瘦弱並宜服之局方訶子皮川烏炮去臍肉桂去粗皮茴香炒各二兩厚朴去粗皮薑炒甘草炙乾薑炮橘皮各一兩蒼朮米泔浸一宿去皮焙八兩上為細末每服二錢水一盞生薑二片棗子一枚煎至七分溫服回乳四物湯治産婦無兒吃乳致汁腫脹堅硬疼痛難忍正宗川芎當歸白芍熟地各二錢茶芽二兩炒粗末水二鍾煎八分食遠