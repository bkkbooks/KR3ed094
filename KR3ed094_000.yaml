此湯主之溫疫厚朴芍藥當歸各一錢檳榔二錢甘草七分水薑煎服裡急後重加大黃三錢紅積倍芍藥白積倍檳榔煎服芍藥甘草湯脛尚微拘急主之傷寒太陽白芍藥甘草各四兩炙上二味以水三升煮取一升五合去滓分溫再服芍藥甘草附子湯發汗病不解反惡寒者虛故也主之方同上芍藥甘草各三兩炙附子一枚炮去皮破八片上三味以水五升煮取一升五合去滓分溫三服沉香降氣湯治陰陽壅滯氣不升降胸膈痞塞心腹脹滿喘促短氣乾噦煩滿咳嗽痰涎口中無味嗜臥減食又治胃痹留飲噎醋聞酸脅下支結常覺妨悶及中寒咳逆脾濕洞泄兩脅虛鳴臍下撮痛皆能治之患腳氣人毒氣上衝心腸堅滿肢體浮腫者尤宜服之常服開胃消痰散壅思食局方香附子二十五斤炒去鬚毛沉香一斤二兩半一作十四兩半縮砂仁三斤甘草一斤半炙上為細末每服一錢入鹽少許沸湯點服空心服之去邪惡氣使無瘴疫一本香附子四百兩沉香十八兩半縮砂仁四十八兩甘草一百二十兩沉香天麻湯治癇證或小兒因恐懼發搐搦痰涎有聲吐沫嚼舌目上視項背強直者亦主之衛生寶鑑沉香益智川烏各二錢天麻防風半夏附子各三錢獨活四錢羌活五錢當歸殭蠶各一錢半甘草五分上水煎溫服利咽解毒湯痘有咽喉腫痛者主之保赤全書山豆根一錢麥門冬一錢牛蒡子炒七分玄參七分桔梗七分防風五分甘草二分上七味加緑豆四十九粒水煎服利膈湯治虛煩上盛脾肺有熱咽喉生瘡本事方雞蘇荊芥桔梗炒防風牛蒡子炒甘草各一兩炙人參半兩上細末每一錢沸湯點服如咽痛口瘡甚者加殭蠶一兩何首烏散治婦人血風皮膚瘙癢心神煩悶及血風遊走不定並宜服之大全良方何首烏防風蒺藜枳殼天麻殭蠶胡麻茺蔚子蔓荊子上為細末每二錢煎茵陳湯調下壯原湯治下焦虛寒中滿腫脹小水不利上氣喘急陰囊兩腿皆腫或面有浮氣赤水人參白朮各二錢茯苓破故紙各一錢桂心附子乾薑砂仁各五兩陳皮七分水煎食遠服杉木節湯治腳氣入腹衝心或心脅有塊毒勝痰逆痞滿喘急汗流搐搦昏悶上視咬齒甚至垂絶不知人宜此藥以救急得效方杉木節一大升橘葉一升無葉用皮大腹子十一個連皮銼碎上以童子小便三升煎取一升半分二服若服得快利停後服吳茱萸湯食谷欲嘔屬陽明也此湯主之得湯反劇者屬上焦也傷寒陽明少陰病吐利手足逆冷煩躁欲死者主之同上少陰乾嘔吐涎沫頭痛者主之同上厥陰嘔吐胸滿者用此湯金匱嘔吐吳茱萸一升洗人參三兩生薑六兩切大棗十二枚擘上四味以水七升煮取二升去滓溫服七合日三服貝母湯治諸嗽久不瘥本事方貝母一兩去心薑製半日焙黃芩乾薑生各一兩陳皮去白五味子各一兩揀桑白皮洗淨蜜炙黃半夏湯浸七次柴胡淨洗桂心不見火各半兩木香一分甘草一分上為粗末每服五錢水一盞半杏仁七個去皮尖碎之生薑七片同煎至七分去滓溫服黃師文云戊申冬有姓蔣者其妻積年嗽制此方授之一服瘥以此治諸嗽悉皆愈沃雪湯治傷寒溫疫濕疫熱疫本事方蒼朮乾薑炮甘草炙各六兩防風乾葛厚朴芍藥各四兩上每三錢半水二盞煎七分按百一選方有當歸川芎橘皮無干薑俱九味治同家寶方無干薑有芒硝治山嵐瘴氣皂莢丸咳逆上氣時時吐濁但坐不得眠主之金匱皂莢八兩刮去皮酥炙用上一味末之蜜丸梧子大以棗膏和湯三丸日三夜一服吹喉散治三焦大熱口舌生瘡咽喉腫塞神思昏悶並能治之局方蒲黃一兩盆硝八兩青黛一兩半上用生薄荷汁一升將盆硝青黛蒲黃一處用瓷罐盛慢火熬令乾研細每用一字或半錢摻於口內良久涎出吞之不妨或喉中腫痛用管子入藥半錢許用力吹之無不立效抑肝散治肝經虛熱發搐或發熱咬牙或驚悸寒熱或嘔吐痰涎腹脹少食睡臥不安者直指方當歸白朮茯苓鉤藤各一錢川芎八分柴胡甘草各五分水煎母子俱服走馬湯治中惡痛腹脹大便不通通治飛尸鬼擊金匱杏仁二枚巴豆二枚熬去皮心上二味以綿纏捶令碎熱湯二合捻取白汁飲之當下老少量之疔毒復生湯治疔毒走黃頭面發腫毒氣內攻煩悶欲死者正宗牡蠣山梔銀花木通連翹牛蒡子乳香沒藥角刺花粉大黃地骨皮各八分水酒各一茶鍾煎一半食遠服不能飲者水煎臨服入酒一杯和服亦效脈實便祕者加朴硝快氣湯治一切氣疾心腹脹滿膈噎塞噫氣吞酸胃中痰逆嘔吐及宿食不解不思飲食局方縮砂仁去皮殼八兩甘草四兩爁香附子炒去毛十二兩上為細末每服一錢用鹽湯點下常服快氣進食溫養脾胃或銼為粗末入生薑同煎名小降氣湯妊娠忽暴下血數升胎燥不動方千金方榆白皮三兩當歸生薑各二兩乾地黃四兩葵子一升上五味以水五升取二升半分三服不瘥更作服之妊娠惡阻嘔吐不下食方同上青竹茹橘皮各十八銖茯苓生薑各一兩半夏三十銖上五味㕮咀以水六升煮取二升半分三服不瘥頻作肘後療卒得漆瘡方外臺煮柳葉湯適寒溫洗之柳皮尤妙冷熱久癖不能飲食虛滿如水狀方同上前胡四兩生薑四兩枳實三兩炙半夏四兩洗白朮三兩茯苓四兩甘草二兩半炙桂心二兩上八味以水八升煮取三升分三服八畫治遊風行走無定腫痛或如盤大或如甌或著腹背或著臂或著腳悉主之方千金方海藻獨活茯苓防風附子白朮各三兩大黃五兩當歸一本作當陸鬼箭各一兩上九味㕮咀以酒二斗漬五日初服二合漸加以知為度治急黃熱氣骨蒸兩目赤脈方同上芒硝一兩大黃一兩半生地黃汁八合上三味合和一服五合日二以利為度不須二服治三十年久痢不止方同上厚朴炙乾薑阿膠炙各二兩黃連五兩石榴皮艾葉各三兩上六味切以水七升煮取二升分再服治發黃身面目悉黃如金色小便如濃煮蘗汁衆醫不能療者方同上茵陳梔子各四兩黃芩大黃柴胡升麻各三兩龍膽一兩上七味㕮咀以水八升煮取二升七合分三服若身體羸去大黃加梔子仁五六兩生地黃一升延年祕録無茵陳有梔子四兩栝蔞三兩芒硝二兩近效方加枳實二兩治胸膈心腹中痰水冷氣心下汪洋嘈煩或水鳴多唾口中清水自出脅肋急脹痛不欲食此皆胃氣弱受冷故也其脈喜沉弦細遲悉主之方同上半夏生薑各五兩芍藥二兩茯苓四兩旋覆花細辛橘皮桂心人參桔梗甘草各二兩上十一味㕮咀以水一斗煮取三升分三服病先有時喜水下者用白朮三兩去旋覆花若欲得利者加大黃二兩須微調者用乾地黃治下焦虛熱注脾胃從脾注肺好渴利方同上竹葉切三升甘草三兩炙生薑五兩麥門冬茯苓各四兩大棗七枚小麥一升栝蔞根五兩地骨皮一升上九味㕮咀先以水三升煮小麥取一斗去滓澄清取八升去上沫取七升煮藥取三升分三服平人夏月喜渴者由心王也心王便汗出汗出則腎中虛燥故令渴而小便少也冬日不汗出故小便多而數也此皆是平人之候名曰腎渴但小便利而不飲水者名腎實也外臺治一切氣疾丈夫婦人撞心冷氣並治之本事方香附子一斤炒去毛陳皮四兩去白甘草一兩生上為細末每服二錢空心鹽湯點服治熱中能食小便多漸消瘦方外臺地骨皮切一升麥門冬三兩去心黃連二兩小麥八合人參一兩上五味切以水九升煮取三升八合去滓分為三服間食服之如不能多服分作四五服亦得忌豬肉治卒吐血及衄血主之方千金伏龍肝半斤阿膠黃芩白朮乾薑仲景作地黃甘草各三兩上六味㕮咀以水一斗煮取三升去滓下膠分三服仲景有附子三兩治小兒口瘡方本綱天南星附方白屑如鵝口不須服藥以生天南星去皮臍研末醋調塗足心男左女右治小兒疳口瘡方外科精義天南星一個去皮上為末好醋調攤紙上男左女右貼在腳心底以帛系定三日外取了以溫水洗盡腳下藥附子理中丸治脾胃冷弱心腹絞痛嘔吐泄利霍亂轉筋體冷微汗手足厥寒心下逆滿腹中雷鳴嘔噦不止飲食不進及一切沉寒痼冷並皆主之局方人參去蘆白朮附子炮去皮臍乾薑炮甘草炙各等分為銼散每服四大錢水一盞半煎七分去滓不以時服口噤則斡開灌之附子粳米湯治憂怒相乘神志不守思慮兼併擾亂臟氣不主傳導使諸陽不舒反順為逆中寒氣脹腸鳴切痛胸脅逆滿嘔吐不食得效方腹中寒氣雷鳴切痛胸脅逆滿嘔吐主之金匱腹滿霍亂四逆吐少嘔多者主之外臺一方有乾薑一兩附子一兩炮半夏半斤大棗十枚粳米半升甘草一兩上五味以水八升煮米熟湯成去滓溫服一升日服附子瀉心湯心下痞而復惡寒汗出者主之傷寒太陽大黃二兩黃連一兩黃芩一兩附子一枚炮去皮破別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服附子六物湯治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利手足或時浮腫並皆服之正宗寒濕腳氣疼痛不仁兩尺脈來沉細者此方主之此痹證也三因方附子甘草各一錢防己白朮茯苓各三兩桂心五分水二鍾薑三片煎八分食遠服附子湯少陰病得之一二日口中和其背惡寒者當灸之傷寒少陰少陰病身體痛手足寒骨節痛脈沉者主之同上附子二枚炮去皮破八片茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服按千金方腳氣門附子湯有桂心甘草各三兩俱七味治濕痹緩風身體疼痛如欲折肉如錐刺刀割阿膠散治膿血痢繞臍疼痛阿膠二兩炒當歸炒黃連炒芍藥乾薑炮各一兩上為細末每服以粥飲調下二錢按千金駐車丸無芍藥赤石脂知母麻黃湯治傷寒後不了了朝夕有熱如瘧狀方千金方傷寒瘥後或十數日或半月二十日終不醒醒常昏沉似失精神言語錯謬又無寒熱醫或作鬼祟或作風疾多般治不瘥或朝夕潮熱頰赤或有寒熱似瘧都是發汗不盡餘毒在心胞絡之間所致活人書知母二兩麻黃甘草芍藥黃芩桂心各一兩上六味㕮咀以水七升煮取二升半服五合日三溫覆令微汗若少煩不得眠其人欲飲水當稍稍飲之令胃中和則愈知母湯療傷寒骨節痛頭痛眼睛疼咳嗽方外臺乾葛三兩知母二兩芍藥三兩石膏四兩碎裹黃芩三兩杏仁一兩去皮尖及雙仁梔子仁三兩擘貝母三兩上八味切以水七升煮取二升五合去滓分為三服如人行八九里再服忌蒜面七日知母鱉甲湯療溫瘧壯熱不能食方同上知母鱉甲炙地骨皮各三兩常山二兩竹葉切一升石膏四兩碎上六味切以水七升煮取二升五合去滓分三服忌蒜豬肉莧菜生蔥生菜知母茯苓湯肺痿喘嗽往來寒熱自汗聖濟知母白朮各八分茯苓去皮五味子人參阿膠各五分款冬花桔梗麥門冬各七分半夏湯泡七次柴胡甘草炙各一錢薄荷川芎各五分上十四味粗搗篩每服二錢匕水一盞入生薑五片煎至七分去滓食後服定志下氣方治奄奄忽忽朝瘥暮劇驚悸心中憧憧胸滿不下食陰陽氣衰脾胃不磨不欲聞人聲千金方人參茯苓遠志甘草枳實當歸龍齒桔梗各二兩半夏桂心各五兩黃耆四兩生薑六兩茯神二兩大棗二十枚上十四味㕮咀以水一斗二升先煮粳米五合令熟去滓次內藥煮取四升一服八合日三夜二定痛散治蟲牙痛甚回春當歸生地細辛乾薑白芷連翹黃連花椒苦參桔梗烏梅甘草各等分上銼一劑水煎先噙漱後咽下定喘湯治哮吼喘急同上麻黃三錢杏仁去皮尖二錢半片芩去朽半夏薑製桑皮蜜炙蘇子水洗去土款冬花蕊各三錢甘草一錢白果二十一個去殼切碎上銼一劑水煎服抵當湯太陽病六七日表證仍在而反下之脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也主之傷寒太陽太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血結證也此湯主之同上陽明證其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑者宜此湯下之同上陽明病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜此湯同上婦女經水不利下主之亦治男子膀胱滿急有瘀血者全匱婦人水蛭熬虻蟲三十個去翅足熬桃仁二十個去皮尖大黃三兩酒洗上四味以水五升煮取三升去滓溫服一升不下更服抵當丸傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜此丸傷寒太陽水蛭二十個熬虻蟲二十個去翅足熬桃仁二十五個去皮尖大黃三兩上四味搗分四丸以水一升煮一丸取七合服之晬時當下血若不下者更服奔氣湯主大氣上奔胸膈中諸病每發時迫滿短氣不得臥劇者便將欲死腹中冷濕氣腸鳴相逐成結氣方千金療卒厥逆上氣氣支兩脅心下痛滿淹淹欲絶此謂奔豚病從卒驚怖憂迫得之氣從下上上衝心胸臍間築築發動有時不療殺人外臺甘草二兩炙人參一兩吳茱萸一升生薑一斤半夏一升桂心三兩上六味㕮咀以水一斗煮取三升分四服此藥須預畜得病便急合服奔豚湯奔豚氣上衝胸腹痛往來寒熱主之金匱療手足逆冷胸滿氣促從臍左右起沖者外臺甘草芎藭當歸各二兩半夏四兩黃芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一斤上九味以水二斗煮取五升溫服一升日三夜一服外臺祕要方無芍藥當歸有桂心栝蔞各二兩固本養榮湯治骨疽已成骨不吐出或既出不能收斂由氣血之虛脾弱也宜服之骨不出者自出不收斂者自斂正宗川芎當歸白芍熟地白朮山藥人參牡丹皮黃耆茱萸各一錢甘草肉桂五味子各五分水二鍾薑三片棗二枚煎八分食前服炙甘草湯傷寒脈結代心動悸主之傷寒太陽脈按之來緩時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動者名曰代陰也得此脈者必難治同上治虛勞不足汗出而悶脈結悸行動如常不出百日危急者十一日死金匱治肺痿涎唾多心中溫溫液液者同上甘草四兩生薑三兩切人參二兩阿膠二兩生地黃一斤桂枝三兩去皮麥門冬半斤去心麻子仁半斤大棗三十枚擘上九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡溫服一升日三服一名復脈湯門冬甘露飲治麻疹熱甚而渴醫通麥門冬二錢去心黑玄參黃芩栝蔞根連翹各一錢生甘草五分燈芯草莖竹葉七片水煎溫服來蘇散治傷風及陰陽二毒傷寒魏氏家藏方蒼朮八錢炒香附子四錢甘草一錢炙陳皮紫蘇各二錢上每二錢水一盞半薑三片煎一盞溫服和解湯治血氣虛弱外感寒邪身體疼倦壯熱惡寒腹中㽱痛鼻塞頭昏痰多咳嗽大便不調十便芍藥桂各二兩厚朴甘草乾薑白朮人參茯苓各一兩半上為粗末二錢水一盞生薑三片棗一個煎六分溫服按楊氏方十味和解散比此方則有桔梗當歸陳皮枳殼防風無桂乾薑茯苓冶頭痛發熱肢體倦怠又百一選方和解湯羌活防風川芎人參乾葛升麻甘草各半兩又魏氏方無川芎只六味治小兒四時感冒寒邪壯熱煩躁鼻多涕驚悸自汗肢節疼痛及麩瘡豆瘡已發未發者皆可服青蒿散治虛勞骨蒸咳嗽胸滿皮毛乾枯四肢怠墮骨節疼痛心中驚悸咽燥唇焦面赤煩躁涕唾腥臭困倦夜多盜汗肌體潮熱飲食減少日漸瘦弱事證方天仙藤即青木香鱉甲酢炙香附子炒去毛桔梗去蘆頭柴胡去苗秦艽青蒿以上各一兩烏藥半兩甘草炙一兩半川芎二錢半上十味以水和服方寸匕日三服小便即利陰頭微腫則愈矣婦人病取男子褲襠燒服承氣養榮湯溫疫熱渴未除里症仍在者主之溫疫知母當歸芍藥生地黃大黃枳實厚朴等分水薑煎服痰涎湧甚胸膈不清者宜蔞貝養榮湯九畫枳殼散治五種積膈氣三焦痞塞胸膈滿悶背膂引疼心腹膨脹脅肋刺痛食飲不下噎塞不通嘔吐痰逆口苦吞酸羸瘦少力短氣煩悶常服順氣寬中消痃癖積聚散驚憂恚氣宜服同上又局方名膈氣散枳殼去穰銼麩炒荊三稜橘皮益智仁蓬莪朮檳榔肉桂不見火各一兩或各六錢乾薑炮厚朴去粗皮薑汁炙甘草炙青皮肉豆蔻木香各半兩或各三兩上為細末每服二錢水一盞生薑五片棗一個同煎至七分熱服鹽點亦得不拘時候枳實散治心下蓄積痞悶或作痛多噫敗卵氣本事方香附子一兩麩炒舂去皮白朮各半兩枳實去穰銼麩炒檳榔三錢上為細末每服二錢米飲調下日三服不拘時候龐老枳殼煮散治悲哀煩惱傷肝氣至兩脅骨疼筋脈緊急腰腳重滯兩股筋急兩脅牽動四肢不能舉漸至脊膂攣急此藥大治脅痛同上枳殼去穰麩炒黃細辛去葉桔梗炒防風去叉股川芎各四兩葛根一兩半甘草二兩炙上粗末每服四錢水一盞半薑三片煎至七分去滓空心食前溫服枳實梔子豉湯大病差後勞復者主之傷寒枳實三枚炙梔子十四個擘香豉一分綿裹上三味以清水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓分溫再服覆令微似汗若宿食者內大黃如博棋子五六枚服之愈枳實芍藥散産後腹痛煩滿不得臥主之金匱師曰産後腹痛法當以此湯假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利同上枳實燒令黑勿太過芍藥等分上二味杵為散服方寸匕日三服並主癰膿以麥粥下之枳實白朮湯心下堅大如盤邊如旋杯水飲所作主之外臺枳實七枚白朮三兩上二味切以水一斗煮取三升分溫三服腹中耎即當瘥也此出姚大夫方忌桃李雀肉等物枳實薤白桂枝湯胸痹心下痞留氣結在胸脅滿脅下逆搶心主之人參湯亦主之金匱枳實四枚厚朴四枚薤白半斤桂枝一兩栝蔞實一枚搗上五味以水五升先煮枳實厚朴取二升去滓內諸藥煮數沸分溫三服枳實大黃湯治痧毒結於大腸之劑玉衡赤芍藥青皮枳實桃仁去皮尖金銀花槐花黃芩酒炒大麻仁連翹各一錢大黃三錢水煎微溫服枳實大黃湯治胸腹有食積大便不通者回春枳實厚朴去皮大黃檳榔各二錢甘草三分上銼一劑水煎空中溫服以利為度不可再服腹痛甚加木香五分枳縮二陳湯治涎在心膈上攻走腰背嘔噦大痛同上枳實麩炒砂仁半夏薑汁炒陳皮香附各一錢木香草蔻乾薑各五分厚朴薑汁炒茴香酒炒延胡各八分甘草二分上銼一劑薑三片入竹瀝磨木香同服香附子湯治血崩不止永嘉陳旡擇用此方妙甚勿謂藥粗賤而輕之合時當以斤計大劑服之方見奇效事證方香附子不拘多少去毛並黑皮炒深色焦不妨上為細末入鹽少許沸湯點服不拘時候香蘇散治四時溫疫傷寒局方陳皮二兩不去白香附子炒香去毛紫蘇葉各四兩甘草炙一兩上為粗末每服三錢水一盞煎七分去滓熱服不拘時候日三服若作細末只服二錢一本作三錢入鹽點服得效方有蒼朮二兩又云加沉香名沉香飲子治四時傷寒傷風傷濕傷食大人小兒皆可服又加川芎白芷各二兩名芎芷香蘇散引管見大全良方香薷散治臟腑冷熱不調飲食不節或食腥膾生冷過度或起居不節或露臥濕地或當風取涼或風冷之氣歸於三焦傳於脾胃得冷不能消化水穀致令真邪相干腸胃虛弱因飲食變亂於腸胃之間便致吐利心腹疼痛霍亂氣逆有心痛而先吐者有腹痛而先利者有吐利俱發者有發熱頭痛體疼而復吐利虛煩者或但吐利心腹刺痛者或轉筋拘急疼痛或但嘔而無物出或四肢逆冷而脈欲絶或煩悶昏塞而死者此藥悉能主之同上香薷去土一斤白豆蔻微炒厚朴去粗皮薑汁塗炙令黃各半斤上為粗末每服三錢水一盞入酒一分至煎至七分去滓水中沉冷連吃二服立有神效隨病不拘時候活人書方不用白扁豆加黃連四兩銼碎以生薑汁同研勻炒令黃色名曰黃連香薷散香砂養胃湯治脾胃不和不思飲食口不知味痞悶不舒回春香附炒砂仁蒼朮米泔制炒厚朴薑汁炒陳皮各八分人參五分白朮茯苓去皮各八分木香五分白豆蔻去殼七分甘草炙五分上銼薑棗煎服香砂平胃散治傷食同上香附炒一錢砂仁七分蒼朮米泔制炒一錢陳皮一錢甘草五分枳實麩炒八分木香五分藿香八分上銼一劑薑一片水煎服香砂六君子湯治脾胃虛弱噁心嘔吐或飲食不思等症正宗人參白朮茯苓陳皮半夏各一錢甘草藿香砂仁各五分薑三片棗二枚水二鍾煎八分食遠服禹餘糧丸治腸胃虛寒滑泄不禁濟生方禹餘糧煆赤石脂煆龍骨蓽茇訶子煆乾薑炮肉豆蔻煆附子炮上等分為細末醋糊丸梧子大每七十丸米飲送下食前栝蔞桂枝湯太陽症其證備身體強𠘧𠘧然脈反沉遲此為痙主之金匱痙濕栝蔞根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上六味以水九升煮取三升分溫服取微汗汗不出食頃啜熱粥發之栝蔞薤白白酒湯胸脾之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數主之金匱胸痹栝蔞實一枚搗薤白半斤白酒六升上三味同煎煮取二升分溫再服栝蔞薤白半夏湯胸痹不得臥心痛徹背者主之同上薤白去白半夏半斤白酒一升栝蔞根一枚上四味同煮取四升溫服一升日三服栝蔞瞿麥丸小便不利者有水氣其人若渴主之同上小便栝蔞根二兩茯苓薯蕷各三兩附子一枚炮之瞿麥一兩上五味末之煉蜜丸梧子大飲服三丸日三服不知增至七丸以小便利腹中溫為知栝蔞牡蠣散百合病渴不差者主之同上百合栝蔞根牡蠣熬等分上為細末飲方寸匕日三服栝蔞枳實湯治痰結咯吐不出胸膈作痛不能轉側或痰結胸膈滿悶作寒熱氣急並痰逆心竅不能言語者並皆治之回春栝蔞去殼枳實麩炒桔梗去蘆茯苓去皮貝母去心陳皮片芩去朽山梔各一錢當歸六分砂仁木香各五分甘草三分上銼一劑生薑煎入竹瀝薑汁少許同服前胡瀉肝除熱湯療肝勞虛熱面目為赤閉塞不開煩悶宛轉熱勢竄胸同上前胡乾薑大青細辛秦皮決明子梔子仁子芩各一兩淡竹葉切一升車前子切一升石膏八兩碎綿裹上十一味切以水一斗煮取三升去滓平旦分為三服須利加芒硝三兩忌生菜前胡湯療天行壯熱咳嗽頭痛心悶方同上前胡升麻各八分貝母紫菀各六分石膏十二分碎綿裹麥門冬八分去心杏仁三十枚去皮尖兩仁竹葉切一升甘草二分炙上九味切以水八升煮取二升五合絞去滓分溫三服相去如人行六七里進一服不吐利差忌海藻菘菜油膩豬魚等前胡建中湯治大勞虛弱寒熱嘔逆下焦虛熱小便赤痛客熱上熏頭目及骨肉疼痛口乾方千金前胡三兩黃耆芍藥當歸茯苓桂心各二兩甘草一兩生薑八兩白糖六兩人參半夏各六兩上十一味㕮咀以水一斗二升煮取四升去滓內糖分四服前胡牡丹湯治婦人盛實有熱在腹月經瘀閉不通及勞熱熱病後或因月經未得熱不通方同上前胡牡丹玄參桃仁黃芩射干甘草旋覆花栝蔞根各二兩芍藥茯苓大黃枳實各三兩上十三味㕮咀以水一斗煮取三升分為三服風疹遍身主之方外臺麻黃去節生薑各三兩防風二兩芎藭芍藥當歸蒺藜子甘草炙獨活烏喙人參各一兩上十一味切以水九升煮取二升八合絞去滓分溫三分訖進粥食三日慎生冷醋滑豬肉冷水海藻菘菜風痰飲氣逆滿噁心不能食方同上人參二兩枳實炙白朮各三兩生薑四兩桂心一兩半上五味切以水五升煮取一升五合分溫三分忌桃李雀肉生蔥風引湯治除熱癰癇金匱中風治大人風引少小驚癇瘈瘲日數十發醫所不療除熱方巢氏云腳氣宜風引湯同上大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫英石石膏各六兩上十二味杵粗篩以葦囊盛之取三指撮井花水三升煮三沸溫服一升風引獨活方治腳氣兼補方千金獨活四兩茯苓三兩甘草炙三兩升麻一兩半人參二兩桂心一兩防風二兩芍藥二兩當歸二兩黃耆乾薑各二兩附子一兩炮大豆二升上十三味㕮咀以水九升清酒三升合煮取三升半去滓分四服相去二十里久更進服風緩湯治腳弱舉體痹不仁熱毒氣入藏胸中滿塞不通即嘔吐方千金方獨活麻黃犀角各三兩一方用羚羊角半夏一升大棗烏梅各十二枚桂心鱉甲升麻橘皮枳實甘草吳茱萸大黃各二兩生薑石膏各六兩貝母七枚上十七味㕮咀以水一斗四升煮取四升分五服日三夜二不差至三劑必差活血湯治死血痛並治血結痛回春歸尾赤芍桃仁去皮烏藥牡丹皮玄胡索香附子別磨各五錢川芎七分甘草二分上銼一劑薑一片水煎服活血散瘀湯治臀癰初起紅赤腫痛墜重如石及大便祕澀正宗川芎當歸防風芍藥蘇木連翹天花粉皂角針紅花黃芩枳實各一錢大黃二錢水二鍾煎八分服食前便通者去大黃加乳香活絡透毒飲治痘收靨時熱毒留連愁容可掬將來餘毒在所不免卻不易來者主之急編瑣言治痧後熱毒流連餘毒在所不免卻不易來者以此湯預治之玉衡羌活紅花荊芥牛蒡子木通當歸牛膝蟬退青皮連翹甘草上水煎溫服胃風湯治大人小兒風冷乘虛入客腸胃水穀不化泄瀉注下腹脅虛滿腸鳴㽱痛及腸胃濕毒下如豆汁或下瘀血日夜無度並宜服之局方白芍藥白朮肉桂去粗皮人參去蘆當歸去苗芎藭茯苓去皮各等分上為粗末每服二錢以水一大盞入粟米百餘粒同煎至七分去滓稍熱服空心下小兒量力減之胃苓湯治脾胃不和腹痛泄瀉水穀不化陰陽不分回春蒼朮米泔制厚朴薑汁炒陳皮豬苓澤瀉白朮去蘆茯苓去皮白芍煆各一錢肉桂甘草炙各二分上銼一劑生薑棗子煎空心溫服苦酒湯少陰病咽中傷生瘡不能言語聲不出者主之傷寒半夏破如棗核十四枚洗雞子一枚去黃內上苦酒著雞子殼中上二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更作三劑苦參丸治遍身瘙癢癬疥瘡瘍方準繩苦參四兩玄參黃連去須大黃銼碎炒香獨活去蘆枳實去穰炒防風各二兩黃芩去黑心梔子仁菊花各一兩上為細末煉蜜和搗千餘下丸如梧子大每服三十丸食後漿水下日進三服茶酒任下亦得範汪木防己湯療腫患下水氣四肢腫聶聶動外臺防己三兩甘草炙桂心各二兩茯苓六兩黃耆三兩生薑二兩白朮三兩芍藥二兩上八味切以水八升煮取三升二合分四服有人患下是胃寒加當歸三兩人參二兩龍骨二兩水一斗煮取三升二合分四服金匱防己黃耆湯防己茯苓湯兩合方加芍藥一味也思仙續斷丸治肝腎風虛氣弱腳膝不可踐地腰脊疼痛風毒流疰下脛行止艱難小便餘瀝此藥補五臟內傷調中益精涼血堅強筋骨益智輕身耐老本事方思仙術五加皮防風薏苡仁羌活川續斷牛膝各三兩萆薢四兩生乾地黃五兩上細末好酒三升化青鹽三兩用大木瓜半斤去皮子以鹽酒煮木瓜成膏和杵丸如梧子大每服五十丸空心食前溫酒鹽湯下膏子少益以酒糊俞山人降氣湯治陽虛上攻氣不升降上盛下虛膈壅痰實喘滿咽乾不利煩渴引飲頭目昏眩腰腳無力四肢倦怠咳嗽兼治風濕腳氣局方蘇子炒前胡厚朴炒半夏炙甘草炙橘皮五加皮薑炙當歸桂心黃耆各一兩人參附子炮桔梗羌活乾薑炮各半兩上每三錢水一盞半紫蘇三葉薑三片棗一枚煎七分食後服洗肝散治風毒上攻暴作赤目腫疾難開隱澀眵淚昏暗羞明或生翳膜局方山梔取仁川芎防風薄荷去梗當歸去蘆大黃炮羌活去蘆甘草炙各二兩上為末每服二錢冷水或熱水食後調下日三服見效扁豆湯療霍亂吐痢方扁豆葉一升香薷葉一升木瓜一枚乾薑一兩上四味以水六升煮取二升五合絞去滓分溫三服服別相去如人行六七里服並無所忌保元湯治痘癰出膿之後脾胃虛弱膿清不斂者正宗人參黃耆白朮各一錢甘草三分薑一片棗二枚水二鍾煎八分食遠服或加桂助參耆之力柏葉湯吐血不止者主之金匱血病柏葉乾薑各三兩艾三把上三味以水五升取馬通汁一升合煮一升溫服紅藍花酒婦人六十二種風及腹中血氣刺痛主之金匱婦人紅藍花一兩上一味以酒一大升煎減半頓服一半未止再服厚朴七物湯病腹滿發熱十日脈浮而數飲食如故主之金匱腹滿主腹滿氣脹外臺腹滿發熱以陽並陰則陽實陰虛陽盛生外熱陰虛生內熱脈必浮數浮則為虛數則為熱陰虛不能宣導飲食如故故致脹滿者為熱脹得效方厚朴半斤甘草三兩大黃二兩大棗十枚枳實五枚桂枝二兩生薑五兩外臺作乾薑上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合千金一方加芒硝二兩寒多者加生薑至半斤厚朴生薑半夏甘草人參湯發汗後脹脹滿者主之傷寒太陽厚朴半斤炙去皮生薑半斤切人參一兩半夏半斤洗甘草一兩上五味以水一斗煮取三斤去滓溫服一升日三服厚朴三物湯腹中寒氣雷鳴切痛胃胸逆滿嘔吐附子粳米湯主之而痛閉者主之金匱寒疝厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度千金加芒硝二兩治腹滿發熱數十日脈浮而數飲食如故厚朴人參湯療霍亂心腹痛煩嘔不止外臺厚朴四兩橘皮二兩人參二兩高良薑當歸各一兩藿香一兩上六味以水七升煮取二升五合絞去滓分溫三服服別相去如人行六七里再服忌生冷黏膩厚朴桂心湯療霍亂後渴口乾腹痛不止者同上厚朴四兩炙桂心二兩上二味切以水四升煮取一升二合絞去滓內分六合細細飲之服了如其渴欲得冷水盡意飲之厚朴湯療霍亂後不飲食胃弱嘔吐不止同上厚朴四兩炙干扁豆葉二兩茯苓三兩白朮五兩人參三兩上五味切以水七升煮取二升分三服忌如法厚朴麻黃湯咳而脈浮者主之金匱肺痿厚朴五兩麻黃四兩半夏半斤石膏雞子大杏仁半升乾薑二兩細辛二兩小麥一升五味子半升上九味以水一斗二升先煮小麥熟去滓內諸藥煮取三升溫服一升日三服厚朴大黃湯支飲胸滿者主之同上支飲厚朴一尺大黃六兩枳實四枚上三味以水五升煮取二升分溫再服厚朴煮散治胃風冷氣攻心腹脹滿疼痛飲食不消四肢羸瘦方聖濟厚朴去粗皮炙薑汁訶梨勒煨去株各一兩半木香蒼朮米泔漬一宿切焙枳殼去瓤麩炒當歸切焙桔梗去蘆頭炒一兩陳橘皮湯浸去白焙各二兩上八味搗羅為散每服三錢匕水一盞棗一枚去核煎至七分溫服不拘時厚朴湯脾胃不和化癖氣調中藏及下急懊同上厚朴去粗皮四兩生薑二兩同杵陰一二日暴乾白朮四兩陳橘皮湯浸去白焙三兩烏藥湯浸銼炒甘草炙各二兩上五味粗搗篩每服二錢匕水一盞入生薑三片大棗二枚擘破同煎至七分去滓溫服十畫胸中痰飲腹中水鳴食不消嘔吐水湯方外臺大腹檳榔四十枚生薑八兩半夏半升洗杏仁四兩去皮尖橘皮三兩茯苓五兩白朮切四兩上七味切以水一斗煮取三升去滓分三服忌羊肉餳大酢桃李雀肉等古今録驗同桂枝湯太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者主之傷寒太陽太陽病頭痛發熱汗出惡風主之同上太陽病下之後其氣上衝者可與此湯用前方若不上衝者不可與之同上太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與之也觀其脈症知犯何逆隨證治之同上桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之也常須識此勿令誤也同上若酒客病不可與此湯得之則嘔酒客不喜甘故也同上太陽病初服此湯反煩不解者先刺風池風府卻與此湯則愈同上凡服此湯吐者其後必吐膿血也同上服此湯大汗出脈洪大者與此湯如前法若形似瘧一日再發者汗出必解宜桂枝二麻黃一湯同上太陽病外證未解脈浮弱者當以汗解宜此湯同上太陽病外證未解不可下之也下之為逆欲解外者宜此湯同上太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜此湯同上病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣諧和故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜此湯同上病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜此湯同上傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜此湯同上傷寒發汗已解半日許復煩脈浮數者可更發汗宜此湯同上傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜此湯同上太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜此湯同上傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜此湯攻痞宜大黃黃連瀉心湯同上陽明病脈遲汗出多微惡寒者表未解也可發汗宜此湯同上陽明病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜此湯同上太陰者脈浮者可發汗宜此湯同上太陰太陽病不解熱結膀胱其人如狂血自下下者愈其外未解者尚未可攻當先解其外屬此湯症同上可發汗篇下利後身疼痛清便自調者急當救表宜此湯發汗同上下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜此湯同上厥陰吐利止而身痛不休者當消息和解其外宜此湯小和之同上霍亂師曰婦人得平脈陰脈小弱其人渴不能食無塞熱名妊娠主之於法六十日當有此症設有醫治逆者卻一月加吐下者則絶之金匱妊娠産後中風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在耳可陽旦湯同上雜篇桂枝三兩去皮芍藥三兩甘草炙二兩生薑三兩切大棗十二枚擘上五味㕮咀三味以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流離病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出乃服之二三劑禁生冷黏滑肉面五辛酒酪臭惡等桂枝加桂枝湯燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與此湯更加桂二兩也傷寒太陽本曰桂枝湯今加桂滿五兩所以加桂者以能泄奔豚氣也桂枝加芍藥湯本太陽病醫下之因爾腹滿時痛者屬太陰也此湯主之同上太陰太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也下利者先煎芍藥三沸同上本曰桂枝湯今加芍藥三兩桂枝去芍藥湯太陽病下之後脈促胸滿者主之同上太陽本曰桂枝湯今去芍藥將息如前法桂枝去芍藥加附子湯服前方若微惡寒者宜此湯同上本曰桂枝湯今去芍藥加附子一枚將息如前法桂枝加附子湯太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者主之同上本曰桂枝湯今加附子一枚將息如前法桂枝附子湯傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者主之金匱桂枝二兩去皮附子三枚炮去皮破生薑三兩切大棗十二枚擘甘草三兩炙上五味以水六升煮取二升去滓分溫三服桂枝加大黃湯大實痛者主之傷寒太陽桂枝三兩去皮大黃二兩芍藥六兩生薑三兩切甘草一兩炙大棗十二枚擘上六味以水七升煮取三升去滓溫服一升日三服桂枝加厚朴杏子湯太陽病下之微喘者表未解故也主之傷寒太陽喘家作桂枝湯加厚朴杏子佳同上桂枝三兩去皮甘草二兩炙生薑三兩切芍藥三兩大棗十二枚擘厚朴二兩去皮杏仁五十枚去皮尖上七味以水七升微火煮取三升去滓溫服一升覆取微似汗桂枝附子去桂加朮湯若其人大便硬小便自利者主之同上附子三枚炮去皮破白朮四兩生薑三兩切甘草二兩炙大棗十二枚擘上五味以水六升煮取二升去滓分溫三服初一服其人身如痹半日許復服之三服都盡其人如冒狀勿怪此以附子術並走皮內遂水氣未得除故硬小便自利去桂也以大便不硬小便不利當由附子三枚恐多也虛弱家及産婦宜減服之桂枝二麻黃一湯服桂枝湯大汗出若脈洪大者與桂枝湯若形似瘧一日再發者汗出必解此湯主之同上桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏仁十六個去皮尖甘草一兩二銖大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本曰桂枝湯二分麻黃湯一分合為二升分再服今合為一方將息如前法桂枝二越婢一湯太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可復發其汗宜此湯同上桂枝去皮芍藥麻黃甘草炙各十八銖大棗四枚擘生薑一兩三銖切石膏二十四銖碎綿裹上七味以水五升煮麻黃一二沸去上沫內諸藥煮二升去滓溫服一升本曰當裁為越婢湯桂枝湯合之飲一升今合為一方桂枝湯二分越婢湯一分桂枝麻黃各半湯太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自下一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜此湯同上桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃各一兩去節大棗四枚擘杏仁二十四枚湯浸去皮尖兩仁者上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合本曰桂枝湯二合麻黃湯三合併為六合頓服將息如上法桂枝加葛根湯太陽病項背𠘧𠘧反汗出惡風者主之同上葛根四兩麻黃三兩去節芍藥二兩生薑三兩切甘草二兩炙大棗十二枚擘桂枝二兩去皮上七味以水一斗先煮麻黃葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥如桂枝法將息及禁忌臣億等謹按仲景本論太陽中風自汗用桂枝傷寒無汗用麻黃今證云汗出也第三卷有葛根湯惡風而方中有麻黃恐非本意證云無汗惡風正與此方同是合麻黃也此云桂枝加葛根湯恐是桂枝中但加葛根耳桂枝甘草湯發汗過多其人叉手自冒心心下悸欲得按者主之同上桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去滓頓服桂枝甘草龍骨牡蠣湯火逆下之因燒針煩躁者主之同上桂枝一兩去皮甘草二兩炙牡蠣二兩熬龍骨二兩上四味以水五升煮取二升半去滓溫服八合日三服桂枝去芍藥加蜀漆牡蠣龍骨救逆湯太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足燥擾捻衣摸床小便利者其人可治傷寒太陽形作傷寒其脈不弦緊而弱弱者必渴被火必讝語弱者發熱脈浮解之當汗出愈同上太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪同上脈浮而熱甚而反灸之此為實實以虛治因火而動必咽燥吐血同上微數脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也同上脈浮宜似汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解同上傷寒脈浮醫以火迫卻之亡陽必驚狂臥起不安者主之同上火邪者此湯主之金匱胸滿桂枝三兩去皮金作二兩龍骨四兩大棗十二枚擘生薑三兩切金作六兩甘草二兩炙金作三兩蜀漆三兩洗去腥牡蠣五兩熬上七味以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升桂枝去桂加茯苓白朮湯服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者主之傷寒太陽本曰桂枝湯今去桂枝加茯苓白朮各三兩桂枝加芍藥生薑各一兩人參三兩新加湯發汗後身疼痛脈沉遲者主之同上本曰桂枝湯今加芍藥生薑人參桂枝去芍藥加黃辛附子湯氣分心下堅大如盤邊如旋杯水飲所作主之金匱水氣桂枝三兩生薑三兩甘草二兩大棗十二枚麻黃二兩細辛二兩附子一枚炮上七味以水七升煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈桂枝人參湯太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者主之傷寒太陽太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血同上桂枝四兩別切甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升內桂更煮取三升溫服一升日再服夜一服桂枝去芍藥加皂莢湯治肺痿吐涎沫金匱肺痿桂枝生薑各三兩甘草二兩大棗十枚皂莢二枚去皮子炙焦上五味以水七升微微火煮取三升分溫三服桂枝加龍骨牡蠣湯夫失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交主之金匱血痹桂枝芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩上七味以水七升煮取三升分溫三服按小品曰虛弱浮汗出者除桂加白薇附子各二分桂枝芍藥知母湯少陰脈浮而弱弱則血不足浮則為風風血相搏即疼痛如掣盛人脈澀小短氣自汗出歷節疼痛不可屈伸此皆飲灑汗出當風所致金匱風濕諸肢節疼痛身體尩羸腳腫如脫頭痃短氣溫溫欲吐主之同上中風桂枝四兩芍藥二兩甘草二兩麻黃二兩生薑五兩白朮五兩知母四兩防風四兩附子二兩炮上九味以水七升煮取二升溫服七合日三服桂枝茯苓丸婦人宿有症病經斷不及三月而得漏下不止胎動在臍上者為症痼害金匱婦人妊娠六月動者前三月經水利時胎下血者後斷二月不血也所以血不止者其症不下去故也當下其症主之同上桂枝茯苓牡丹去心桃仁去皮尖熬芍藥各等分上五味末之煉蜜和丸如兔屎大每日食前服一丸不知加至三丸桂枝枳實湯心中痞諸逆心懸痛主之同上胸痹桂枝生薑各三兩枳實五枚上三味以水六升煮取三升分溫三服桂枝加黃耆湯黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此勞氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗主之金匱水氣諸病黃家但利其小便假令脈浮當以汗解之宜此湯同上黃疸桂枝芍藥各三兩甘草二兩生薑三兩大棗十二枚擘黃耆二兩上六味以水八升煮取三升溫服一升須臾飲熱稀粥一升余以助藥力溫覆取微汗若不汗更服柴胡桂枝幹薑湯傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也主之傷寒論太陽下治瘧寒多微有熱或但寒而不熱者服一劑如神金匱瘧論柴胡半斤桂技三兩去皮乾薑二兩栝蔞根四兩黃芩三兩牡蠣二兩熬甘草二兩炙上七味以水一斗二升煮六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈柴胡桂枝湯婦人傷寒發熱經水適來晝日明瞭暮則讝語如見鬼神狀者此為熱入血室無犯胃氣及上二焦必自愈同上太陽下傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者主之同上發汗多亡陽讝語者不可下與此湯和其榮衛以通津液後自愈同上治寒疝腹中痛者外臺治心腹卒中痛者主之金匱寒疝桂枝去皮黃芩各一兩半人參一兩半甘草一兩炙半夏二合半洗柴胡四兩芍藥一兩半大棗六枚擘生薑一兩半切上九味以水七升煮取三升去滓溫服一升柴胡加芒硝湯傷寒十三日不解胸滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之此非其治也潮熱者實也先宜服小柴胡湯以解外後以此湯下之傷寒太陽柴胡二兩十六銖黃芩一兩人參一兩甘草一兩炙生薑二兩切半夏二十銖一本云五枚洗大棗四枚擘芒硝二兩上八味以水四升煮取二升去滓內芒硝更煮微沸分溫再服不解更作柴胡去半夏加栝蔞湯治瘧病發渴者亦治勞瘧金匱瘧論柴胡八兩人參黃芩甘草各三兩生薑二兩栝蔞根四兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日二服柴胡加龍骨牡蠣湯傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者主之傷寒太陽中半夏二合半洗大棗六枚擘柴胡四兩生薑一兩半桂技去皮一兩半人參一兩半龍骨一兩半鉛丹一兩半茯苓一兩半大黃三兩牡蠣一兩半熬黃芩一兩半上十二味以水八升煮取四升內大黃切如棋子更煮一兩沸去滓溫服一升柴胡清燥湯溫疫下後或數下膜原尚有餘邪未盡傳胃邪熱與衛氣相併故熱不能頓除當寬緩兩日俟餘邪入胃再下之宜此湯緩劑調理方溫疫柴胡黃芩陳皮甘草花粉知母薑棗煎服柴胡養榮湯表有餘熱宜此湯同上柴胡黃芩陳皮甘草當歸白芍生地黃知母天花粉薑棗煎服里證未盡宜承氣養榮湯柴胡湯溫疫下後續得盜汗者表有微邪也若邪甚竟作自汗伏邪中潰則作戰汗矣凡人目張則衛氣行於陽目瞑則衛氣行於陰行陽謂升發於表行陰謂斂降於內今內有伏熱而又遇衛氣兩陽相搏熱蒸於外腠理開而盜汗出矣若內伏之邪一盡則盜自止設不止者宜此湯同上柴胡三錢黃芩一錢陳皮一錢甘草一錢生薑一錢大棗二枚水煎溫服古方用人參半夏今表裡實故不用人參無嘔吐不加半夏柴胡丁香湯治婦人年三十歲臨經先腰臍痛甚則腹中亦痛經縮三兩日蘭室祕藏羌活防風當歸身以上各一錢生地黃二兩丁香四兩柴胡一錢五分全蠍一個上件都作一服水二盞煎至一盞去渣食前稍熱服柴胡勝濕湯治外腎冷兩髀陰汗前陰痿陰囊濕癢臊氣蘭室祕藏柴胡生甘草酒黃蘗以上各二錢升麻澤瀉以上各一錢五分當歸梢羌活麻黃根漢防己龍膽草茯苓以上各一錢紅花少許五味子二個銼如麻豆大分作二服水二盞煎至一盞去渣食前稍熱服忌酒濕面房事又名清魂湯柴胡通塞湯治下焦熱大小便不通方千金方柴胡羚羊角黃芩橘皮澤瀉各三兩梔子仁四兩石膏六兩生地黃一升芒硝三兩香豉一升上十味切以水一斗煮九味取三升去滓下芒硝分三服忌蕪荑柴胡厚朴湯療心腹脹滿外臺柴胡厚朴炙各十分茯苓橘皮紫蘇八分生薑十二分檳榔五分末上七味切以水七升煮取二升五合