body:
  text: 一畫一切冷氣搶心切痛發即欲死久患心腹痛時發者此可絶根方衛生方蓬莪朮二兩酢煮木香一兩煨為末每服半錢淡酢湯下一物瓜蒂湯治諸黃金匱中暍太陽中暍身熱疼重而脈微弱此以夏日傷冷水水行皮中所致也同上瓜蒂二十個上銼以水一升煮取五合去滓頓服二畫二氣散陰陽痞結咽膈噎塞狀如梅核妨礙飲食久而不愈即成反胃楊氏方梔子乾薑炮二味各一兩上為粗末每服二錢水一盞同煎至五分去滓食後熱服二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或發為寒熱或因食生冷脾胃不和局方半夏湯洗七次陳皮各五兩茯苓三兩甘草炙一兩半上為㕮咀每服四錢用水一盞生薑七片烏梅一個同煎六分去滓熱服不拘時候二勝散治乾霍亂不吐不利令人昏冒煩亂氣短上下膈塞冷汗自出方聖濟方訶子乾薑成塊者各二兩上二味不搗碎同用水二升於銚子內煎水盡為度取出重物細切焙乾搗羅為散每服二錢匕陳米飲調下人參丸療患久痛腹滿並痰飲不下食外臺方人參白朮枳實各六分茯苓八分厚朴六分青木香六分橘皮五分大黃六分檳榔六分上九味搗篩蜜和丸空腹煮生薑棗湯下如梧子二十丸日二服漸加至三十丸忌酢物桃李雀肉等人參湯安食下氣理胸脅並治客熱千金方虛勞人血氣微弱陰陽俱虛小勞則生熱熱因勞而故以名客熱病源人參麥門冬乾薑當歸茯苓甘草五味子黃耆芍藥枳實各二兩桂心三兩半夏一升大棗十五枚上十三味㕮咀以水九升煮取三升去滓每服九合從旦至晡令盡皆熱服慎勿冷人參湯療肺客熱並肝心家氣方外臺方桂心甘草炙各三兩人參乾薑防風各二兩白朮一兩半上六味切以水八升煮取三升分三服日三宜溫服忌桃李雀肉生蔥海藻菘菜人參湯治厥逆三焦不調及脾胃氣攻頭面虛腫氣喘心急脹滿聖濟方人參赤茯苓去黑皮厚朴去粗皮生薑汁炙透紫蘇子炒大腹皮桑根白皮銼檳榔各一兩陳橘皮去白焙防風各一兩半上九味粗搗篩每服五錢匕水一盞生薑一塊拍破蔥白三莖切煎至八分去滓空心溫服人參散治邪熱客於經絡肌熱痰嗽五心煩躁頭目昏痛夜多盜汗此藥補和真氣解勞倦婦人血熱虛勞骨蒸並皆治之本事方人參去蘆白朮白茯苓去皮柴胡去苗洗半夏曲當歸洗去蘆薄切焙乾稱赤芍藥乾葛甘草各一兩炙子芩半兩去皮上為細末每服三錢水一盞生薑四片棗二個煎至八分不拘時候帶熱服但是有勞熱症皆可服熱退即止大抵透肌解熱乾葛第一柴胡次之所以升麻葛根湯為解肌之冠也人參煮散治脾胃不和中脘氣滯心腹脹痛不思飲食宿寒留飲停積不消或因飲冷過度內傷脾氣嘔吐痰逆寒熱往來或時汗出又治腸胃冷濕泄瀉注下水穀不分腹中雷鳴脅肋虛脹兼療傷寒陰盛四肢逆冷局方茯苓去皮銼蒼朮去皮各半斤人參四兩甘草炙十兩三稜煨搗碎青皮去白各十二兩乾薑炮丁皮各六兩上為末每服二錢水一盞生薑五片棗三枚同煎至七分食前空心溫服人參飲子治陽毒傷寒四肢壯熱心膈煩躁嘔吐不止柴胡黃芩人參甘草麥門冬各二兩半夏半兩上為散每四錢水一中盞入竹葉三十片生薑半分煎六分溫服十便方聖惠方無方名即小柴胡湯加竹葉麥門冬也人參敗毒散治傷寒時氣咽痛項強壯熱惡寒身體煩疼及寒壅咳嗽鼻塞聲重風痰頭痛嘔噦寒熱並皆治之局方人參去蘆洗焙茯苓去皮甘草炙前胡去苗洗焙芎藭羌活去蘆桔梗獨活去苗柴胡去苗洗焙枳殼水浸去穰銼麩炒黃色各等分上十味為細末每服二錢水一盞入生薑薄荷各少許同煎七分去滓溫服不拘時候寒多則熱服熱多則溫服活人三因並同聖濟總録名羌活湯準繩加蒼朮陳倉米名羌活散治時行下痢赤白本事方去桔梗加白朮青皮名清氣散調榮衛順三焦治風壅消痰涎退煩熱增損亦有理用之良驗人參當歸湯治産後煩悶不安千金方人參當歸麥門冬乾地黃桂心各一兩大棗七枚粳米一升芍藥四兩淡竹葉三升上九味㕮咀以水一斗二升先煮竹葉及米取八升去滓內藥煮取三升去滓分三服若煩悶不安者當取豉一升以水三斗煮取一升盡服之甚良人參養榮湯按前證實為庸醫耽擱及今投劑補瀉不及然大虛不補虛何由以回大實不瀉邪何由以去勉用參地以回虛承氣以逐實此補瀉兼施之法也或遇此證純用承氣下證稍減神思稍蘇續得服身體振戰怔忡驚悸心內如人將捕之狀四肢反厥眩暈鬱冒項背強直並前循衣摸床撮空等證此皆大虛之候將危之證也急用此湯虛候少退速可屏去蓋傷寒溫疫俱系客邪為火熱燥證人參固為益元氣之神品偏於益陽有助火固邪之弊當此又非良品也不得已而用之方溫疫論人參八分麥門冬七分遼五味一錢地黃五分歸身八分白芍藥一錢五分知母七分陳皮六分甘草五分照常煎服人參養榮湯治肺痿咳嗽有痰午後熱並聲嘶者聖濟方柴胡二錢桑白皮阿膠蚧粉炒人參去蘆桔梗貝母杏仁枳實茯苓各一錢五味子十二枚上水二升生薑三片棗二枚煎至一鍾食遠服人參養榮湯治積勞虛損四肢沉滯骨肉痠疼吸吸少氣行動喘啜小腹拘急腰背強痛心虛驚悸咽乾唇燥飲食無味陰陽衰弱悲憂慘戚多臥少起久者積年急者百日漸至瘦削五藏氣竭難可振復又治肺與大腸俱虛咳嗽下利喘乏少氣嘔吐痰涎局方白芍藥三兩當歸桂心去粗皮甘草炙陳橘皮人參白朮煨黃耆各一兩熟地黃制五味子茯苓各七錢半遠志炒去心半兩上銼散每服四錢水一盞半生薑三片棗子一枚煎至七分去滓溫服便精遺泄加龍骨一兩咳嗽加阿膠甚妙人參養胃湯治外感風寒內傷生冷憎寒壯熱頭目昏疼體拘急不同風寒二證拘可治療須令濈濈微汗自然解散若先有汗則溫服不須更汗兼治飲食傷脾或外感風寒濕氣發為痎瘧及山嵐瘴疫常服尤佳得效方厚朴去粗皮切薑汁拌炒乾蒼朮米泔浸炒黃色半夏湯洗七次各一兩白茯苓去皮半兩甘草二錢半人參去蘆草果煨去皮藿香去土各半兩橘紅去白七錢半上銼散每服三錢水一杯半生薑三片經棗二枚煎空心熱服寒加炮附子數片體虛寒瘧加肉桂炮附子各一錢人參荊芥散治婦人血風勞氣身體疼痛頭昏目澀心忪煩倦寒熱盜汗頰赤口乾痰嗽胸滿精神不爽或月水不調臍腹㽱痛痃癖塊硬疼痛發歇或時嘔逆飲食不進或因産調理失節淹延瘦瘁乍起乍臥甚即著床婦人大全良方荊芥穗人參去蘆桂心生地黃柴胡鱉甲酢炙酸棗仁炒枳殼制羚羊角別為末白朮各七分半川芎當歸防風甘草各半兩上為細末每服三錢水一盞半生薑三片煎至八分去滓熱服無時候日三服常服除一切風虛勞冷宿疾孕婦休服局方有牡丹皮芍藥人參紫菀散虛勞唾血痰涎上盛咳嗽喘重寒熱往來肩背拘急勞倦少力盜汗發渴面目浮腫事證方人參去蘆頭紫菀洗去蘆頭陳皮去白各一兩桑白皮五味子貝母去心以上各二兩紫蘇葉四兩白茯苓去皮杏仁去皮尖麩炒甘草炙以上各半兩上為細末每服三錢水一盞生薑五片煎至七分溫服不拘時候丁香散治傷寒咳逆活人書方丁香柿蒂各一分甘草良薑各半錢上沸湯煮作一服乘熱猛吃按三因方同大全良方有人參五味治妊娠惡阻又家寶方丁香柿蒂二味煎服治同名順氣湯濟生名柿蒂湯易簡無方名七寶飲治一切瘧疾無問寒熱多少先後連日間日及不伏水土山嵐瘴氣寒熱如瘧等證簡易方厚朴薑汁製陳皮甘草炙草果仁常山雞骨煮檳榔青皮上等分㕮咀每服五錢水半盞酒半盞煎取一盞去滓露一宿來早又燙溫向東服了睡片時忌熱物半日寒多加酒退水熱多退酒加水須熳火煎令熱不吐不瀉一服即效七成湯溫疫愈後脈細而弱每至黎明或夜半後便作泄瀉此命門真陽不足宜此湯或亦有雜證屬實者宜大黃丸下之立愈溫疫破故紙炒錘研三錢熟附子一錢遼五味八分白茯苓一錢人參一錢甘草炙五分照常煎服愈後更發者宜八味丸倍加附子七氣消聚散有因積聚相攻或疼或脹者初用此湯日久元氣虛脾胃弱而脹者參朮健脾湯少助消導藥準繩方香附米一錢半青皮蓬朮三稜俱醋炒枳殼熬炒木香砂仁各一錢厚朴薑製陳皮各一錢二分甘草炙四分水二盅薑三片煎八分食前服七氣湯虛冷上氣勞氣方千金痰涎積聚心腹亦痛不能飲食準繩半夏一升人參生薑桂心甘草各一兩上五味㕮咀以水一斗煮取三升分三服日三七味清脾湯治胃瘧發作有時先覺伸欠乃作寒栗鼓振頤頷中外皆寒腰背俱痛寒戰既已內外皆熱頭疼如破渴欲飲冷或痰聚胸中煩滿欲嘔或先熱後寒先寒後熱寒多熱少寒少熱多或寒熱相半或但熱不寒但寒不熱或隔日一發或三日五日一發者三因方厚朴四兩薑製青皮半夏良薑烏梅各二兩草果一兩甘草炙半兩上每四錢水二盞薑三片棗一枚煎七分未發前並三服八正散治大小兒心經邪熱一切蘊毒咽乾口燥大渴引飲心忪面熱煩躁不寧目赤睛痛唇焦血衄口舌生瘡咽喉腫痛又治小便赤澀或隆閉不通及熱淋血淋並宜服之局方如酒後恣欲而得者則小便將出而痛既出而癢以此藥主之回春治肝經積熱小便淋閉不通及一切淋病俱效正宗車前子瞿麥滑石大黃曲裹煨去曲切焙山梔仁萹蓄木通甘草炙各一錢上為散每服二錢水一盞入燈心煎七分去滓溫服食後臨臥小兒量力少少與之潔古云因熱為腫者用此方八味腎氣丸治腳氣上入小腹不仁者金匱男子消渴小便反多以飲一斗小便一斗同上消渴問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈同上婦人治虛不足大渴欲飲水腰痛小腹拘急小便不利千金方乾地黃八兩桂枝附子各一兩炮山茱萸薯蕷各四兩澤瀉茯苓牡丹皮各二兩上八味末之煉蜜和丸梧子大酒下十五丸日再服八味順氣散凡中風若內因七情而得之者法當調氣不當治風外因六淫而得之者亦先當調氣然後依所感六氣隨症治之濟生方白朮茯苓青皮白芷陳皮烏藥人參各一兩甘草炙半兩上為細末每三錢水一大盞煎七分溫服仍以酒化蘇合香丸間服八物湯治大病後血氣虛損者方正宗即於八珍湯中去人參加黃耆八珍湯治肝脾傷損血氣虛弱惡寒發熱或煩躁作渴或寒熱昏憒或胸膈不利大便不實或飲食少思小腹脹痛等證薛己治潰瘍諸症調和榮衛順理陰陽滋養氣血增進飲食和表裡退虛熱為氣血俱虛之大藥也正宗人參白朮茯苓當歸川芎白芍藥熟地黃各一錢甘草炙五分水二鍾薑三片棗二枚煎八分食前服即四君四物湯合方八解散治四時傷寒頭痛壯熱感風多汗及療勞傷過度骨節痠疼飲食無味四肢疼倦行步喘乏面色痿黃怠惰少力咳嗽寒熱羸弱自汗胸膈不快嘔逆噁心局方人參去蘆陳皮去白半夏湯洗七次甘草炙藿香去土白朮茯苓各一兩厚朴去粗皮銼生美汁浸炒紫色二兩上為細末每服二錢水一盞生薑三片棗子一枚蔥白三寸同煎至七分溫服不拘時候九痛丸治九種心痛兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷腫上氣落馬墜車血疾等皆主之忌口如常法正宗生狼牙一兩炙附子三兩炮巴豆一兩去皮心熬研如脂人參乾薑吳茱萸各一兩上六味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者二丸九味羌活湯治春夏秋非時感冒暴寒頭痛發熱無汗脊強脈浮緊此足太陽膀胱經受邪宜此發散同上羌活二錢防風