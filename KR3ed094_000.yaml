根羌活柴胡薑棗水煎服三物備急丸主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口禁傳尸卒死者以緩水若酒服大豆許三四丸或不下捧頭起灌令下咽須臾當瘥如未瘥更與三丸當腹中鳴即吐下便瘥若口禁亦須折齒灌之金匱大黃一兩乾薑一兩巴豆一兩去心皮熬外研如脂上藥各須精新先搗大黃乾薑為末研巴豆內中合治一千許用為散蜜和丸亦佳密器中貯之莫令泄氣按此方通治乾霍亂此即醫林所謂絞腸痧也三物黃芩湯婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者主之同上黃芩一兩苦參二兩乾地黃四兩上三味以水八升煮取二升溫服一升多吐下蟲川芎散治頭風偏正頭痛昏眩妙方準繩川芎細辛羌活槐花甘草炙石膏香附子各半兩荊芥薄荷菊花防風茵陳各一兩上為末每服二錢食後茶清調下日三服忌動風物川芎茶調散治諸風上攻頭目昏沉偏正頭痛鼻塞聲重傷風壯熱肢體痠疼肌肉蠕動膈熱痰盛婦人血風太陽冗痛但是外感風氣並效回春川芎荊芥穗各二兩薄荷香附子各四兩羌活白芷甘草炙各一兩防風七錢半上為細末每服二錢食後茶清調下薑蔥煎服亦可一方加菊花一兩細辛五錢殭蠶蟬退各二錢半名菊花茶調散千金內托散治癰疽瘡癤未成者速散已成者速潰敗膿自出無用手擠惡肉自去不用刀針服藥後疼痛頓減此藥活血勻氣調胃補氣祛風邪闢穢氣乃王道之劑宜多服之大效回春黃耆蜜炙當歸酒洗人參各二錢川芎防風桔梗白芷各一錢厚朴肉桂甘草各五分上水二碗煎八分臨服入酒一小杯食遠服正宗無厚朴有天花粉白芍金銀花乳香沒藥千金風引湯療兩腳疼痹腫或不仁拘急屈不得行方外臺麻黃二兩去節吳茱萸一兩獨活一兩石膏二兩杏仁六十枚白朮三兩茯苓二兩桂心一兩人參細辛乾薑碎防風防己芎藭甘草炙附子各一兩炮秦艽一兩上十七味切以水一斗六升煮取三升分三服取汗佳忌海藻菘菜生蔥生菜桃李雀肉醋等物千金小風引湯主中風腰腳疼痛弱者方同上獨活防風當歸各二兩茯苓三兩大豆一升人參三兩乾薑三兩胡洽作桂心附子一枚炮石斛二兩胡洽作黃耆甘草二兩炙上十味切以水九升酒三升煮取三升去滓分四服服後如人行十里久忌海藻菘菜豬肉冷水醋等一方無干薑石斛有桂心黃耆千金大鱉甲湯療腳弱風毒攣痹氣上及傷寒惡風溫毒及山水瘴氣熱毒四肢痹弱方同上鱉甲二兩炙防風麻黃去節白朮各一兩吳茱萸五合知母升麻各一兩大棗二十枚擘貝齒七枚燒茯苓橘皮芎藭杏仁各一兩犀角半兩屑生薑三兩人參一兩赤小豆三合青木香半兩麝香三分研羚羊角一分屑麥門冬一兩去心大黃一兩半薤白十四枚烏頭十枚炮石膏一兩碎雄黃二分碎半夏一兩洗當歸萎蕤芍藥甘草各一兩炙上三十一味切水二斗煮取四升去滓分六服相去十里久得下止一方用大黃二分畏下可用一分也一方用羚羊角二分毒盛可用三分也忌海藻菘菜莧菜桃李雀肉酢物羊肉餳等一方有小茱萸翼方無知母升麻橘皮芎藭當歸萎蕤千金小鱉甲湯療身體虛脹如微腫胸口痞滿有氣壯熱少腹厚重兩腳弱方同上鱉甲炙升麻黃芩麻黃去節羚羊角屑各三兩前胡四兩桂心三兩烏梅二七枚擘杏仁三兩薤白二十一莖上十味切以水一斗煮取二升七合去滓分三服此常用若體強壯須利者加大黃二兩忌莧菜生蔥千金甘草湯療腳弱全身洪腫胃反食谷吐逆胸中氣結不安而寒熱下利不止小便難服此湯即益亦服女曲散利小便腫消服大散摩膏有驗同上甘草炙人參各一兩半夏一升洗桂心三合小麥八合完用大棗二十枚擘生薑八兩吳茱萸二升蜀椒各三兩出汁上九味切以水一斗三升煮麥取一斗去麥內諸藥煮取四升一服六合作六服忌海藻菘菜羊肉餳生蔥千金麻黃湯療惡風毒氣腳弱無力頑痹四肢不仁失音不能言毒氣衝心有人病者但病相當即服此湯同上麻黃一兩去節防風大棗二十枚擘當歸二兩茯苓三兩升麻芎藭白朮芍藥麥門冬去心黃芩桂心各二兩杏仁三十枚去皮心甘草二兩炙上十四味切以水九升清酒二升合煮取二升半分四服日三夜一覆令小汗粉之莫令見風忌海藻菘菜生蔥桃李雀肉酢物千金三黃湯治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食金匱方細辛二分麻黃五分獨活四分黃耆二分黃芩三分上五味以水六升煮取二升分三服一服小汗二服大汗心熱加大黃二分腹痛加枳實一枚氣逆加人參三分悸加牡蠣三分渴加栝蔞根三分先有寒加附子一枚千金當歸湯留飲宿食不消腹中積聚轉下方外臺方當歸人參桂心甘草炙芒硝芍藥各二兩大黃四兩生薑黃芩澤瀉各三兩上十味切以水一斗煮取三升分三服空心食後服忌生蔥海藻菘菜千金第一竹瀝湯療兩腳痹弱或轉筋皮肉不仁脹起如腫按之不陷心中惡不飲食或患冷方同上甘草三兩炙秦艽葛根各一兩附子二枚炮黃芩一兩麻黃去節防己各一兩杏仁五十枚防風一兩半生麻一兩茯苓三兩細辛一兩竹瀝五升桂心乾薑各一兩上十五味切以水七升合竹瀝煮取三升分三服取汗忌海藻菘菜豬肉醋物生菜生蔥翼方無茯苓杏仁有白朮千金第二大竹瀝湯療卒中風口噤不能語言四肢緩縱偏痹摩急痛風經五藏恍惚恚怒無常手足不隨方同上竹瀝一斗四升獨活芍藥桂心各二兩麻黃一兩去節防風白朮葛根各二兩生薑三兩茵芋細辛各二兩茯苓三兩防己一兩烏頭一枚炮人參石膏各一兩黃芩芎藭甘草各二兩炙上十九味切以竹瀝煮取四升分六服先未汗者取汗一狀相當即服忌同翼方無白朮千金第三竹瀝湯療風毒入人五內短氣心下煩