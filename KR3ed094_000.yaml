front:
  text: 原序夫醫道之難為也久矣古今名家無不原於張祖余奉職之暇夙潛心於方術竊採擇歷代成方而歷試於四方有年於此矣憾未能悉驗焉向壬戌丁卯之歲劦北再羅水災矣病患夭殞不可勝計也巡邑施藥之際乞活之民千百有餘人也於是多試之各奏其效因集其驗者名方苑以告於同志云此書也取上自長沙下逮明清數十百家可為標誰匯為小册子列以國韻四十八字母以便於檢閲云文化戊辰孟夏河陽平岡水走嘉言識
  hash: sha256:d0bdec960995a917e444e4e04b0e63b0d1d3bd6df04c006be812250b562cfa3f
