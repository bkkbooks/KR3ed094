三味先將茯苓朮煎成入鹽再煎分溫三服茯苓澤瀉湯胃反吐而渴欲飲水者用此湯同上反胃茯苓半斤澤瀉四兩甘草一兩桂枝二兩白朮三兩生薑四兩上六味以水一斗煮取三升內澤瀉再煎取二升半溫服八合日三服茯苓湯胃腑實熱引飲常渴泄熱止渴方外臺茯苓五兩一作茯神栝蔞五兩知母四兩小麥二升麥門冬五兩去皮大棗二十枚去核生地黃六兩淡竹葉三升萎蕤四兩上九味切以水三升先煮小麥竹葉取九升去滓內諸藥煮取四升分四服不問早晚隨渴隨進非但正治胃渴通治渴痛熱即服之忌蕪荑酢物茯苓湯心頭結氣連胸背痛及吐酸水日夜不止同上茯苓四兩厚朴四兩炙橘皮二兩白朮二兩生薑十兩上五味切以水九升煮取二升七合絞去滓分溫三服每服相去如人行七八里服須利加檳榔末一兩半湯欲熟時內之甚安穩三日服一劑頻服六七劑可則停忌酢物桃李雀肉等茯苓湯療常吐酸水脾胃中冷同上茯苓橘皮生薑各十二兩白朮甘草各八分炙人參桂心各六分紫蘇十分檳榔七分上九味切以水九升煮取二升半絞去滓分溫三服每服人行七八里未好差三兩日更服一劑老小取微利忌生蔥酢物桃李雀肉海藻菘菜茯苓安心湯上焦虛寒精神不守泄下便利語聲不出同上茯苓人參乾薑各三兩桂心一兩遠志皮三兩甘草二兩炙上六味切以水九升煮取三升去滓分三服忌如上法茯苓理中湯療霍亂臍上築而悸同上木瓜人參甘草各三兩茯苓二兩乾薑一兩泡上五味㕮咀以水六升煮取三升去滓適寒溫分為四服忌海藻菘菜酢物茯苓補心湯治心肝症回春茯苓人參白朮當歸生地黃白芍酸棗仁麥門冬陳皮黃連炒各等分甘草三分辰砂研末臨服調入五分上銼一劑棗二枚烏梅一個小麥一撮水煎食遠服茯苓補心湯婦人以血旺氣衰為本心主血肝藏血今血衰而氣盛者由心氣虛耗不能主血又不能制乎肺金使肺氣得以乘乎肝木肝之虧損則血不能藏漸致枯涸不榮經絡故月事不調矣此方專補心元之虛抑其肺氣之乘調和榮衛滋養血脈其疾自然平復矣大全良方即於參蘇飲方內除木香與四物湯對分勻和以薑棗煎每服四錢食前溫服茯神湯療渴利虛熱引飲不止消熱止渴外臺茯神萎蕤宿薑知母四兩地骨皮生地黃各一升石膏八兩碎竹葉二升麥門冬二升去心栝蔞五兩上十味切以水一斗二升下大棗三十枚擘並藥煮取四升分為四服忌蕪荑茯神散治因驚語言顛錯本事方茯神去木熟乾地黃酒洗九蒸九曝焙乾稱白芍藥川芎當歸洗去蘆薄切焙乾白茯苓去皮桔梗炒遠志去心洗銼炒令黃色人參去蘆以上各一兩上為細末每服二錢水一盞燈心棗肉同煎至七分不拘時候烏藥順氣散治男子婦人一切風氣攻疰四肢骨節疼痛遍身頑麻頭目旋暈及療癱瘓語言蹇澀筋拘攣又治腳氣步履艱難腳膝軟弱婦人血風老人冷氣上攻胸臆兩脅刺痛心腹膨脹吐瀉腸鳴局方麻黃去根節陳皮去白烏藥去木各二兩川芎甘草炒白殭蠶去絲觜炒枳殼去穰麩炒白芷桔梗各一兩乾薑炒半兩上為細末每服三錢水一盞生薑三片棗一枚煎至七分如四時傷寒憎寒壯熱頭痛肢體倦怠加蔥白三寸同煎並服出汗差如閃挫身體頭痛溫酒服遍身瘙癢抓之成瘡用薄荷參葉煎服常服疏風順氣孕婦不可服按三因方直指方並同得效方無干薑殭蠶有人參白朮名通氣驅風湯烏頭湯治歷節不可屈伸疼痛者主之金匱中風味酸則傷筋筋傷則緩名曰泄咸則傷骨骨傷則痿名曰枯枯泄相搏名曰斷泄榮氣不通衛不獨行榮衛俱微三焦無所御四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節同上治寒疝腹中絞痛賊風入攻五藏拘急不得轉側發作有時使人陰縮手足厥逆同上治腳氣疼痛不可屈伸同上麻黃芍藥黃耆各三兩甘草三兩炙川烏五枚㕮咀以蜜二升煎取一升即出烏頭上五味㕮咀四味以水三升煮取一升去滓內蜜煎中更煎之服七合不知盡服之烏頭桂枝湯寒疝腹中痛逆冷手足不仁若身疼痛炙刺諸藥不能治抵當用此湯金匱寒疝烏頭五枚上一味以蜜二斤煎減半去滓以桂枝湯五合解之得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病烏頭赤石脂丸心頭徹背背痛徹心主之金匱胸痹蜀椒一兩一法一分烏頭一分炮附子半兩炮一法二分乾薑一兩一法一分赤石脂一兩一法二分上五味末之蜜丸如梧子大先食服一丸日三服不知稍加服烏頭湯治風冷腳痹疼痛攣弱不可屈伸方千金烏頭細辛蜀椒各一兩甘草秦艽附子桂心芍藥各二兩乾薑茯苓防風當歸各三兩獨活四兩大棗二十枚上十四味㕮咀以水一斗二升煮取四升分五服若熱毒多服亦佳烏梅丸傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蛔厥也蛔厥者其人當吐蛔令病者靜而時煩者此為藏寒蛔上入胸膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者主之又主久利方傷寒論厥陰篇烏梅三百枚細辛六兩乾薑十兩黃連十六兩當歸四兩附子六兩炮去皮蜀椒四兩出汁桂枝去皮六兩人參六兩黃蘗六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五斗米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先服飲服十丸日三服稍加至二十丸禁生冷滑物臭食等烏沉湯治一切氣除一切冷調中補五藏益精壯陽道暖腰膝去邪氣治吐瀉轉筋症癖疼痛風水毒腫冷風麻痹又中惡心腹痛蟲毒疰忤鬼氣宿食不消天行瘴疫膀胱腎間冷氣攻衝背膂俯仰不利及婦人血氣攻擊心腹刺痛並宜服之局方天台烏藥一百兩人參去蘆頭三兩沉香五十兩甘草爁四兩半上為末每服半錢入生薑三片鹽少許沸湯點服空心食前下烏苓通氣散治一切疝氣無問遠近寒熱風濕寒氣回春烏藥當歸芍藥香附糖球陳皮各一錢白朮去蘆茯苓檳榔玄胡澤瀉各五分木香甘草各三分上銼一劑生薑三片水煎服秦艽扶羸湯治膽肺二經虛熱及肺痿骨蒸已成勞咳或寒或熱聲嗄不出體虛自汗四肢怠惰入門柴胡二錢人參鱉甲醋炙秦艽當歸紫菀半夏各一錢地骨皮一錢半甘草五分上用水二鍾薑三片烏梅大棗各一枚煎七分食後服如熱甚者加青蒿汗多者加黃耆去半夏生薑二味秦艽蒼朮湯治痔疾若破謂之痔漏大便祕澀必作大痛此由風熱乘襲食飽不通氣逼大腸而作也受病者燥氣也為病者胃濕也胃與大腸則化燥火以乘燥熱之實勝風附熱而來是濕熱風燥四氣而合故大腸頭成塊者濕也作大痛者風也若大便燥結者主病兼受火邪熱結不通也去此四者其西方肺主諸氣其體收下亦助病為邪須當破氣藥兼之治方全矣以銼湯與之其效如神蘭室祕藏秦艽去蘆桃仁湯浸去皮另研皂角仁燒存性另研各一錢蒼朮制防風以上七分黃蘗去皮酒洗五分當歸梢酒洗澤瀉以上各三分梭身檳榔一分另研大黃少許雖大便過澀亦不可多用上除檳榔桃仁皂角仁三味外余藥㕮咀如麻豆大都作一服水三盞煎至一盞二分去渣入檳榔等三味末再上火煎至一盞空心熱服待少時以進膳壓之不犯胃氣也服藥日忌生冷硬物及酒濕面大辛熱物乾薑之類犯之則其藥無效如有白膿加白葵花頭五朵去萼心青皮半錢不去白入正藥中同煎木香三分為細末同檳榔等三味依前服餌古人治此疾多以歲月除之此藥一服則愈秦艽防風湯治痔漏每日大便時發疼痛如無疼痛者非痔漏也此藥主之同上素艽防風當歸身白朮以上各一錢五分炙甘草澤瀉各六分黃蘗五分大黃煨橘皮各五分柴胡升麻以上各二分桃仁三十個紅花少許上銼如麻豆大都作一服水二盞煎至一盞去滓稍熱空心服之避風寒忌房事酒濕面大辛熱物秦艽當歸湯治痔漏大便結燥疼痛同上大黃煨四錢秦艽枳實以上各一錢澤瀉當歸梢皂角仁白朮以上各五分紅花少許桃仁二十個上都作一服水三盞煎至一盞去滓食前熱服忌同前秦艽鱉甲飲治骨蒸壯熱肌肉消瘦唇紅頰赤氣粗四肢倦夜有盜汗衛生寶鑑柴胡鱉甲去裙醋炙九肋者地骨皮各一兩秦艽當歸知母各半兩上六味為粗末每服五錢水一盞青蒿五葉烏梅一個煎至七分去滓溫服空心臨臥各一服秦艽湯治陰黃不欲聞人言小便不利聖濟秦艽去苗土一兩旋覆花半兩赤茯苓去赤皮半兩甘草炙銼半兩上四味粗搗篩每服四錢匕以牛乳一盞煎取六分去滓溫服不拘時候桃仁承氣湯發黃一證胃實失下表裡壅閉鬱而為黃熱更不泄搏血為瘀凡熱經氣不郁不致發黃熱不幹血分不致畜血同受其邪故發黃而兼畜血非畜血而致發黃但畜血一行熱隨血泄黃因隨減嘗見發熱者原無瘀血有瘀血者厚不發黃所以發黃當咎在經瘀熱若專治瘀血誤也胃移熱於下焦氣分小便不利熱結膀胱也移熱於下焦血分膀胱畜血也小腹硬滿疑其小便不利今小便自利者責之畜血也小便不利亦有畜血者非小便自利便為畜血也胃實失下至夜發熱者熱留血分更加失下必致瘀血初則晝夜發熱日晡益甚既投承氣晝日熱減至夜獨熱者瘀血未行也宜此湯溫疫論大黃芒硝桃仁當歸芍藥牡丹皮照常煎服桃仁湯熱到膀胱小便赤色邪到膀胱干於氣分小便膠濁干於血分溺血畜血留邪欲出小便急數膀胱不約小便自遺膀胱熱結小便閉塞溫疫邪於血分者宜之熱到膀胱者其邪在胃胃熱灼於下焦在膀胱但有熱而無邪惟令小便赤色而已其治在胃同上桃仁三錢研如泥丹皮一錢當歸一錢赤芍一錢阿膠二錢滑石五錢照常煎服小腹痛按之硬痛小便自調有畜血也加大黃三錢甚則抵當湯藥分三等隨其病輕重而施治桃核承氣湯太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但少腹急結者乃可攻之宜此方傷寒論太陽中桃仁五十個去皮尖桂枝二兩去皮大黃四兩芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利桃花湯少陰病下利便膿血者主之同上少陰少陰病二三日至四五日腹痛小便不利下利不止便膿血者主之同上不利便膿血者主之金匱下利赤石脂一斤一半生用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合內赤石脂末方寸匕日三服若一服愈余勿服桃花湯療腳氣及腰腎膀胱宿水及痰飲外臺桃花陰乾收量取一大升但隨虛滿不須按捺搗為散羅下之溫清酒和一服令盡通利為度空腹服之須臾當轉可五六行但宿食不消化等物總瀉盡若中間覺飢虛進少許軟飯及糜粥安穩不似轉藥虛人廢朝謁但覺腰腳軟快使人踴躍食味倍佳腳先腫者一宿頓消如囊中貯物傾卻相似又無毒易將息唯忌胡蒜豬肉三月內腹虛大都消息慎生冷酸滑五辛酒面及黏食肥膩四五日外諸食復常茵陳蒿湯陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃主之傷寒陽明傷寒七八日身黃如橘子色小便不利腹滿者主之同上谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸主之金匱黃疸疫邪傳裡遺熱下焦小便不利邪無輸泄經氣鬱滯其傳為疸身目如金者宜此湯溫疫論茵陳蒿六兩梔子十四枚擘大黃二兩去皮上三味以水一斗二升先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂莢汁狀色正赤一宿腹減黃從小便去也茵陳五苓散黃疸病主之金匱黃疸治陰黃身如橘色小便不利聖濟又曰陰黃者面色黃頭痛不發熱黃如橘故謂之陰黃也同上陰黃陽氣伏陰氣盛熱毒加之故但身面色黃頭痛而不發熱名陰黃也病源候論茵陳蒿末十分五苓散五分上二物和先食方寸匕日三服茵陳湯及丸療一切黃蔣九處得其父遠使得黃服此極效方外臺茵陳四兩大黃三兩黃芩三兩梔子三兩擘上四味切以水五升煮取三升分為三服空肚服之不然搗篩蜜和為丸飲服草丸加至稍稍二十五丸量病與之重者作湯勝丸日一服忌羊肉酒面熱物等以差為限小便黃色及身黃者並主之茵陳湯治黃疸目黃小便如血心躁悶口苦頭痛聖濟茵陳蒿山梔子仁各三分甘草炙半兩木通銼栝蔞根柴胡去苗各一兩麥門冬去心焙一兩半上七味粗搗篩每服五錢匕水二盞入竹葉三七片同煎至一盞去滓食後服茵陳散治骨槽風醫通茵陳連翹荊芥麻黃升麻羌活薄荷殭蠶各五錢細辛二錢半牽牛頭末一兩為散每服三錢先以水一盞煎沸入藥攪之急出食後和滓熱服消風百解散治四時傷寒頭疼項強壯熱惡寒身體煩疼四肢倦怠行步喘乏及寒壅咳嗽鼻塞聲重涕唾稠黏痰涎壅盛氣急滿悶並宜服之局方荊芥陳皮洗去白白芷蒼朮麻黃去節各四兩甘草炙二兩上為細末每服二大錢水一大盞薑三斤烏梅一個同煎七分不拘時溫服或用茶酒調下仍欲發散風邪入連發蔥白三寸同煎消風散治風濕浸淫血脈致生瘡疥瘙癢不絶及大人小兒風熱癮疹遍身云片斑點乍有乍無並效正宗當歸生地防風蟬蛻知母苦參胡麻荊芥蒼朮牛蒡子石膏各一錢甘草木通各五分水二鍾煎八分食遠服消疳飲治小兒疳疾身熱面黃肚大青筋瘦弱者通治諸疳濟生方人參白朮茯苓黃連胡黃連神麯青皮砂仁甘草炙水煎傷食加山楂有蟲加使君子硝礬散黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治主之金匱硝石礬石燒等分上二味為散以大麥粥汁和服寸匕日三服病隨大小便去小便正黃大便正黑是候也消毒飲治便毒單生腫硬大作痛者服此方黴瘡歸尾粉草熟大黃黑醜搗研各三錢殭蠶貝母各二錢用水酒各一大鐘煎八分空腹滓煎七分服消渴口苦舌乾方外臺麥門冬五兩去心茅根一升栝蔞三兩切烏梅十顆去核小麥三合竹茹一升切上六味以水九升煮取三升去滓細細含咽分為四五服忌面炙肉桔梗白散病在陽應以汗解之反以冷水潠之若灌之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小白散傷寒太陽治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰金匱桔梗三分巴豆一分去皮熬黑碎如脂貝母三分上三味為散內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆若以水潠之洗之益熱卻不得出當汗而不汗則煩假令汗已腹中痛與芍藥三兩如上法桔梗湯咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膜如粥者為肺癰主之亦治血痹金匱少陰病二三日咽痛者可與甘草湯不差與此湯傷寒桔梗一兩甘草二兩上二味以水三升煮取一升分溫再服桔梗散療心腹中氣時時痛食冷物則不安穩及惡水外臺桔梗茯苓各八分枳實炙人參厚朴炙芍藥橘皮各六分桂心五分檳榔八分麥門冬去心八分上十味搗篩為散空肚煮薑棗飲服方寸匕日三服漸加至一匕半熱以茶飲不利忌豬肉酢物生蔥生冷油膩小豆黏食面炙肉等物荊防敗毒散治時毒初起頭眩惡寒腮項腫痛脈浮者服之正宗癰疔腫發背乳癰憎寒壯熱甚者頭痛拘急狀似傷寒者方仁齋直指羌活獨活前胡柴胡川芎桔梗荊芥防風茯苓枳殼各一錢甘草五分人參五分薑三片水二鍾煎八分食遠服寒甚加蔥白三枝直指方無人參有薄荷荊芥連翹湯兩耳腫痛者腎經有風熱也回春荊芥連翹防風當歸川芎白芍柴胡枳殼黃芩山梔子白芷桔梗各等分甘草減半上銼一劑水煎食後服兩耳出膿者腎經亦風熱也荊芥湯痧有鬱氣不通者此方主之玉衡荊芥防風各一錢川芎三分陳皮青皮連翹各八分水二鍾煎七分稍冷服食不消加山楂卜子心煩熱去川芎加黑山梔有積加檳榔痰多加貝母白芥子氣壅加烏藥香附血壅加桃仁紅花鬱悶不舒加細辛食積加三稜蓬朮大便不通加枳實大黃暑熱加香薷紫朴小便不通加木通澤瀉喉痛去川芎加薄荷射干大力子咳嗽加桑白皮兜鈴桑白皮湯治舌苦頭痛欲嘔心悶方千金桑根白皮半兩乾薑二兩桂心五寸大棗十枚上四味㕮咀以水一斗煮取三升去滓分三服適衣無令汗出桑白皮湯治下痢後脾胃虛弱不能制輸水氣致身腫脹滿聖濟桑白皮海藻赤小豆郁李仁橘皮上水煎射干麻黃湯咳而上氣喉中水雞聲主之金匱肺痿射干十三枚一日三兩麻黃四兩生薑四兩細辛紫菀款冬花各三兩五味子半斤大棗七枚半夏大者洗八枚一法半斤上九味以水一斗二升先煮麻黃兩沸去上沫內諸藥煮取三升分溫三服射干兜鈴湯治痧似傷風咳嗽者玉衡射干桑白皮兜鈴桔梗薄荷玄參天花粉貝母枳殼甘菊金銀花各等分水二鍾煎七合稍冷服咳甚加童便射干湯療喉痹閉不通利而痛不得飲食者若閉喉並諸疾方外臺當歸二兩甘草一兩炙白芷三兩升麻一兩射干犀角屑杏仁去皮尖各一兩上七味切以水八升煮取一升半分服神良忌海藻菘菜益氣養榮湯治抑鬱或勞傷氣血或四肢頸項筋縮結成瘰瘰如貫珠者謂之筋癧此患皆繇思慮太過神氣受傷乃勞中所得者也其患或軟或硬或赤不赤或痛不痛或日晡發熱或潰而不斂者是正宗人參茯苓陳皮貝母香附子當歸川芎黃耆熟地白芍各一錢甘草桔梗各五分白朮二錢薑三片棗二枚水二鍾煎八分食遠服益元散治身熱吐痢泄瀉腸癖下利赤白癃閉淋痛利小便偏生石淋腸胃中積聚寒熱積氣通九竅六府生津液去留結消畜水止渴寬中除煩熱心躁腹脹痛悶補益五藏大養脾腎之氣理內傷陰痿安魂定魄補五藏七傷一切虛損主癇痙驚悸健忘止煩滿短氣藏傷咳嗽飲食不下肌肉疼痛並口瘡牙齒疳蝕明耳目壯筋骨通經脈和血氣消水穀保元真解百藥食邪毒耐勞役飢渴闢中外諸邪所傷久服強志輕身駐顏延壽及解中暑傷寒疫病飢飽勞損憂愁思慮恚怒驚恐傳染並汗後遺熱勞復諸疾並解兩感傷寒能令遍身結滯通氣和而愈及婦人下乳催生産後損血血衰陰虛熱甚一切熱證兼吹奶乳癰此神驗之仙藥也惟孕婦不宜服滑胎也宣明論桂府膩白滑石六兩甘草一兩炙上為末每服三錢溫水調下日三服欲冷飲者新汲水調下解利傷寒發汗煎湯調下四錢並三服效度此藥是寒涼解散鬱熱若病甚不解多服此藥無害但有益而無損俗惡性寒兼易得之賤物而不明素問造化之理故不取本草神驗之言而多不用焉若以隨症驗之此凡人之仙藥也不可闕之又綱目附方名天水散玉泉散六一散又救偏瑣言加辰砂五錢名硃砂六一散治痘出炎天煩渴不寧或熾熱紫豔心胸煩悶者真武湯少陰病二三日不已至四五日腹中小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或嘔者主之傷寒少陰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者主之同上太陽茯苓芍藥各三兩白朮二兩附子一枚炮去皮破八斤生薑三兩切上五味以水八升煮取三升去滓溫服七合日三服若咳者加五味半升細辛一兩乾薑一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤千金方作玄武湯真人養臟湯治大人小兒腸胃虛弱冷熱不調藏府受寒下痢赤白或便膿血有如魚腦裡急後重臍腹㽱痛日夜無度胸膈痞悶脊肋脹滿全不思食及治脫肛墜下酒毒便血諸藥不效者並皆治之局方白芍藥一兩六錢當歸去蘆洗焙人參去蘆木香不見火一兩四錢一本作一兩六錢白朮焙各六錢肉豆蔻麵裹煨半兩一本無肉豆蔻肉桂去粗皮甘草炙各三錢訶子皮一兩二錢罌粟殼去蒂蓋蜜炙三兩六錢上件銼為粗末每服二大錢水一盞半煎至八分去滓食前溫服老人孕婦小見暴瀉宜急服之立愈忌酒面生冷魚腥油膩如腸肺滑泄夜起久不差者可加炮附子三四片煎服此藥的有神效不可具述流氣飲治肝經不足內受風熱上攻眼目昏暗視物不明常見黑花當風多淚怕日羞明堆眵赤腫隱澀難開或生翳障倒睫拳毛赤爛及婦人血風眼及時行暴赤腫眼胞紫黑應有眼疾並宜服局方荊芥去梗木賊去根節牛蒡子炒細辛去苗玄參去蘆大黃炮蔓荊子去白皮白蒺藜去尖炒決明子一兩半黃芩一作二兩防風去蘆山梔子去皮川芎各一兩蒼朮二兩米湯浸洗一本作湯浸一宿炒十二兩菊花去枝甘草炙上搗羅為細末每服二錢半臨臥用冷酒調下如牙兒一作孩兒有患只令乳母服之流氣飲子治臂痛外連肌肉牽引背胛時發時止此由榮衛之氣循行失度留滯經絡與正氣相搏其痛發則有癱瘓婦人大全良方紫蘇葉青皮桔梗大黃焙當歸芍藥烏藥茯苓川芎黃耆枳殼去瓤麩炒防風各半兩甘草橘皮各三分木香連翹大腹二兩銼薑汁炙上㕮咀每服二錢水二盞薑二片棗一枚煎一盞去滓服高良薑湯治心腹絞痛如刺兩脅支滿煩悶不可忍方千金方高良薑五兩厚朴二兩當歸桂心各三兩上四味㕮咀以水八升煮取一升八合分二服日二若一服痛止便停不須更服強者為二服劣者分三服仁齋直指名當歸厚朴湯治肝經受寒面色青慘厥而泄痢高良薑湯療久心刺肋冷氣結痛不能食外臺高良薑十分當歸十分橘皮八分厚朴十分炙桔梗八分桃仁五十枚去尖皮吳茱萸八分生薑八分訶梨勒五分上九味切以水八升煮取二升八合絞去滓分溫三服服別相去如人行六七里再服忌豬肉生冷油膩黏食小豆等痃癖氣壯熱兼咳久為骨蒸驗方外臺柴胡四兩茯苓白朮枳實炙各二兩上四味切以水七升煮取二升半分為三服積熱不歇即加芒硝六分取利熱除之後每三日服一劑瘥後每日一劑肥白終身永除忌桃李雀肉醋物痃癖胸背痛時時咳嗽不能食方同上桂心細辛鱉甲炙各四分白朮六分厚朴三分炙附子乾薑各五分橘皮防葵三分炙吳茱萸三分上十味搗篩蜜和為丸如梧子大服十五丸酒下日二服加至二三十丸忌莧菜醋物生蔥等候氏黑散治大風四肢煩重心中惡寒不足者外臺菊花四十分白朮防風各十分細辛茯苓牡蠣人參礬石當歸乾薑芎藭桂枝各三分桔梗八分黃芩五分上十四味杵為散酒服方寸匕日一服初服二十日酒溫調服禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力指迷七氣湯治七情相干陰陽不得升降氣道壅滯攻衝作疼直指青皮陳皮桔梗莪朮辣桂藿香益智各一兩香附子一兩半甘草半夏各三分上銼細每服三錢水一盞薑四片棗一枚煎至七分不拘時候祕傳降氣湯治男子婦人上熱下虛之疾飲食過度致傷脾胃酒色無節耗損腎元水土交攻陰陽關隔遂使氣不升降上熱則頭目昏眩痰實嘔逆胸膈不快咽喉乾燥飲食無味下弱則腰腳無力大便祕澀裡急後重臍腹冷痛治以涼則脾氣怯弱腸鳴下利治以溫則上焦壅熱口舌生瘡及腳氣上攻與久利不差宜先服此藥劫以所主藥治之局方桑白皮二兩炒枳殼湯浸去瓤麩炒柴胡去毛蘆洗陳皮炒黃色甘草炒一兩五加皮酒浸半日炒黃骨碎補燎去毛銼炒半兩地骨皮炒黃草果去皮膜淨洗炒黃訶子炮取肉半夏生薑汁和餅再碎炒以上各半兩上銼散和勻以碗盛飯甑上蒸一伏時傾出攤令冷收之每服二錢紫蘇三葉生薑三片水一盞同煎七分食後通口服痰咳加半夏曲心肺虛每料加人參茯苓各一兩上膈熱加北黃芩五錢下部大段虛加少許炮附子煎如使附子多加生薑婦人血虛加當歸一兩神授散治大便下血不止魏氏家藏方趙八節使傳壽皇御前見一藥人黃瘦一日忽肥壯呼來問之乃云久患失血因得此方遂獲安差壽皇面賜此方吳嗣秀王傳於大父同上白雞冠花生薑去皮上等分同於沙盆內爛研捻作餅子焙乾為細末白湯調下不拘時候服唐侍中療苦腳氣攻心此方消散腫氣極驗外臺大檳榔七枚合子碎生薑各二兩橘皮吳茱萸紫蘇木瓜各一兩上六味切以水三升煮取一升三合分再服忌如藥法夏月暴冷忽壯熱泄痢引飲熱湯斷變通身浮腫或成冷下結脈沉細小數方千金方澤瀉一兩半吳茱萸茯苓白朮當歸桔梗犀角青木香海藻芍藥大黃各二兩上十一味㕮咀以水九升煮取三升分三服下後消息五六日許可與女曲散羌活湯治白虎風痛甚如齧聖濟羌活去蘆頭一分防風去叉一兩秦艽去苗土芎藭當歸焙各一兩半牛膝去苗酒浸一兩附子炮裂去皮臍三分大腹連皮用三枚桃仁湯浸去皮尖雙仁炒三十一枚上九味銼如麻豆每服五錢匕水二盞入生薑一棗大拍破煎至一盞去滓溫服日二夜一狼牙湯少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者此湯洗之金匱婦人雜病狼牙三兩上一味以水四升煮取半升以綿纏箸如繭浸湯瀝陰中日四遍除熱清肺湯治麻疹盡透而壯熱咳嗽大便祕結醫通石膏三錢黑玄參生地黃赤芍栝蔞根貝母各二錢麥門冬去心一錢半甘草五分上水煎溫服除濕湯治寒濕所傷身體重著腰腳痠疼大便溏泄小便或澀或利準繩半夏曲炒厚朴薑製蒼朮米泔制各二兩藿香葉陳皮去白白茯苓去皮各一兩甘草炙七錢白朮生用一兩上㕮咀每服四錢水一盞薑七片棗一枚煎七分食前溫服倉公當歸湯治賊風口噤角弓反張身強直痙方千金當歸防風各十八銖獨活一兩半附子一枚細辛半兩麻黃五銖上六味㕮咀以酒五升水三升煮取三升服一升口不開者格口內湯一服當蘇二服小汗三服大汗十一畫清濕化痰湯治遍身四肢骨節走注疼痛牽引胸背亦作寒熱喘咳煩悶或作腫塊痛難轉側或四肢麻痹不仁或背心一點如水冷脈來沉滑乃是濕痰流注經絡關節不利故也壽世南星炮半夏制陳皮去白茯苓去皮蒼朮米泔炒羌活酒芩白芷各等分甘草減半上銼水煎入竹瀝薑汁磨木香溫服骨體痛甚及有腫塊作痛者名痰塊加乳香沒藥海石朴硝頭項痛加川芎威靈仙手臂膊痛加薄桂引南星等藥至痛處清燥養榮湯夫疫乃熱病也邪氣內郁陽氣不得宣布積陽為火陰血每為熱搏暴解之後余焰尚在陰血未復大忌參耆白朮得之反助其壅鬱餘邪留伏不惟目下淹纏日後必變生異證或周身痛痹或四肢攣急或流火結痰或遍身瘡瘍或兩腿攢痛或勞嗽湧痰或氣毒流注或痰核穿漏皆驟補之為害也凡有陰枯血燥者宜此湯若素多痰及少年平時肥盛者投之恐有膩膈之弊亦宜斟酌大抵時疫愈後調理之劑投之不當莫如靜養節飲食為第一溫疫知母天花粉當歸身白芍地黃汁陳皮加燈心煎服表有餘熱宜柴胡養榮湯清陽湯治口喎斜頰腮緊急胃中火盛汗不出而小便數也準繩紅花黃蘗酒製桂枝已上各七錢生甘草蘇木各五分炙甘草一錢葛根一錢五分當歸升麻黃耆各二錢㕮咀作一服酒三盞煎至一盞三分去滓稍熱食前服訖以火尉摩緊急處即愈夫口喎筋急者是筋脈血絡中大寒此藥少代燔針劫刺破惡血以去凝結內泄衝脈之火熾清暑益氣湯治長夏濕熱大勝蒸蒸人感之多四肢困倦精神短少懶於動作胸滿氣促肢節沉疼或氣高而喘身熱而煩心下膨痞小便黃而少大便溏而頻或利出黃糜或如泔色或渴或不思飲食自汗體重或汗少者血先病而氣不通也其脈中得洪緩若濕氣相搏必加之以遲遲病雖互摸少差其天暑濕令則一也宜以清燥之劑治之辨惑論黃耆汗少者減五分蒼朮各一升半升麻一錢人參去蘆五味子白朮陳皮各五分神麯澤瀉各五分甘草炙三分黃蘗酒焙當歸身麥門冬去心青皮去白乾薑各三分上㕮咀作一服水二盞煎之一盞去渣稍熱服食遠服清涼甘露飲治膏粱所釀暴怒所結遂致口唇高突堅硬或損破流血或虛熱生痰或渴症久作並治正宗犀角銀柴胡茵陳石斛枳殼甘草麥門冬生地黃黃芩知母枇杷葉各一錢水二鍾淡竹葉燈心各二十煎八分食後服清涼飲子治小兒血脈壅實腑藏生熱頰赤多渴五心煩躁睡臥不寧四肢驚掣及因乳哺不時寒溫失度令兒血氣不理腸胃不調或溫熱連滯欲成伏熱或壯熱不歇欲發驚癇又治風熱結核頭面瘡癤目赤咽痛瘡疹餘毒一切壅滯並宜服之局方赤芍藥當歸去蘆甘草炙大黃各等分上為粗末每服一錢水一中盞煎至七分去滓溫服量兒大小虛實加減微溏利為度食後臨臥服清涼散治一切實火咽喉腫痛回春山梔連翹黃芩防風枳殼黃連當歸生地甘草各等分桔梗倍薄荷減半白芷或不可用上銼一劑燈心一團細茶一撮水煎磨山豆根調服清胃散治胃經有熱牙齒或牙齦作腫出血不止並效正宗黃芩黃連生地丹皮升麻石膏各一錢水二鍾煎八分食後服清中散治胃經積熱牙齒或牙根腫痛或牽引頭腦作痛或面熱耳紅並皆治之同上當歸黃連生地黃山梔子各一錢半牡丹皮六分升麻八分甘草五分上水二鍾煎八分食遠服清熱補血湯治口舌生瘡體倦少食日晡益甚或目澀熱痛準繩當歸酒洗川芎芍藥熟地酒洗各一錢玄參七分知母五味子黃蘗麥門冬去心柴胡牡丹皮各五分上水煎服如不應用補中益氣湯加五味治之清熱導痰湯中風痰涎壅盛不能言語不省人事牙關緊急有火有痰有氣或面赤身熱手足溫暖脈緊盛宜服此方壽世人參白朮去蘆茯苓去皮陳皮去皮半夏薑製南星桔梗瓜蔞枳實麩炒黃芩黃連各等分甘草減半上銼生薑水煎一方有防風白附子尤效清熱透肌湯治麻疹未透熱甚而咳醫通黑參石膏鼠黏子荊芥防風前胡葛根杏仁等分生甘草減半水煎熱服清熱消毒散治癰疽陽症腫痛發寒熱作渴等證入門治熱實口舌生瘡及一切瘡瘍腫痛形病俱實方金銀花二錢芍藥川芎生地黃各一錢半當歸黃連梔子連翹甘草各一錢水煎服清魂散治産後血暈不省人事續易簡方澤蘭葉人參各一分荊芥穗一兩川芎半兩甘草二錢炙上細末每服一錢熱湯溫酒各小盞調勻日灌下過喉即開眼氣定省人事清肝解鬱湯治一切憂鬱氣滯乳結腫硬不痛不癢久漸作疼或胸膈不利肢體倦怠面色痿黃飲食減少正宗陳皮白芍川芎當歸生地半夏香附子各八分青皮遠志茯神蘇葉桔梗各六分甘草山梔子木通各四分水二鍾薑三片煎八分食遠服清肝滲濕湯治肝經鬱滯邪火流行致陰腫痛或熱作癢同上川芎當歸白芍生地山梔黃連連翹龍膽草各一錢銀柴胡澤瀉木通各六分滑石一錢蘆薈五分甘草三分防風八分水二鍾淡竹葉燈心各二十件煎八分食前服清心蓮子飲治心經蘊熱小便赤澀玉莖腫痛或莖竅作疼及上盛下虛心火炎上口苦咽乾煩躁作渴又治虛陽口乾小便白濁夜則安靜晝則發熱者同上石蓮肉黃耆黃芩赤茯苓人參各一錢炙甘草澤瀉麥門冬地骨皮各五分水二鍾煎八分空心並食前服赤水玄珠去澤瀉加車前清心抑膽湯平肝解鬱清火化痰除眩暈諸癇之疾回春癇屬氣血虛而兼痰火者宜攻補兼施同上當歸酒浸白芍酒炒白朮去蘆炒茯苓去皮陳皮半夏薑汁炒枳實麩炒竹茹石菖蒲黃連薑汁炒香附炒各一錢麥門冬去心川芎人參去心遠志甘草四分上銼一劑生薑三片水煎溫服清咽滋肺湯治麻疹出透及沒後有餘熱咳嗽聲喝者醫通麻疹未出先咳甚為佳兆發透咳自己若透徹及收後咳仍不止者屬肺熱同上玄參牛蒡子荊芥葳蕤貝母栝蔞根馬兜鈴桔梗麥門冬各等分甘草減半上十味照常煎服若多吐痰去麥門冬加橘皮按繆仲淳方無馬兜鈴有薄荷清咽利膈湯治積熱咽喉腫痛痰涎壅盛及乳蛾喉痹喉癰重舌木舌或胸膈不利煩躁飲冷大便祕結等症正宗連翹黃芩甘草桔梗荊芥防風山梔薄荷金銀花黃連牛蒡子玄參各一錢大黃朴硝各二錢水二鍾煎八分食遠服清肺飲治痘兒咽乾聲啞保赤麻黃一錢五分麥門冬桔梗各二錢知母荊芥穗天花粉各一錢石菖蒲訶子肉各八分上入竹瀝薑汁服清肺湯治一切咳嗽上焦痰盛或久嗽不止或勞怯或久嗽聲啞或喉生瘡者是火傷肺金並宜此湯回春桔梗去蘆茯苓去皮陳皮去白桑白貝母去心各一錢杏仁去皮當歸山梔天門去心麥門冬去心各七分五味子七粒甘草三分黃芩去朽心一錢半上銼薑棗子水煎食後服清肺飲子治渴而小便不利者是熱邪在上焦肺之分故不利也肺者金也金合生水若肺中有熱不能生水是絶其水源治宜淡滲之劑以清肺之氣泄其火邪滋水之上源也同上赤茯苓去皮一錢半豬苓二錢澤瀉一錢通草一錢燈草一錢車前子炒另研一錢琥珀另研五分萹蓄七分木通瞿麥各七分上銼一劑水煎空心稍熱服清上防風湯清上焦火治頭面生瘡癤風熱毒等同上防風一錢荊芥薄荷黃連酒炒山梔子枳殼各五分黃芩酒炒川芎各七分連翹白芷桔梗各八分甘草二分上水煎食後服入竹瀝一匙尤妙清神散治氣壅頭目不清耳常重聽準繩甘菊花白殭蠶炒各半兩羌活荊芥穗木通川芎防風各四兩石菖蒲甘草各一錢上為細末每服二錢食後茶清調飲清解湯治一切感冒同上蒼朮炒荊芥各二兩麻黃一兩半甘草一兩上四味㕮咀每服一兩水二鍾生薑三片蔥白一莖同煎七分去滓微熱服以被蓋覆取汗為度清陽散火湯治牙根盡處結腫連及耳項作痛名骨槽風也正宗升麻白芷黃芩牛蒡子連翹防風當歸荊芥白蒺藜各一錢甘草五分水二鍾煎八分食後服清地退火湯治痘不退熱而出名為火里苗急用此方以退其熱則後無青黑干陷之患保赤地骨皮一錢地膚子九分牛蒡子炒研七分柴胡一錢五分紫草八分用糯米撮制過乾葛八分連翹六分當歸五分木通三分蟬退二分上用薑一片水煎服如熱不退再服一劑或制末藥燈心湯下亦好麻黃湯太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者主之傷寒太陽太陽與陽明合病喘而胸滿者不可下宜此湯同上太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與此湯同上太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也主此湯同上脈浮者病有表可發汗宜此湯同上脈浮而數者可發汗宜此湯同上傷寒脈浮緊不發汗因致衄者主之同上陽明病脈浮無汗而喘者發汗則愈同上陽明陽明中風脈弦浮大而短氣腹部滿脅下及心痛又按之氣不通鼻乾不得汗嗜臥一身及面悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與此湯若不尿腹滿加噦者不治同上陽明病脈浮無汗而喘者發汗則愈宜此方同上脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼可發其汗傷寒可發汗篇麻黃三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個去皮尖上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜余如桂枝法將息麻黃附子甘草湯水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即愈脈沉者宜此湯浮者宜杏子湯金匱水氣篇又云杏子湯未見恐麻黃杏仁甘草石膏湯少陰病得之二三日以此湯微發汗以二三日無里證故微發汗也傷寒少陰麻黃二兩去節甘草二兩炙附子一枚炮去皮破八片上三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服麻黃杏仁薏苡甘草湯病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久傷取冷所致也可與此湯金匱濕暍麻黃半兩湯泡去節甘草一兩炙薏苡半兩杏仁七個去皮尖炒上銼麻豆大每服四錢匕水盞半煮八分去滓溫服有微汗避風麻黃加朮湯濕家身煩疼可與此湯發其汗為宜慎不可以火攻之同上麻黃三兩去節桂枝二兩去皮甘草二兩炙杏仁七十個去皮尖白朮四兩上五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗麻黃杏仁甘草石膏湯發汗後不可更行桂枝湯汗出而喘無大熱者可與此湯傷寒太陽麻黃四兩去皮杏仁五十個去皮尖甘草二兩石膏半斤碎綿裹上四味以水七升煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升麻黃細辛附子湯少陰病始得之反發熱脈沉者傷寒麻黃二兩細辛二兩附子一枚上三味以水一斗先煮麻黃減三升去上沫內諸藥煮取三升去滓溫服一升日三服麻黃升麻湯傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治主之同上厥陰麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩萎蕤各十八銖一作菖蒲石膏碎綿裹白朮乾薑芍藥天門冬去心桂枝去皮茯苓甘草各六銖炙上十四味以水一升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈麻黃醇酒湯治黃疸金匱麻黃三兩上一味以美酒五升煮取二升半頓服盡冬月用酒春月用水煮之麻黃連軺赤小豆湯傷寒瘀熱在裡身必黃主之傷寒陽明麻黃二兩去節連軺二兩連翹梗也杏仁四十個去皮尖赤小豆一升大棗十十枚擘生梓白皮切一斤生薑二兩切甘草二兩炙上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升去滓分溫三服半日服盡麻黃湯療風水身體面目盡浮腫腰背牽引髀股不能食方外臺麻黃五兩去節桂心四兩生薑三兩甘草二兩炙附子二枚炮上五味切以水一斗先煮麻黃減二升內藥煎取三升一服一升日三忌同前麻黃湯治頭面風熱煩躁皮肉如亂針刺痛聖濟麻黃去根節杏仁去皮尖雙仁炒研桔梗去蘆頭秦艽去苗葉薄荷葉丹皮去心防風去皮芍藥升麻黃芩去黑皮紫菀去苗土各一分半夏湯洗去滑半分羌活去蘆頭半兩上十三味粗搗篩每服二錢匕水一盞入生薑三片煎至七分去滓食後臨臥熱服麻子湯治大風周身四肢攣急皮膚勞強服之不虛人又治精神矇昧者方千金秋麻子三升淨擇水漬一宿防風桂心生薑石膏碎綿裹橘皮各二兩麻黃三兩竹葉蔥白各一握香豉一合上十味㕮咀先以水二斗半煮麻子令極熟漉去滓取九升別煮麻黃兩沸掠去沫內諸藥汁中煮取三升去滓分三服空腹服當微汗汗出以粉塗身極重者不過三兩劑輕者一兩劑瘥有人患大風賊風刺風加獨活三兩比之小續命湯準當六劑麻子湯治肺氣不足咳唾膿血氣短不得臥方千金麻子一升桑白皮餳各一斤桂心人參各二兩阿膠紫菀各一兩生薑三兩乾地黃四兩上九味㕮咀以水一斗五升合煮取四升分五服麻子仁丸趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約主之傷寒陽明脈陽微而汗少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過者為陽絶於里亡津液大便因硬也同上脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶同上麻子仁二升芍藥半斤枳實半斤炙大黃一斤去皮厚朴一尺炙去皮杏仁一升去皮尖熬別作脂上六味蜜和丸如梧桐子大飲服十丸日三服漸加以知為度參附養榮湯疫邪留於心胸令人痞滿下之痞應去今反痞者虛也以其人或因他病先虧或因新産後氣血兩虛或稟賦嬌怯因下益虛失其健運邪氣留止故令痞滿今愈下而痞愈甚若更用行氣破氣之劑轉成壞證宜此湯方溫疫當歸白芍一錢生地黃三錢人參一錢附子炮七分乾薑炒一錢照常煎服果如前證一服痞當如失倘有下證下後脈實病未除者再下之此有虛實之分一者有下證下後痞即減者為實一者表雖微熱脈不甚數口不渴下後痞反甚者為虛若潮熱口渴脈數而痞者投之禍不旋踵參耆內托散治痘不起發根窠不紅灰白色咬牙寒戰等症保赤氣虛癢塌及大便頻者同上人參厚朴去粗皮薑汁炒黃耆川芎去蘆當歸酒洗防風去蘆白芷桔梗去蘆頭木香隨時磨服各隨意加減肉桂去粗皮紫草糯米一撮上各等分薑一片棗一枚水煎服紅色紫者去肉桂木香加紫草蟬退漿不滿水酒各半煎色淡白者去防風白芷加糯米弱不食加人乳和服參苓白朮湯治脾胃虛弱飲食不進多困少力中滿痞噎心忪氣喘嘔吐泄瀉及傷寒咳嗽此藥中和不熱久服養氣育神醒脾悅色順正辟邪局方人參去蘆山藥各一斤蓮肉去皮白扁豆一斤半薑汁浸去皮微炒白朮縮砂取仁各一斤桔梗炒令深黃色二兩薏苡仁甘草炒各一兩上為細末每服二錢棗湯下小兒量歲數加減服之久瀉及大病後痢後調理消渴者尤宜此方參蘇飲治感冒發熱頭疼或因痰飲凝節兼以為熱並宜服之若因感冒發熱亦如服養胃湯法以被蓋臥連進數服微汗即愈尚一本作面有餘熱更宜徐徐服之自然平治因痰飲發熱但連日頻進此藥以熱退為期不可預止雖有前胡乾葛但能解肌耳既有枳殼橘紅輩自能寬中快膈不致傷脾兼大治中脘痞滿嘔逆噁心開胃進食無以逾此毋以性涼為疑一切發熱皆能取效不必拘其所因也小兒室女亦宜服之局方治一切發熱頭疼體痛服之皆效不必拘其所因小兒室女尤得其宜用藥致和而且平故也痰飲停積中脘閉塞眩暈嘈煩忪悸愪戄嘔逆不食有如氣隔痰氣停滯關節不利手足嚲曳筋脈攣急類中風食已即吐發熱頭痛百節煩疼狀似傷寒但連日頻進此藥以病退為期不可預止得效方陳皮去白枳殼去穰麩炒桔梗去蘆甘草炙木香各半兩半夏湯洗七次薑製紫蘇用葉乾葛洗前胡去苗人參去蘆茯苓去皮各三分上㕮咀每服四錢水一盞半薑七片棗一個煎六分去滓微熱服不拘時候易簡方不用木香只十味參連湯治下痢噤口不食者脾胃熱甚也回春人參五錢黃連一兩上銼水煎終日時呷之如吐再強飲但得一口呷下咽喉即好加石蓮肉三錢尤效外以田螺搗爛盫臍中引熱下行故也參耆鹿茸湯痘初無大熱面色少赤或赤斑皮膚中隱隱而經四五日不起出面色憔悴似內攻非內攻此稟受虛症之兒毒氣盛實不能發表危症也不可下宜此湯若表氣兼陰寒者宜溫中益氣湯活幼新法鹿茸酒炙去毛三錢黃耆蜜炙當歸酒洗各一錢半人參一錢二分附子一枚龍眼肉三個生薑一片甘草炙六分同煎去滓入好酒一杯溫服參麥清補湯有一種出痘稠密毒火既盛然元氣虛血氣弱津液枯竭不能制火以致虛火炎蒸或煩或渴或咽喉痛或鼻時出血難任溫補痘必不能成漿結痂大凡年長之男女嗜欲久開血氣耗者多有此症最為難治時醫見其熱候率用清涼如犀角地黃湯之類不知原因血氣不能勝毒氣而致有此證今又純用寒涼則血氣愈虧損而毒氣愈肆行豈復有可生之理是以此等之症時醫治之十無一生可哀憐今制此湯調之同上大參八分麥門冬無心酒蒸曬乾一錢二分白花粉酒蒸曬乾生黃耆各一錢前胡牛蒡各五分炙甘草生甘草各三分酒炒白芍生白芍各四分當歸酒洗八分紅花酒洗三分大川芎生地黃酒洗各三分桔梗三分山楂肉五分生薑一片龍眼肉三個同煎溫服遇此症者此藥當頻服通脈四逆湯少陰病下利清穀裡寒外熱汗出而厥者金匱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者主之傷寒甘草一兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩病皆與方相應者乃服之通脈四逆加豬膽汁湯吐已下斷汗出而厥四肢拘急不解脈微欲絶者主之同上甘草二兩炙乾薑三兩強人可四兩附子大者一枚生去皮破八片豬膽汁半合上四味以水三升煮取一升二合去滓內豬膽汁分溫再服其脈即來無豬膽以羊膽代之通氣防風湯治肩背痛用風藥以散之肩背痛不可回顧者太陽氣鬱而不行也回春辨惑論羌活勝濕湯藁本一錢防風羌活二錢川芎一錢獨活二錢蔓荊子六分甘草六分上銼一劑水煎服如身重腰沉經中有寒濕加酒浸防己一錢輕者炮附子重者炮川烏各五分通氣噎湯方外臺半夏三兩洗桂心三兩生薑八兩羚羊角三兩大棗二十枚上四味切以水八升煮取三升分服半升日再服忌羊肉生蔥飴通經導滯湯治婦人産後敗血流注經絡結成腫塊疼痛者正宗香附赤芍川芎當歸熟地陳皮紫蘇牡丹皮紅花牛膝枳殼各一錢甘草節獨活各五分水二鍾煎八分入酒一小杯食前服通膈絶湯療中焦實熱閉塞上下不通隔絶關格不吐不下腹滿彭彭喘急大黃瀉熱開關格外臺大黃三兩切引漬黃芩澤瀉升麻各三兩羚羊角四兩梔子仁四兩生地黃汁一升玄參八兩芒硝三兩上九味切以水七升先煮七味取二升三合下大黃更煎數沸絞去渣下消分三服忌蕪荑通膈湯治肺氣喘急煩悶或時咳嗽方聖濟射干桑白炙銼一兩麻黃去根節洗去沫焙甘草炙各一錢檳榔子銼草豆蔻各半兩郁李麩炒去皮一兩上七味粗搗篩每服三盞匕水一盞入生薑一棗大拍碎同煎至七分去滓食後溫服通氣飲治橫痃初起或兩髀俱腫作痛肉未堅實應服此方黴瘡木通瓜蔞子各五錢忍冬花粉甘草各三錢貝具紫蘇葉各二錢用水二大鐘煎八分空腹服渣再煎七分服通關散治中風傷寒發熱惡風頭痛目眩鼻塞聲重肩背拘急身體痠疼肌肉瞤動牙關緊急及久新頭風攻疰眼暗並宜服之局方川芎一兩細辛半兩甘草川烏白芷一本以上三味各一兩半撫芎各二兩龍腦薄荷一兩半上為細末每服一大錢蔥白茶清調下薄荷湯調亦得不拘時候通經丸治婦人室女月候不通或成血瘕本事方桂心青皮大黃炮乾薑炮川椒莪朮川烏炮乾漆炒當歸桃仁炒各等分上細末四分用米醋熬成膏和餘六分未成劑曰中治之丸梧子大淡醋湯下溫酒亦得食前服按大全良方及濟生方有紅花無川烏梔子豉湯發汗後水藥不得入口為逆若更發汗必吐下不止發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹主之傷寒太陽中篇傷寒五六日大下之後身熱不去心中結痛者未欲解也此湯主之同上發汗若下之而煩熱胸中窒者主之同上凡梔子豉湯病人舊微溏者不可與服之同上陽明病脈浮而緊咽燥口苦若腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心潰潰反讝語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者主之同上陽明陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者主之同上下利後更煩按之心下濡者為虛煩也宜此湯同上厥陰梔子十四個擘香豉四合綿裹上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得快吐者止後服梔子甘草豉湯前證若少氣者主之傷寒太陽梔子十四個擘甘草二兩炙香豉四合綿裹上三味以水四升先煮梔子甘草取二升半內豉煮取一升半去滓分二服溫進一服得吐者止後服梔子生薑豉湯前證若嘔者主之同上梔子十四個擘生薑五兩香豉四合綿裹上三味以水四升先煮梔子生薑取二升半內豉煮取一升半去滓分二服溫進一服得吐者止後服梔子大黃湯酒黃疸心中懊憹或熱痛者主之金匱梔子十四枚大黃一兩枳實五枚豉一升上四味以水六升煮取二升分溫三服梔子乾薑湯傷寒醫以丸藥大下之身熱不去微煩者主之傷寒太陽中篇梔子十四個擘乾薑二兩上二味以水三升半煮取一升半去滓分溫進一服梔子蘗皮湯傷寒身黃髮熱者主之同上陽明梔子十五個擘甘草一兩炙黃蘗二兩上三味以水四升煮取一升半去滓分溫再服梔子厚朴湯傷寒下後心煩腹滿臥起不安者主之同上太陽梔子十四個擘厚朴四兩炙去皮枳實四枚水浸炙令黃上三味以水三升半煮取一升半去滓分二服溫服進一服深師石膏湯療傷寒病已八九日三焦熱其脈滑數昏憒身體壯熱沉重拘攣急不差直用汗藥則因加劇而方無表裡療者意思以三黃湯以救其內欲解其外故宜石膏湯外臺方石膏黃連黃蘗黃芩各二兩香豉一升綿裹梔子十枚擘麻黃三兩去節上七味切以水一斗煮取三升分為三服一日並服出汗初服一劑少汗其後更合一劑分兩日服常令微汗出拘攣煩憒即差得數行利心開令語毒折也忌豬肉冷水深師阿膠湯療虛勞小便利而多有人虛勞服散又虛熱盛當風取冷患腳氣喜發動兼小便利脈細弱此方利即減同上阿膠一兩乾薑二兩麻子一斤搗篩遠志四兩去心附子一枚炮人參一兩甘草一兩炙上七味切以水七升煮六味取三升去滓內膠煬銷分三服一方云小便利多日夜數十行一石五斗者良忌豬肉冷水海藻菘菜深師芍藥湯療中毒風腫心腹痛達背迫氣前後如疰痛方同上芍藥細辛桂心甘草炙當歸吳茱萸獨活各二兩乾地黃生薑五兩桃仁四十枚去皮尖兩仁研上十味切以水九升煮取三升分為四服宜利者加大黃二兩忌海藻菘菜生蔥芫荑生菜深師乾薑湯療冷咳逆氣同上乾薑四兩紫苑一兩杏仁七十枚去皮尖兩人切麻黃去節四兩桂心甘草炙各二兩五味子一兩上七味切水八升煮取二升七合分三服平體人加射干一兩代乾薑忌海藻菘菜生蔥等深師酸棗湯療傷寒及吐下後心煩乏氣晝夜不眠方同上酸棗仁四升麥門冬一升去心甘草二兩炙知母一兩茯苓二兩芎藭二兩乾薑三兩上七味切以水一斗六升煮棗取一斗去棗內藥煮取三升去滓溫分三服忌海藻菘菜大醋按金匱無干薑麥門冬豬苓湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反讝語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若竭欲飲水口乾舌燥者白虎加人參湯主之若脈浮發渴欲飲水小便不利者此湯主之傷寒陽明脈浮發熱渴欲飲水小便不利者此湯主之金匱消渴夫諸病在藏欲攻之當隨其所得而攻之如渴者與此湯余皆效此同上陽明病汗出多而渴者不可與此湯以汗多胃中燥此湯復利小便故也傷寒陽明少陰病不利六七日咳而嘔渴心煩不得眠者主之傷寒少陰豬苓去皮茯苓阿膠澤瀉滑石各一兩上五味以水四升先煮四物取二升去滓內阿膠煬盡溫服七合日三服豬苓散嘔吐而病在膈上後思水者解急與之思水者用此湯金匱嘔吐豬苓茯苓術各等分上三味杵為散服方寸匕日三服豬苓湯邪到膀胱者乃疫邪分布下焦膀胱實有之邪不止於熱也從胃家來治在胃兼治膀胱若純治膀胱胃氣乘勢擁入膀胱非其治矣若腸胃無邪獨小便急數或白膏如馬遺其治有膀胱宜此湯溫疫論豬苓二錢澤瀉二錢滑石五分甘草八分木通一錢車前子二錢燈心煎服豬膏發煎諸黃用此方金匱黃疸胃氣下泄陰吹而正喧此穀氣之實也同上婦人豬膏半斤亂髮雞子大三枚上二味和膏中煎之發消藥成分再服病從小便出豬膚湯少陰病下利咽痛胸滿心煩主之傷寒少陰豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服湯液本草曰方中用白粉即白米粉紫參湯下利肺痛主之金匱方紫參半斤甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服紫石寒食散治傷寒愈後不復同上赤石脂紫石英白石英鍾乳雄煉栝蔞根防風桔梗文蛤鬼臼各十分附子炮去皮四分太一餘糧十分燒乾薑桂枝去皮各四分上十三味杵為散服方寸匕紫菀湯治妊娠咳嗽不止胎不安婦人大全良方甘草杏仁各一兩紫菀一兩桑白一分桔梗三分天門冬一兩上㕮咀每服三錢水一盞竹茹一塊煎至七分去滓入蜜半匙更煎二沸溫服紫蘇飲治妊娠胎氣不和懷胎近上脹滿疼痛謂之子懸者心胃脹痛也兼治胎氣不和心腹脹滿疼痛及胎前諸疾依此方加減壽世保元大腹皮人參去蘆川芎洗陳橘皮去白白芍藥各半兩紫蘇莖葉一兩當歸洗去蘆薄切三錢甘草一錢炙上各細銼分作三服每服用水一盞半生薑四片蔥白七寸煎至七分去滓空心服濟生方名紫蘇和氣飲又百一選方無川芎紫蘇煮散膜外水氣聖濟紫蘇防風白朮桑白皮各等分共末水煎覺熱去白朮加甘草功效如五靈湯紫蘇湯主通身體滿小便澀上氣不下不能食食囷脹者方外臺紫蘇莖一兩甘草炙橘皮各一兩半生薑三兩檳榔三枚上五味切以水五升煮取二升分三服相去十里久若能長服之永令氣消下忌海藻菘菜本事方不用甘草名檳榔湯暴得疾手足不舉諸醫以為風針灸臂腿不知痛作腳氣與此藥乃愈麥門冬湯大逆上氣咽喉不利止逆下氣者主之金匱咳嗽病後勞復發熱者玉函麥門冬七升半夏一升人參三兩甘草二兩粳米三合大棗十二枚上六味以水一斗二升煮取六升溫服一升日三夜一服千金三因並同聖濟治虛勞煩熱口乾舌燥欲得飲水方無人參有竹葉生薑本事方治小兒嘔吐脈數有力方無粳米大棗加茯苓三錢薑三片名麥門冬散麥門冬湯治霍亂已愈煩熱不解多渴小便不利濟生麥冬橘皮半夏白朮各一兩人參甘草炙各半兩小麥五合上每四錢水一盞半生薑五片烏梅少許煎八分溫服聖惠方人參散無小麥烏梅半夏有葛根治霍亂卒吐下利不禁脈數煩渴宜服此方麥門冬湯治脾疸發黃口甘煩渴主之聖濟麥門冬三兩芍藥黃芩兩半梔子仁五枚烏犀角一兩石膏一兩水煎五錢去滓入朴硝五分三沸溫服日二麥門冬湯治凡下血虛極方千金麥門冬白朮各四兩甘草一兩牡蠣芍藥阿膠各三兩大棗二十枚上七味㕮咀以水八升煮取二升分再服排膿內托散治癰疽腦項諸發等瘡已潰流膿時宜服正宗當歸白朮人參各二錢川芎白芍黃耆陳皮茯苓各一錢香附肉桂各八分甘草五分白芷項之上加三分桔梗胸之上加五分牛膝下部加五分薑三片水二茶鍾煎八分食遠服旋覆花湯治其人常欲蹈其胸上先未苦時但欲飲熱主之金匱寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半産漏下此湯主之同上旋覆花三兩蔥十四莖新絳少許上三味以水三升煮取一升頓服之旋覆花湯療妊娠六七月胎不安常處方同上旋覆花一兩厚朴炙白朮枳實炙黃芩茯苓各三兩半夏洗七遍芍藥各二兩上九味切以水一斗煮取二升半先食分五服日三夜二忌羊肉餳醋桃李雀肉等旋覆代赭石湯傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿傷寒太陽傷寒發汗若吐若下解後心下痞硬噫氣不除者主之同上旋覆花三兩甘草三兩炙大棗十二枚擘人參二兩生薑五兩半夏半斤洗代赭石一兩甘草三兩炙上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服旋覆飲子治腳氣𤸷痹不仁兩腳緩弱腳腫無力重者少腹氣滿胸中痞塞見食即嘔或兩手大拇指不遂或兩腳大拇指不遂或小便澀第一療氣滿嘔逆不下食外臺即犀角旋覆花湯去犀角者旋覆花湯治支飲胸膈實痞呼吸短氣方聖濟旋覆花檳榔紫胡去苗桔梗炒各一兩鱉甲桑根白皮大黃銼炒各一兩半甘草炙半兩上八味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服不拘時候羚羊角散治大人小兒一切風熱毒上衝眼目暴發赤腫或生瘡疼痛隱澀羞明局方羚羊角鎊車前子甘草微炙黃芩川升麻各十兩決明子二十兩炙龍膽草去蘆山梔子取仁各五兩上為細末每服一錢食後溫熟水調下日進三服小兒可服半錢羚羊角湯主肺熱胸背痛時時乾咳不能食方外臺羚羊角屑二兩貝母生薑茯苓各三兩橘皮人參芍藥各二兩上七味切以水五升煮取一升八合去滓分溫三服每服如人行八九里久更服禁生冷蒜面醋羚羊角豉湯療喉痛腫結毒氣衝心胸方同上豉一升半犀角一兩屑羚羊角屑一兩芍藥三兩升麻四兩杏仁一兩去皮尖梔子七枚甘草炙二兩上八味切以水七升煮取一升半分三服忌海藻菘菜羚羊角湯治肝熱生風內障醫通羚羊角鎊人參各錢半黑玄參地骨皮羌活車前子各一錢二分水煎食前熱服羚羊角湯治眼見黑花或頭旋目暗欲變青盲眼瞳微開方聖濟羚羊角鎊決明子人參升麻玄參車前子各一兩羌活防風去叉各一兩半細辛半兩上九味細銼如麻豆大每服五錢匕以水一盞半煎至八分去滓溫服不拘時候理中丸即人參湯傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復不止者當利其小便傷寒太陽霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者此丸主之同上霍亂大病差後喜唾久不了了胸上有寒當以丸藥溫之宜此丸同上陰陽易胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實桂枝湯主之人參湯又主之金匱胸痹霍亂吐下脹滿食不消化心腹痛者主之同上霍亂即局方理中湯千金名治中湯人參乾薑甘草炙白朮各三兩上四味搗篩蜜和為丸如雞子黃許大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被理中丸療冷熱不調霍亂吐痢宿食不消外臺人參八分白朮八分甘草八分炙高良薑八分桂心六分上五味搗篩蜜丸空腹以飲下梧子大服三十丸日二服漸加四十丸老少以意減之理中安蛔湯傷寒吐蛔者手足冷胃空虛也回春人參七分白朮茯苓各一錢烏梅三分乾薑炒黑五分上銼劑水煎服治蛔不可用甘草甜物蓋蛔得甘則動於上得酸則靜見苦則安得辛辣則頭於下如合丸用烏梅浸爛蒸熟搗如泥入前末藥再搗如泥每服十丸米湯吞下乾薑湯治飲食輒噎方千金方集驗名半夏湯乾薑石膏各四兩人參桂心栝蔞根集驗作桔梗各二兩半夏小麥各一升甘草一兩吳茱萸二升赤小豆三十粒上十味㕮咀以酒五升水一斗煮棗二十枚去滓合煮取三升合三服乾薑附子湯下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者主之傷寒乾薑一兩附子一枚生用去皮尖八片上二味以水三升煮取一升去滓頓服乾薑人參半夏丸妊娠嘔吐不止主之金匱妊娠乾薑人參各一兩半夏二兩上三味末之以生薑汁糊為丸如梧子大飲服十丸日三服乾薑黃連黃芩人參湯傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐者主之傷寒厥陰傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也同上少陰乾薑黃連黃芩人參各三兩上四味以水六升煮取二升去滓分溫再服連翹消毒飲治熱毒瘰癧過食炙煿醇酒膏粱以致蘊熱腮項成核或天行亢熱濕痰作腫不能轉側者效正宗連翹陳皮桔梗玄參黃芩芍藥當歸山梔葛根射干天花粉紅花各一錢甘草五分大黃初起便燥者加之水二鍾煎八分食後服有痰者加竹茹一錢連翹湯治妒乳乳癰方千金方連翹芒硝各二兩芍藥射干升麻防己杏仁黃芩大黃柴胡甘草各三兩上十一味㕮咀以水九升煮取二升五合分三服連翹散治積飲停痰蘊熱膈上以致咽喉腫痛胸膈不利咳吐痰涎舌燥無表裡症相兼者服此正宗連翹葛根黃芩赤芍山梔桔梗升麻麥門冬牛蒡子甘草木通各八分水二鍾竹葉二十片煎八分食遠服涼膈散治大人小兒藏腑積熱煩躁多渴面熱頭昏唇焦咽燥舌腫喉閉目赤鼻衄頷頰結硬口舌生瘡痰實不利涕稠黏睡臥不寧譫語狂忘腸胃燥澀便溺祕結一切風壅並宜服之局方治三焦實火煩渴舌生瘡小水赤大便結一切有餘之火回春川大黃朴硝甘草炙各二十兩連翹去梗二斤半梔子黃芩薄荷去土各十兩上粗末每服二錢水一盞入竹葉七片蜜少許同煎至七分食後溫服小兒可服半錢更隨歲數加減服之得利下住服正宗有石膏涼榮瀉火湯治婦人懷抱憂鬱不清致生內熱小水澀滯大便祕結及陰中火鬱作痛亦如澀淋宜此瀉之正宗川芎當歸芍藥生地黃芩黃連山梔木通柴胡茵陳龍膽草知母麥門冬各一錢甘草五分大黃酒炒二錢上粗末水二鍾煎八分空心服便利去大黃崔氏療腳氣遍身腫方外臺大豆二大升以水一斗煮取五升去豆桑白皮一握切檳榔七枚碎茯苓二兩切上四物將三物以前豆汁浸經宿煮取二升絞去滓添酒二合內藥中隨多少服之忌醋物崔氏療漆瘡方同上頻以鹽湯洗之大良陳橘皮湯治乾霍亂腹脅脹滿不吐利心胸悶亂不可忍方聖濟陳橘皮湯浸去白焙三兩蜀椒去目並開口炒出汗四十枚上二味粗搗篩每服五錢匕水一盞半生薑三片煎至一盞去滓溫服不拘時牽牛子湯此藥不獨療水病凡肺氣腳氣奔豚氣上築心胸不可忍皆治之聖濟牽牛子檳榔煨木香赤茯苓陳皮各一兩上五味粗搗篩每服二錢匕水一盞煎三兩沸去滓溫服啓脾丸消食止瀉止吐消疳消黃消脹定腹痛益脾健胃回春人參白朮去蘆油炒白茯苓去皮陳皮蓮肉各一兩去心山楂肉山藥炒澤瀉甘草炙各五錢上為末煉蜜為丸梧桐子大每服二三十丸空心米湯下或米湯研化服亦可小兒常患傷食服之立愈鹿肉湯治産後虛羸勞損補之方千金鹿肉四斤乾地黃甘草芎藭黃耆芍藥麥門冬茯苓各三兩人參當歸生薑各一兩半夏半斤大棗二十枚上十三味㕮咀以水二斗五升煮肉取一斗三升去肉內藥煎取五升去滓分四服日三夜一陰毒甘草湯治傷寒初病一二日便結成陰毒或服藥六七日以上至十日便成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇面青黑四肢厥冷其數沉細緊數仲景云此陰毒之候身如被打五六日可治至七日不可治也千金方甘草升麻各半兩當歸蜀椒各六銖鱉甲一兩上五味㕮咀以水五升煮取二升半分三服如人行五里須臾進一服溫服發汗當從汗出汗出則愈若不汗則不除重作服仲景方去蜀椒陷胸湯治胸中心下結積飲食不消方千金方栝蔞實大黃黃連各二兩甘草一兩上四味㕮咀以水五升煮取二升五合分三服透膿散治便毒有膿未破作痛作脹黴瘡皂角刺黃耆牛膝各三錢川芎一錢當歸尾川山甲忍冬花漢防己各一錢五分用水二大鐘煎八分空腹服渣再煎七分若服前方不效者感毒必重正宗透膿散無牛膝忍冬花漢防己三味而有入酒一杯法曰治癰疽諸毒內膿已成不穿破者宜服之即破偏風膈上風熱心藏恍惚神情天陰心中惛惛如醉不醒方同上淡竹瀝三升若熱多用竹瀝冷多則用荊瀝羚羊角二分屑石膏十分碎綿裹茯神六分切上四味以水一斗合竹瀝煮取一升五合去滓食後服欲消分為三服常能服之永不畏風發忌酢物豆附丸治丈夫婦人腸胃虛弱內受風冷水穀不化泄瀉注下腹痛腸鳴手足厥冷服諸藥不效者局方肉蔻炮附子炮茯苓各四兩木香肉桂乾薑炮各二兩丁香一兩上細末薑汁麵糊丸梧子大食前生薑下淨府湯治小兒一切癖塊發熱口乾小便赤成洞瀉回春柴胡白茯苓去皮豬苓澤瀉三稜醋炒莪朮山楂子去核各一錢黃芩白朮去蘆半夏薑製人參各八分胡黃連甘草各三分上銼一劑薑棗煎服産後下赤白腹中絞痛湯方千金芍藥乾地黃各一兩一本作五兩甘草阿膠艾葉當歸各二兩上六味㕮咀以水七升煮取二升半去滓內膠令煬分三服常山飲治山嵐瘴瘧寒熱往來或二日三日一發聖濟常山銼厚朴去粗皮生薑汁炙熟各一兩草豆蔻去皮肉豆蔻去殼各兩枚烏梅去核七枚檳榔銼甘草炙各半兩上七味粗搗篩每服二錢匕水一盞煎至六分去滓候冷未發前服如熱吃即吐蛇床子散溫陰中坐藥金匱一本曰婦人陰寒溫中坐藥主之同上蛇床子仁上一味末之以白粉少許和令相得如棗大綿裹內之自然溫逍遙散治血虛勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汁減食嗜臥及血熱相搏月水不調臍腹脹痛寒熱如瘧又治室女血弱陰虛榮衛不和痰嗽潮熱肌體羸瘦漸成骨蒸局方柴胡七分炒白朮蜜蒸茯苓當歸各一錢白芍錢半酒炒甘草炙八分薄荷五分上銼一劑生薑七片水煎溫服痰盛加全蠍炙二枚仍先用通關散搐鼻若牙噤者用烏梅肉擦和南星細辛末以中指蘸藥擦牙自開十二畫黃土湯下血先便後血此遠血也主之亦主吐血金匱吐衄甘草乾地黃阿膠黃芩各三兩白朮附子炮各三兩灶中黃土半斤上七味以水八升煮取三升分溫二服黃芩清肺飲治肺風粉刺皶鼻初起紅色久則肉匏發腫者正宗川芎當歸赤芍防風生地乾葛天花粉連翹紅花各一錢黃芩二錢薄荷五分水二鍾煎八分食後服用酒一杯過口黃芩湯太陽與少陽合病自下利者與之若嘔者黃芩加半夏生薑湯主之傷寒太陽下傷寒脈遲六七日而反與此湯徹其熱脈遲為寒今與此湯復除其熱腹中應冷當不能食今反能食此名除中必死同上厥陰黃芩三兩甘草二兩炙芍藥二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一黃芩加半夏生薑湯太陰與少陽合病自下利者與黃芩湯若嘔者此湯主之傷寒太陽下乾嘔而利者主之金匱黃芩三兩芍藥二兩甘草二兩炙大棗十二枚擘半夏半斤洗生薑一兩半一方三兩切上六味以水一斗煮取三升去滓溫服一升日再夜一服外臺用乾薑有桂枝人參無甘草芍藥名黃芩湯又治乾嘔下痢黃耆建中湯治虛勞裡急諸不足方千金黃耆生薑桂心各三兩甘草二兩芍藥六兩大棗十二枚飴糖一斤上七味㕮咀以水一斗煮取三升去滓內飴令消溫服一升日三間日可作嘔者倍加生薑腹滿者去棗加茯苓四兩佳仲景集驗古今録驗並同深師治虛勞腹滿食少小便多者無飴糖有人參二兩半夏一升又治大虛不足小腹裡急勞寒拘引臍氣上衝胸短氣言語謬誤不能食吸吸氣乏悶亂必效方治虛勞下焦虛冷不甚渴小便數多有人參當歸各一兩若失精加龍骨白蘞各一兩古今録驗治虛勞裡急小腹急痛氣引胸脅痛或心痛短氣者以乾薑代生薑加當歸四兩黃耆建中湯治虛勞有熱胸中煩手足熱心怔忡口苦咽乾咳嗽潮熱等疾服之能進飲食陸彥安方唐仲舉家屢效事證方黃耆去蘆白朮枳殼湯浸去穰前胡三分杏仁去皮尖柴胡銀州者人參白茯苓甘草當歸川芎半夏湯洗七遍黃芩白芍藥羚羊角生乾地黃麥門冬去心各二分上十七味為粗末每服四錢水一大盞半生薑四片煎至八分去滓服食後服日二服黃耆桂枝五物湯血痹陰湯俱微寸口關上微尺中小緊外證身體不仁如風痹狀者主之金匱血痹黃耆三兩芍藥三兩桂枝三兩生薑六兩大棗十二枚一方有人參上五味以水六升煮取二升溫服七合日三服黃耆芍藥桂枝苦酒湯問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如蘗汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之芍藥三兩黃耆五兩桂枝三兩上三味以苦酒一升水七升相和煮取三升服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也金匱水氣黃耆湯筋實極則好怒口乾燥好嗔身躁不定調筋止怒定氣方外臺黃耆芎藭白柘皮無刺者各二兩通草芍藥各四兩甘草炙桂心各二兩大棗四十枚去核石膏八兩碎綿裹竹葉切一升上十一味切以水九升煮取三升去滓分為三服忌海藻菘菜生蔥桃李雀肉黃耆湯療虛勞裡急少腹痛氣引胸脅痛或心痛短氣方同上芍藥六兩黃耆四兩甘草二兩炙桂心二兩乾薑四兩當歸四兩大東十二枚飴糖六兩上八味切以水一斗煮取三升去滓下飴糖令消分三服忌海藻生蔥菘菜黃耆湯療消渴同上黃耆茯苓栝蔞甘草炙麥門冬去心各三兩乾地黃五兩上六味切以水八升煮取二升半分三服忌蕪荑酢物海藻菘菜日進一劑服十劑托服丸藥後腎消門中宜補丸是黃耆湯治咽喉中腫癢微嗽聲不出方聖濟黃耆一兩半人參一兩赤茯苓一兩半桂枝半兩甘草炙一兩上五味粗搗篩每服三錢匕水一盞生薑半分拍破棗二枚擘煎至五分去滓空腹食前各一服黃耆湯自汗屬表虛宜此湯無有不止者然溫疫證屬實常多屬虛常少邪氣盛為實正氣奪為虛虛實之分在乎有熱無熱有熱為實無熱為虛若顛倒誤用未免實實虛虛之誤臨證當慎溫疫黃耆三錢五味子五分當歸一錢白朮一錢甘草五分照常煎服如汗未止加麻黃淨根一錢五分黃耆理中湯治上焦虛寒短氣不續語聲不出千金黃耆桂心各二兩五味子桔梗乾薑茯苓甘草川芎各三兩丹參杏仁各四兩上十味㕮咀以水九升煮取三升為三服黃耆內托散治臀癰已成服活血散瘀湯勢定者欲其潰膿宜服之正宗黃耆二錢當歸川芎金銀花皂角刺穿山甲甘草節各一錢水二鍾煎八分入酒一杯食前服黃連湯傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連三兩甘草炙乾薑桂枝去皮各三兩人參二兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服夜二傷寒太陽下黃連阿膠湯少陰病得之二三日以上心中煩不得臥主之傷寒少陰黃連四兩黃芩二兩芍藥二兩雞子黃二枚阿膠三兩上五味以水六升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服黃連解毒湯前軍劉車者得時疾三日已汗解因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不得臥余思作此湯方外臺黃連三兩黃芩黃蘗各二兩梔子十四枚擘上四味切以水六升煮取二升分二服一服目明再服進粥於此漸差余以療凡大熱盛煩嘔呻吟錯語不得眠皆佳傳語諸人用之亦效此直解熱毒除酷熱不必飲酒劇者此湯療五日中神效忌豬肉冷水正宗有連蕘牛蒡子甘草各五分治疔毒入心內熱口乾煩悶恍惚脈實者宜用黃連瀉心湯治大人小兒心火妄動結成重舌木舌紫舌脹腫堅硬語言不利者並宜服之正宗黃連山梔子荊芥黃芩連翹木通薄荷牛蒡子各一錢甘草五分水二鍾燈心二十根煎八分食後服黃連煎治中焦寒洞泄下痢或因霍亂後瀉黃白無度腹中虛痛方千金方黃連酸石榴皮地榆阿膠各四兩當歸厚朴乾薑各三兩上八味㕮咀以水九升煮取二升去滓下阿膠更煎煬分三服黃連竹茹湯治胃熱煩渴嘔吐回春黃連薑汁炒山梔炒黑竹茹各一錢人參五分白朮去蘆茯苓去皮陳皮白芍炒麥門冬去心甘草二分上銼一劑烏梅一個棗二枚炒米一撮水煎徐徐溫服發熱加柴胡黃連洗湯療眼漠漠方外臺黃連三兩秦皮二兩蕤仁半兩上三味㕮咀水三升煮取一升半絞去滓適寒溫以洗目日四五度又加升麻二兩加水煎之忌豬肉黃龍湯溫疫證本應下耽擱失治或為緩藥羈遲火邪壅閉耗氣搏血精神殆盡邪火獨存以致循衣摸床撮空理線筋惕肉瞤肢體振戰目中不了了皆緣應下失下之咎邪熱一毫未除元神將脫補之則邪毒愈甚攻之則幾微之氣不勝其攻攻不可補不可補瀉不及兩無生理不得已勉用此方此證下亦死不下亦死與其坐以待斃莫如含藥而亡或有回生於萬一宜此方溫疫論大黃厚朴枳實芒硝人參地黃當歸照常煎服黃蘗黑散療小兒臍中汁不差方外臺黃蘗炙一兩釜底墨四分上二味搗和作散以粉臍中即差犀角地黃湯治傷寒及溫病應發汗而不汗之內畜血者及鼻衄吐血不盡內余瘀血大便黑麵黃消瘀血千金犀角一兩生地黃八兩芍藥三兩牡丹皮二兩上以水九升煮取三升分三服喜忘如狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方不須有所增加又溫疫論云服桃仁承氣湯畜血盡而熱亦盡大勢已去亡血過多余焰尚存者宜此湯犀角地黃湯治一切吐血衄血咳血咯血唾血並皆治之回春犀角一錢鎊牡丹皮一錢半生地黃二錢赤芍藥一錢半當歸一錢黃芩一錢上銼一劑水煎熟入茅根汁磨京墨調服犀角旋覆花湯夫腳氣之疾先起嶺南稍來江東得之無漸或微覺疼痹或兩脛腫滿或行起澀弱或上入腹不仁或時冷熱小便澀喘息氣衝喉氣急欲死食嘔不下氣上逆者皆其候也先覺此證先與此湯千金方犀角旋覆花各二兩橘皮茯苓各二兩大棗二七枚香豉一升紫蘇莖葉一握上八味㕮咀以水八升煮取二升七合分三服相去十里久服之以氣下小便利為度崔氏名小犀角湯如其不下服後大犀角湯犀角麻黃湯服大犀角湯竟不下氣急不定主之同上犀角麻黃防風獨活崔氏用茯苓防己芎藭白朮羚羊角崔氏用附子當歸黃芩各二兩石膏四兩生薑甘草杏仁崔氏用細辛桂心各三兩上十五味㕮咀以水二斗煮麻黃去沫取汁八升下藥煎取三升分三服相去十里久服訖覆取汗若不差五日後更一劑取汗同前犀角散治風毒壅熱心胸痰滯兩耳虛聾頭重目眩準繩犀角屑甘菊花前胡枳殼麩炒黃羌活石菖蒲澤瀉木通生地黃各半兩麥門冬去心二兩甘草炙二錢半上為末每服三錢水煎去滓食後溫服犀角黑參湯治發斑毒盛咽痛傷寒緒論犀角黑玄參各一錢升麻射干黃芩人參各一錢甘草生八分上水煎溫服犀角大青湯治斑出大盛大熱心煩狂言悶亂同上犀角三錢大青一錢五分黑玄參升麻黃連黃芩黃蘗山梔各一錢甘草八分生上水煎熱服無時犀角飲子治風熱上壅耳內聾閃焮腫掣痛膿血流出準繩犀角鎊木通石菖蒲甘菊花去根枝玄參赤芍藥赤小豆炒各二錢甘草炙一錢水二鍾生薑五片煎至一鍾不拘時候犀角湯治熱毒流入四肢歷節腫痛方千金犀角二兩羚羊角一兩前胡黃芩梔子仁射干各三兩大黃升麻各四兩豉一升上九味㕮咀以水九升煮取三升去滓分三服犀角湯治風毒熱頭面腫方同上犀角生薑各二兩苦參栝蔞根防風各一兩石膏六兩黃芩青木香升麻各三兩防己一兩半竹葉二握上十一味㕮咀以水七升煮取二升分三服相去十里久內消不利犀角升麻湯王檢正希皋昔患鼻額間痛或麻痹不仁如是者數年忽一日連口唇頰車髮際皆痛不可開口雖言語飲食亦相妨左額與頰上常如糊急手觸之則痛豫作足陽明經絡受風毒傳入經絡血凝滯而不行故有此證或者以排風小續命透水丹之類與之皆不效豫制此湯贈之服數日而愈本事方上等犀角鎊一兩二分真川升麻一兩防風去蘆羌活各三分白芷不見火黃芩去皮川芎洗白附子焙各半兩甘草炙一分上粗末每服四大錢水一盞半煎至八分去滓溫服食後臨臥日三四服犀角消毒飲治大人小兒內蘊邪熱咽膈不利痰涎壅嗽眼赤臉腫腮項結核癰腫毒聚遍身風疹疸毒赤瘦及瘡疹已出未出不能快透並皆治療小兒疹痘欲出及已出熱未解急進此藥三四服快透消毒應神效局方鼠黏子炒六十四兩荊芥穗甘草各十六兩防風去苗八兩上為粗末每服三錢水一盞煎至七分去滓食後溫服吳昆醫方考曰此方名犀角無犀角者謂其功同乎犀角也溫中當歸湯療暴冷心腹刺痛面目青肉冷汗出欲霍亂吐下脈沉細者及傷寒毒冷下清水變作青白滯下及白滯後還復下清水者悉主之此方可以調諸冷痛也外臺當歸人參乾薑茯苓厚朴炙桂心青木香桔梗芍藥甘草炙各二兩上十味切以水八升煮取三升分溫服日三服不耐青木香者以犀角一兩代之忌海藻菘菜豬肉醋物生蔥等溫中補脾湯慢驚之後多因吐瀉或因久瀉或因久瘧而得之身冷面或白或黃不甚搐搦目微微上視口鼻中氣寒大小便清目昏睡露睛筋脈拘攣俗謂之天吊風蓋因脾土極虛中氣不足故寒痰壅盛而風動筋急也此陰證也又危證也急宜溫中補脾則風痰自退蓋治本即所以治標全不必治風治驚彼用蜈蚣全蠍辰砂牛黃等皆誤也活幼心法白朮用里白無油者去蘆去皮炒一錢二分製半夏七分黃耆蜜炙人參各八分白茯苓白豆蔻仁研乾薑炒砂仁研各五分官桂陳皮甘草炙白芍酒炒各四分熟附子若覺虛寒甚者加五分老生薑一片大棗一枚去核水二茶鍾煎八分溫服兒小者分數次服必得肢體溫和風除神爽方可止服遇此症服藥不於遲緩過時其效如神立起回生矣而昔人謂慢驚為九死一生之症何也得非調治錯慢而然乎溫中大黃湯治小兒暴冷水穀下或乳冷下青結不消或冷實吐下乾嘔煩悶及冷滯赤白下者良若已服諸利者去實胃中虛冷下如水乾嘔目陷煩擾不宜利者可除大黃若中乳乳母洗浴水氣未消飲兒遂為霍亂者但用大黃小兒諸霍亂宜利者便用大黃不須利用溫和者除之方千金方大黃六分桂心厚朴甘草乾薑各一分人參茯苓白朮當歸各二分桔梗三分上十味以水二升半煮取八合凡兒三十日至六十日一服二合七十日至一百日一服二合半二百日已來一服三合溫中湯療寒下食完出方外臺甘草炙乾薑各三兩蜀椒八十枚去汁附子一枚炮上四味切以水二升煮取一升分為再服若嘔內橘皮半兩小與老皆取服之良溫經湯問曰婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬滯下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以此湯主之金匱婦人亦主婦人少腹寒久不受胎兼治崩中去血或月水來過多及至期不來同上治衝任虛損月候不調或來多不斷或過期不來或崩中去血過多不止又治曾經損娠瘀血停留少腹急痛發熱下利手掌煩熱唇口燥及治少腹有寒久不受胎局方吳茱萸三兩當歸芎藭芍藥人參桂枝阿膠牡丹皮去心生薑甘草各二兩半夏半斤麥門冬一斤去心上十二味以水一斗煮取三升分溫三服溫經湯治婦人血海虛寒月水不調方局方若婦人經道不通繞臍寒疝痛徹其脈沉緊此由寒客血室血凝不行結積血為氣所沖新血與故血相搏所以發痛譬如天寒地凍水凝成冰宜服此藥十便當歸川芎芍藥桂枝牡丹皮莪朮各半兩人參甘草牛膝各一兩上九味水二盞煎一盞溫服按大全良方同金匱溫經湯加減方也溫脾湯治下久赤白連年不止及霍亂脾胃冷實不消千金大黃四兩人參甘草乾薑各二兩附子一枚大者上五味㕮咀以水八升煮取二升半分三服臨熟下大黃與後溫脾湯小異須大轉瀉者當用此方神效溫膽湯治大病後虛煩不得眠此膽寒故也宜服此湯方千金方生薑四兩半夏二兩洗竹茹二兩枳實二兩橘皮三兩甘草一兩上六味㕮咀以水八升煮取二升分三服按得效方加茯苓二兩人參一兩治驚悸自汗觸事易驚又回春有酸棗仁茯苓治心膽虛怯觸事易驚又加麥門冬人參柴胡桔梗黑錫丹治脾元久冷上實下虛胸中痰飲或上攻頭目瞪昏眩及奔豚氣上衝胸腹連兩脅膨脹刺痛不可忍氣欲絶者及陰陽氣上下不升降飲食不進面黃羸瘦肢體浮腫五積水氣腳氣上攻及牙齦腫痛滿口生瘡齒欲落者兼治脾寒心痛冷汗不止或卒暴中風痰潮上膈言語艱澀神昏氣亂喉中痰響狀似癱瘓曾用風藥吊吐不出者宜用此藥百粒煎薑棗湯灌之壓下風涎自利或觸冒寒邪霍亂吐瀉手足逆冷唇口青黑及男子陽事痿怯腳膝痠軟行步乏力臍腹虛鳴大便久滑及婦人血海久冷白帶自下歲久無子血氣攻注頭面四肢兼療胸膈煩壅痰飲虛喘百藥不愈者局方金鈴子胡蘆巴酒炒木香附子炮肉蔻煨破故紙酒炒沉香鎊茴香舶上者陽起石酒煮研各一兩肉桂半兩黑錫硫黃各二兩上用黑盞或新鐵銚內如常法結黑錫硫黃砂子地上出火毒研令極細余藥併為細末一處和勻入研自朝至暮以黑光色為度酒糊丸梧子大每三四粒空心鹽湯或棗湯下按家寶方直指方並同本事方無陽起石有巴戟天俱十一味三因方有青皮烏藥俱十四味楊氏方無胡蘆巴沉香陽起肉桂俱八味疏鑿飲子治水氣通身洪腫喘呼氣急煩躁多渴大小便不利煮熱藥不得者濟生方澤瀉赤豆炒商陸羌活去蘆大腹皮椒目木通秦艽去蘆檳榔茯苓皮上等分㕮咀每服四錢水一盞半生薑五片煎七分去滓溫服不拘時候疏肝飲治左脅下痛肝積屬血或因怒氣所傷或跌撲閃挫所致或為痛回春黃連吳茱萸煎汁炒二錢柴胡當歸各一錢半青皮桃仁研如泥枳殼麩炒各一錢川芎白芍七分紅花五分上銼一劑水煎食遠服疏經活血湯治遍身走痛如刺左足痛尤甚左屬血多因酒色損傷筋脈虛空被風寒濕熱感於內熱包於寒則痛傷筋絡是以晝輕夜重宜以疏經活血行濕此非白虎歷節風也同上當歸酒洗一錢二分白芍酒炒一錢半生地酒洗蒼朮米泔浸牛膝去蘆酒洗陳皮去白桃仁去皮尖炒威靈仙酒洗各一錢川芎漢防己酒洗羌活防風去蘆白芷各六分龍膽草八分酒洗茯苓去皮七分甘草四分上銼一劑生薑三斤水煎空心溫服忌生冷溫物異功散治婦人血冷氣痛心胸煩悶不思飲食四肢無力頭目昏疼寒熱往來狀似勞倦並治之醫書大全牡丹芍藥白芷乾薑各三錢當歸陳皮官桂玄胡川芎桔梗各半兩烏藥半兩上為末每二錢生薑三片酒水各半盞煎七分溫服初生時宜服此藥每日三服七日後漸減服數至十日滿永無疾病服後些少腹痛不妨異功散溫中和氣治吐瀉不思食凡治小兒虛冷病先與數服以正其氣直訣人參茯苓白朮甘草炙陳皮各等分上每二錢水一盞生薑五片棗二個煎七分食前溫熱服異功散能除風寒熱濕痹調和陰陽滋養氣血使痘瘡易出易靨不至癢塌善救表虛文中代代為醫不敢妄處藥餌思人身難得因果非輕陳氏方木香官桂當歸茯苓人參陳皮厚朴肉蔻各一兩丁香附子炮半夏各一兩半白朮一兩上每三錢水一大盞半生薑五片肥棗三枚煎六分空心溫服萎蕤湯治風溫之病脈陰陽俱浮汗出體重其息必喘其形狀不仁默默但欲眠下之者則小便難發其汗者必讝語加燒針者則耳聾難言但吐下之遺失便利如此者宜服之方千金方無葛根治冬溫及春月中風傷寒則發熱頭腦痛咽喉干舌強骨肉疼心胸痞滿腰背強亦治風溫小品方風溫者脈尺寸俱浮頭痛身熱常自汗出體重其必喘四肢不收默默但欲眠治在少陰厥陰不可發汗發即讝語獨語內煩躁不得臥若驚癇目亂無精如此死者醫殺之耳準繩無白薇有白芷治風溫咳嗽及冬溫發熱頭眩咽乾舌強醫通萎蕤一錢五分石膏二錢碎白薇麻黃去節川芎葛根羌活甘草杏仁去皮尖碎青木香各一錢上水煎日三服千金方無葛根用獨活以上九味㕮咀以水八升煮取三升去滓分三服取汗若一寒一熱加朴硝一分及大黃三兩下之如無木香可用麝香一分雲林參苓白朮散治氣虛泄瀉凡虛瀉者飲食入胃即瀉水穀不化脈微弱是也回春治痘出裡寒飲食少進大便泄瀉小便清白神氣倦口鼻氣冷瘡不起發保赤全書人參白朮去蘆茯苓去皮砂仁炒山藥炒藿香陳皮乾薑炒蓮肉去心皮訶子煨肉蔻煨去油甘草炒各等分上銼一劑生薑一片燈心一圈水煎服嘔噦噁心加半夏烏梅元氣虛脫昏倦加黃耆升麻少許去砂仁藿香飽悶加厚朴去內蔻訶子水小短澀加木通車前炒去乾薑瀉甚不止加炒蒼朮烏梅熟附子少許越脾湯風水惡風一身悉腫脈浮不渴續自汗出無大熱主之金匱麻黃六兩石膏半斤生薑一兩大棗十五枚甘草二兩上五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服越脾加朮湯治內極熱則身體津脫腠理開汗大泄厲風氣下焦腳弱金匱里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也主之同上于越脾湯內加白朮四兩惡風加附子一枚炮越脾加半夏湯咳而上氣為肺脹其人喘目如脫狀脈浮大者主之同上于越脾湯內加半夏半斤提肛散治氣虛肛門下墜及脫肛便血脾胃虛弱等症正宗川芎歸身白朮人參黃耆陳皮甘草各一錢升麻柴胡條芩黃連白芷各五分水二鍾煎八分食遠服渣再煎服提氣散脫肛乃脾肺虛寒也下脫肛門翻出也宜此方壽世保元蓋肺與大腸為表裡肛者大腸門肺實熱則閉結虛寒則脫肛腎主大腸故肺腎虛者多有此症同上黃耆蜜炒人參白朮去蘆當歸各一錢白芍炒八分乾薑炒柴胡升麻羌活各五分甘草炙二分上銼水煎服鉤藤散治肝厥頭昏清頭目準繩鉤藤陳皮半夏麥門冬茯苓茯神各半兩石膏人參甘菊花防風各半兩甘草一分炙上為粗末每服四錢水一鍾半薑七片煎八分溫服鉤藤飲治吐利脾胃虛慢驚幼幼新書鉤藤二分蟬殼防風焙人參切去須焙麻黃去節白殭蠶炒天麻蠍尾去毒炒各半兩甘草炙川芎各一分麝香一錢細末二錢水一盞煎六分溫服量與寒多加附子半錢無時舒筋湯臂痛不能舉有人常苦左臂痛或以為風為濕諸藥悉投繼以針灸俱不得效用此方而愈蓋是氣血凝滯經絡不行所致非風濕腰以下食前服腰以上食後服準繩薑黃二錢如無則以嫩莪朮代之芍藥當歸海桐去角皮白朮以上各一錢半羌活甘草炙各一錢半上作一服水二鍾生薑三片煎至一鍾去滓磨沉香汁少許食前服大全良方名舒經湯直指增味五痹湯無防己惺惺散治小兒風熱瘡疹傷寒時氣頭痛壯熱目澀多睡咳嗽喘粗鼻塞清涕局方治頭痛壯熱喘急此攻毒散熱之劑保赤人參去蘆甘草炙細辛去葉瓜蔞根茯苓去皮白朮桔梗各一兩半上件同杵羅為末每服一錢水一小盞入薄荷三葉同煎至四分溫服要和氣即入生薑煎服不計時一方無瓜蔞根有川芎普濟消毒飲治時毒疫癘初覺憎寒發熱肢體沉重次傳頭面作腫或咽喉不利舌乾口燥煩渴不寧者服正宗黃芩黃連各二錢人參一錢陳皮去白玄參甘草柴胡桔梗炒各一錢五分連翹牛蒡子馬勃板藍根一作大青升麻殭蠶各五分水二碗煎八分食後服如大便燥加煨大黃一錢或二錢以利為度腫勢甚者宜砭去惡血開結舒經湯婦人手足麻痹者七情六淫鬱滯經絡也回春紫蘇陳皮香附烏藥川芎蒼朮米泔制羌活南星半夏薑製當歸各八分桂枝甘草各四分上銼一劑生薑三片水煎臨服入竹瀝薑汁少許同服訶梨勒散氣利主之金匱嘔吐訶梨勒十枚煨上一味為散粥飲和頓服順氣和中湯治嘔吐翻胃嘈雜吞酸痞悶噫氣噎膈心腹刺痛噁心吐痰水回春陳皮鹽水浸炒一錢半夏薑汁炒七分白茯苓去皮七分白朮去蘆炒七八分枳殼麩炒五分香附薑汁炒黑一錢砂仁炒三分黃連六分薑汁和豬膽汁拌炒山梔薑汁炒黑一錢神麯炒六分甘草炙三分上銼一劑生薑三片長流水入嬌泥攪澄清水一鍾煎至七分入竹瀝童便薑汁不拘時細細溫服萆薢湯治結毒筋骨疼痛頭脹欲破及已潰腐爛並效正宗川萆薢二錢苦參防風何首烏各一錢威靈仙當歸白芷蒼朮胡麻石菖蒲黃柏各六分羌活川椒各四分龜板一錢五分紅花三分甘草五分水二鍾煎八分臨服入酒一杯量病上下服之雄黃熏蝕於肛者熏之金匱雄黃上一味為末筒瓦二枚合之燒向肛熏之脈經云病人或從呼吸上蝕其咽或從下焦蝕之肛陰蝕上為惑蝕下為狐狐惑者豬苓散主之百合病腎著湯治妊娠腰腳腫痛三因方茯苓白朮各四兩乾薑炮甘草炙各二兩杏仁炒三兩上每四錢水一盞半煎七分食前服千金方腎著湯無杏仁大全良方亦同椒梅湯治時痛時止面白唇紅者是蟲痛回春烏梅蜀椒枳實木香另研肉桂砂仁厚朴乾薑川楝子去核檳榔子香附子甘草各等分上十二味生薑一片水煎溫服痢聖散子治丈夫婦人遠年近日赤白休息等痢局方黃蘗皮去粗皮枳殼去穰甘草爁御米即罌粟子罌粟花去蒂蓋各四兩乾薑炮當歸去蘆各二兩上件為粗散每服三錢水一盞半薤白二條擘碎同煎至八分去滓食前稍溫服老人小兒加減服忌食生冷油膩之物華蓋散治肺感寒邪咳嗽上氣胸膈煩滿項背拘急聲重鼻塞頭昏目眩痰氣不利呀呷有聲同上麻黃去根節紫蘇子隔紙炒桑白皮炙杏仁去皮尖炒赤茯苓去皮陳皮去白一兩甘草炙半兩上藥為末每服二錢水一盞煎七分去滓食後溫服十三畫達原飲溫疫初起先憎寒而後發熱日後但熱而無憎寒也初得之二三日其脈不浮不沉而數晝夜發熱日晡益甚頭痛身痛其時在挾脊之前腸胃之後雖有頭疼身痛此邪熱浮越於經不可認為傷寒表證輒用麻黃桂枝之類強發其汗此邪不在經汗之徒傷表氣熱亦不減又不可下此邪不在裡下之徒傷胃氣其渴愈甚宜此方溫疫檳榔二錢草果仁五分厚朴一錢知母一錢芍藥一錢黃芩二錢甘草五分上用水二鍾煎八分午後溫服當歸建中湯治婦人産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急掣痛引腰背不能食飲産後一月日得四五劑為善令人強壯宜此方金匱婦人當歸四兩桂枝三兩芍藥六兩生薑三兩大棗十二枚甘草二兩上六味以水一斗煮取三升分溫三服一日令盡若大虛加飴糖六兩湯成內之於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成內阿膠若無當歸以芎藭代之若無生薑以乾薑代之當歸生薑羊肉湯寒疝腹中痛及脅痛裡急者宜此方金匱寒疝産後腹㽱痛主之並治腹中寒疝虛勞不足同上産後當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之當歸芍藥散婦人懷妊腹中㽱痛主之同上婦人腹中諸疾痛主之同上當歸三兩芍藥一斤白朮四兩茯苓四兩澤瀉半斤芎藭半斤上六味杵為散取方寸匕酒和日三服當歸四逆湯手足厥寒脈細欲絶者主之傷寒厥陰當歸三兩桂枝三兩去皮芍藥三兩細辛三兩甘草二兩炙通草二兩大棗十二枚擘上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯若其人內有久寒者主之同上當歸芍藥各三兩甘草二兩炙通草二兩桂枝二兩去皮細辛三兩生薑半斤切吳茱萸二斤大棗二十五枚擘上九味水六升清酒六升和煮取五升去滓溫分五服一方水酒各四升當歸散婦人妊娠宜常服之妊娠常服即易産胎無疾苦産後百病悉主之金匱妊娠當歸黃芩芍藥芎藭各一斤白朮半斤上五味杵為散飲服方寸匕日再服當歸鶴蝨散九種心痛蛔蟲冷氣先從兩肋胸背撮痛欲變吐方外臺當歸八分鶴蝨八分橘皮六分人參六分檳榔十二分枳實六分炙芍藥六分桂心五分上八味搗篩為散空腹煮薑棗飲服方寸匕日二服漸漸加之一匕半不利忌生蔥生冷物油膩黏食當歸湯療卒心腹痛氣脹滿不下食欲得瀉三兩行佳同上當歸茯苓橘皮桔梗高良薑檳榔各八分生薑八分上七味細切以水七升煮取二升三合絞去滓分溫三服服別相去如人行六七里服訖利三兩行宜停後服忌豬肉酢物生冷油膩魚蒜黏食小豆當歸湯療心痛冷痛腹滿如錐刺及蟲齧心痛方同上當歸三兩桔梗二兩吳茱萸三兩桂心三兩芍藥二兩大黃二兩上六味切以水六升煮取三升三合去滓內鶴蝨一兩攪溫一沸分三服空腹服之微利度忌豬肉生蔥當歸湯冷氣脅下往來胸膈痛引背脅悶同上當歸芍藥吳茱萸桂心人參大黃甘草各二兩茯苓枳實各一兩乾薑三兩上十味細切以水八升煎取二升半一服八合日三服治尸疰亦佳忌海藻菘菜生蔥酢物等當歸湯主心腹攪結痛不止似有蛔蟲者同上當歸橘皮細辛甘草炙生薑各四分大黃八分別漬鶴蝨二分上七味切以水六升煮取二升分溫三服如人行四五里進一服不利未差三日更服之忌海藻菘菜生菜當歸散凡小兒夜啼者藏寒而腹痛面色青手冷不吐乳是也此方服之妙準繩當歸去蘆頭芍藥人參各一錢甘草炙桔梗陳皮各一錢上㕮咀煎五合時時少服愈當歸湯療妊娠五月舉動驚愕動胎不安下在少腹痛引腰胳腋下小便瘀下血安胎方外臺當歸阿膠炙芎藭人參各一兩大棗十二枚擘艾一虎口上六味以酒水各三升合煮取三升去滓內膠令煬分三服腹中當小便緩差也當歸養血湯年老之人陰血枯稿痰火氣結升而不降飲食不下者及成膈噎之病也回春當歸白芍煨熟地黃茯苓去皮各一錢貝母去心瓜蔞去殼枳實麩炒陳皮厚朴薑汁炙香附撫芎蘇子炒各七分沉香五分黃連用吳茱萸同炒去萸不用用連八分上銼一劑薑一片棗二枚水煎竹瀝磨沉香調服當歸飲子治心血凝滯內蘊風熱發見皮膚遍身瘡疥或癢或膿水浸淫或發赤疹㾦癗濟生方當歸去蘆白芍川芎生地黃洗白蒺藜炒去尖防風去蘆荊芥穗各一兩何首烏各一錢黃耆去蘆甘草半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候當歸六黃湯主盜汗聖藥也蘭室祕藏當歸黃耆各一錢黃蘗黃芩黃連生熟地黃各七分上為粗末每服五錢水二盞煎至一盞食前服小兒減半服之當歸連翹湯治痔漏回春當歸連翹防風黃芩荊芥白芷芍藥生地黃山梔白朮人參阿膠地榆各等分甘草上銼一劑烏梅一個棗一枚同煎食前服當歸郁李湯治痔大便結燥大腸下墜出血苦痛不能忍者正宗當歸郁李仁澤瀉生地黃大黃枳實蒼朮秦艽各一錢麻子仁研一錢五分皂角一錢水二鍾煎八分空心服當歸拈痛湯治濕熱下注腿腳生瘡赤腫作痛或腰腳痠痛或四肢遍身腫痛或下部頑麻作癢或成血風正宗羌活當歸防風茵陳蒼朮各一錢苦參升麻白朮各七分葛根甘草黃芩知母豬苓人參各五分黃蘗三分準繩無澤瀉五分水二鍾煎八分食前服當歸導氣湯治膿血痢無度小便不通腹中痛準繩甘草一錢半當歸芍藥各一錢木香青皮槐花炒各七分澤瀉五分生地黃一錢半酒浸檳榔三錢上共為末用水煎食前溫服如小便利去澤瀉當歸四逆湯治十年患疝形容枯稿左脅有形其大如臂以熱手握之瀝瀝有聲甚至上攻於心悶絶者久之熱醋熏炙方蘇醫宗必讀當歸七分附子炮肉桂茴香炒各五分芍藥四分延胡索茯苓三兩澤瀉二分柴胡五分川楝子三分上藥研為粗末都作一服水煎空心服宣明方有山楂子無茴香當歸芍藥湯治産後虛損逆害飲食方千金方當歸一兩半芍藥人參桂心生薑乾地黃甘草各一兩大棗二十枚上八味㕮咀以水七升煮取三升去滓分三服日三補中益氣湯治中氣不足或誤服克伐藥四肢倦怠口乾發熱飲食無味或飲食失節勞倦身熱脈洪大而無力或頭痛惡寒自汗或氣高而喘身熱而煩脈微細軟弱自汗體倦或中氣虛弱而不能攝血或飲食勞倦而患瘧痢等症回春經云勞者溫之損者益之又云甘溫能除大熱大忌苦寒藥損其脾胃之氣始得則熱中今立治始得之證脾胃論當歸一錢陳皮五分升麻柴胡各二分黃耆白朮人參甘草炙各一錢半上件藥㕮咀作一服水二盞煎至一盞量氣弱氣盛臨病斟酌水盞大小去楂食遠稍熱服如傷寒之重者不過二服愈若病久者以權立加減法治之正宗有麥門冬六分五味子五分補肝湯治肝氣不足兩脅下滿筋急不得大息四肢厥冷發搶心腹痛目不明瞭及婦人心痛乳癰膝熱渴爪甲枯口面青者方千金山茱翼作烏頭甘草桂心各三兩桃仁翼作蕤人柏子仁細辛防風茯苓各二兩大棗二十四枚上九味㕮咀以水九升煮取五升去滓分三服補肝散治肝風內障不痛不癢眼見花發黃白黑赤或一物二形難辨方準繩羚羊角防風各三兩人參茯苓各二兩玄參細辛車前黃芩炒羌活各一兩上為末食後米飲調服一錢補肺湯治肺氣不足逆滿上氣咽中悶塞短氣寒從背起口中如含霜雪言語失聲甚者吐血方千金五味子三兩乾薑桂心款冬花各二兩麥門冬一升大棗一百枚粳米二合桑根白皮一升上八味㕮咀以水一斗先煮桑白皮五沸下藥煮取三升分三服補肺湯專治肺氣不足咳嗽上氣牽繩而坐吐沫唾血不能飲食方千金蘇子一升桑白皮五兩半夏六兩紫菀人參甘草五味子杏仁各二兩款冬花射干各半兩麻黃乾薑桂心各三兩細辛一兩半上十四味㕮咀以水一斗二升煮取三升半分五服日三夜二補肺人參湯治肺藏氣虛咳嗽少力言語聲嘶吃食減少日漸羸瘦方聖濟人參一兩紫菀去苗土半兩黃耆鹿角膠搗研炒黃桂皮去粗皮各一兩白朮紫蘇莖葉各三分五味子乾薑炮各半兩乾地黃一兩杏仁湯浸去皮尖雙仁炒半兩上一十一味粗搗篩每服二錢匕水一盞棗三枚擘破同煎至六分去滓不計時候服葛根湯太陽病項背強𠘧𠘧無汗惡風者主之太陽中篇太陽與陽明合病者必自下利主之同上太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙者主之金匱痙病葛根四兩麻黃三兩去節桂枝二兩去皮生薑三兩切大棗十二枚擘芍藥二兩甘草二兩炙上七味㕮咀以水一斗先煮麻黃葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥如桂枝法將息及禁忌諸湯皆仿此葛根加半夏湯太陽與陽明合病不下利但嘔者主之傷寒太陽中篇葛根四兩麻黃二兩去節甘草二兩炙芍藥二兩桂枝二兩去皮生薑二兩切半夏半斤洗大棗十二枚擘上八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗葛根黃連黃芩湯太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出主之同上葛根半斤甘草二兩炙黃芩二兩黃連三兩上四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服葛根解肌湯治麻疹初起發熱咳嗽或乍涼乍熱主之醫通葛根前胡荊芥鼠黏子連翹赤芍蟬脫木通各等分生甘草減半水煎熱服葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂膈痞塞手足戰搖飲食減少小便不利辨惑論白蔻砂仁葛花各五錢木香五分青皮三分水煎溫服或為極末每服三錢匕白湯調下但微汗酒病去解肌湯治傷寒溫病方千金葛根四兩麻黃三兩黃芩芍藥甘草各二兩大棗十二枚上六味㕮咀以水一斗煮取三升飲一升日三服三四日不解脈浮者宜重服發汗脈沉實者宜以駃豉丸下之按局方葛根解肌湯從延年方有桂心一兩作七味又活人書同解毒湯治下疳初起黴瘡祕録連翹荊芥木通黃連生地黃牛膝滑石忍冬花何首烏甘草各等分用水二大鐘煎八分服渣再煎七分服解毒瀉心湯治心經火旺酷暑時臨致生天泡發及遍身者正宗黃連防風荊芥山梔黃芩牛蒡子滑石玄參知母石膏各一錢木通甘草各五分水二鍾燈心二十根煎八分食遠服解急蜀椒湯主寒疝氣心痛如刺繞臍腹中盡痛白汗出欲絶方外臺蜀椒二百枚汗附子一枚炮粳米半斤乾薑半兩半夏十二枚洗大棗十二枚甘草一兩炙上七味切以水七升煮取三升澄清熱服一升不差更服一升數用療心腹痛囷結欲死解結逐寒上下痛良忌豬羊肉餳海藻菘菜肘後古今録驗範汪方無甘草余同經心録同滋腎明目湯治勞神腎虛血少眼痛回春當歸川芎生地黃熟地黃白芍以上倍桔梗人參山梔黃連白芷蔓荊子菊花甘草以上減半上銼劑細茶一撮燈心一團水煎食後服熱甚加草龍膽柴胡腎虛加黃蘗知母風熱壅甚加防風荊芥風熱紅腫加連翹黃芩滋陰降火湯治陰虛火動發熱咳嗽吐痰喘急盜汗口乾此方與六味地黃丸相兼服之大補虛勞神效回春當歸酒洗一錢二分白芍酒炒一錢三分生地黃八分熟地黃薑汁炒天門冬去心麥門冬去心白朮去蘆各一錢陳皮七分黃蘗去皮蜜水炒知母各五分甘草炙五分上銼一劑生薑三片大棗一枚水煎臨服入竹瀝童便薑汁少許同服塌氣散治腫幼幼新書中庸樟柳根赤小豆橘皮紅蘿蔔子檳榔甘草各半兩木香一分上末二錢水小盞薑棗煎六分通口服量與塌氣散瀉利差後遍身腫主之同上凡冷利日久失醫治遍身浮腫卻如吹脈洪是氣化為水沉實還因積有之氣順腫消為上法氣平兩日定多尿莫交食飽還憂滯此疾元因積損脾同上茴香白牽牛甘草炒木香各一錢上末半錢紫蘇湯下滑石代赭湯百合病下之後者主之金匱百合百合七枚擘滑石三兩碎綿裹代赭石彈丸一枚綿裹上先以水洗百合漬一宿當沫出去其水更以泉二升煎取一升去滓別以泉水二升煎滑石代赭取一升去滓後和合重煎取一升五合溫服滑石白魚散小便不利主之同上消渴滑石二分亂髮二分燒白魚二分上三味杵為散飲服半錢匕日三服鼠黏子湯治鬢疽初起熱多寒少頭眩作痛口燥咽乾渴當飲冷二便祕澀六脈沉實有力煩悶疼痛者外科正宗鼠黏子桔梗當歸甘草梢赤芍連翹玄參地骨皮防風天花粉木通各一錢大黃炒一錢水二鍾煎八分食前服渣再煎服搜風解毒湯治楊梅瘡不犯輕粉病深者月餘淺者半月即愈服輕粉藥筋骨攣痛癱瘓不能動履者服之亦效本草綱目入門名仙遺糧湯土茯苓一兩薏苡仁金銀花防風木瓜木通白蘚皮各五分皂莢子四分人參氣虛加七分當歸血虛加七分水二大碗煎飲一日三服惟忌飲茶及牛羊雞鵝魚肉燒酒麥面房勞蓋祕方也傷寒頭痛壯熱百節疼痛方千金方柴胡梔子仁芍藥知母各四兩升麻黃芩大青杏仁各三兩石膏八兩香豉一斤上十味㕮咀以水九升煮取二升七合分溫三服若熱甚加大黃四兩蜀漆散瘧多寒者名牡瘧主之金匱蜀漆燒去腥雲母燒二日夜龍骨等分上三味杵為散未發前以漿水半錢溫瘧加蜀漆半分臨發時服一錢匕一方雲母作雲實痰澼心腹痛兼冷方同上鱉甲炙柴胡赤芍藥各八分甘草炙枳實炙生薑白朮各六分檳榔七個上八味切以水六升煮七味取二升半去滓內檳榔末分服八合當利忌海藻菘菜莧菜桃李雀肉等飲酒房勞虛受熱積日不食四體中虛熱飲食不已入百脈心氣虛令人錯謬失常方外臺酸棗仁半升人參白薇枳實炙知母栝蔞根芍藥各二兩茯苓三兩一作茯神甘草炙一兩生地黃八兩上十味切以水一斗煮取三升分三服葶藶大棗瀉肺湯肺癰喘不得臥金匱肺癰療支飲不得息主之方千金肺癰胸滿一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞主之脈經葶藶熬令黃色搗丸如彈丸大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服腰膝髀連腿腳疼酸者方外臺方杜仲八兩獨活四兩乾地黃四兩當歸川芎各四兩丹參五兩上六味切以絹袋盛上清酒二斗漬之五宿初服二合日再服以知為度忌蕪荑瑞金散治婦人血氣撮痛月經不行預先嘔吐疼痛及月信不通婦人大全良方又名薑黃散片子薑黃四兩牡丹皮莪朮紅花當歸赤芍藥川芎桂心延胡索各兩半上為末每服二錢水一盞酒三分溫服日三腹中痃氣連心引痛緊急方外臺白朮三兩枳實三兩炙柴胡四兩鱉甲二兩炙上四味切以水七升煮取二升五合去滓空肚分三服相去七八里久能連服三四劑始知驗禁生冷豬肉並毒魚大須慎之頻服有效忌莧菜生蔥葵子茯苓丸妊娠有水氣身重小便不利灑淅惡寒起即頭眩者主之金匱葵子一斤茯苓三兩上二味杵為散飲服方寸匕日三服小便利則愈十四畫酸棗湯虛勞虛煩不得眠同上療虛勞不得眠煩不可寧者方外臺有生薑二兩一方加桂二兩酸棗仁二升甘草一兩知母二兩茯苓二兩芎藭二兩上五味以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服深師有生薑二兩麥門冬一升酸棗湯治虛勞煩擾奔氣在胸中不得眠方千金酸棗仁五升人參桂心生薑各二兩石膏四兩茯苓知母各三兩甘草一兩半上八味㕮咀以水一斗先煮酸棗仁取七升去滓下藥煮取三升分三服日三酸棗仁湯治風毒散攻下焦冷注四肢疼痛腳膝𤸷痹及風邪干藏心神恍惚筋脈拘急聖濟酸棗仁炒一兩薏苡仁炒一兩半人參三分茯神去木一兩麥門冬去心焙半兩上五味粗搗篩每服四錢匕水一盞煎至七分去滓熱服不拘時日三遠志散治肝邪熱出言反常乍寬乍急方千金遠志射干杏仁大青各一兩半茯神麥門冬葛根甘草各一兩芍藥一兩三分桂心三分知母升麻各五分石膏二兩上十三味治下篩為粗散以水二升五合煮竹葉一升取汁內藥一匕半煎取八合為一服日一以綿裹散煮之遠志丸治因驚言語顛錯不能服溫藥宜此方本事方硃砂半兩入麝香少許同研金箔五片遠志南星白附子炮微黃白茯苓酸棗仁人參各八兩上八味煉蜜丸如梧子大硃砂為衣每服三十丸薄荷湯下食後臨臥服濟生方無金箔白附子天南星酸棗仁有石菖龍齒茯神俱七味遠志湯治産後忽苦心中衝悸不定志意不安言語錯誤惚惚憒憒情不自覺産後得此症是心虛所致若其人心胸逆氣加半夏三兩遠志麥冬人參甘草當歸桂心各二兩芍藥一兩茯苓五兩生薑六兩大棗二十枚上以水一斗煮取三升分三服羸者分四服千金方蜜煎導方陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜此導而通之若土瓜根及大豬膽汁皆可為導傷寒食蜜七合上一味於銅器內微火煎當凝如飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之蜜附湯治心腹疼痛或吐或泄狀如霍亂及療冒涉濕寒賊風入腹拘急切痛三因方附子生去皮臍切作四片以白蜜煎令附變色以湯洗去蜜切半兩桂芍藥各三兩甘草炙四分上每四大錢水一盞薑五片棗二枚煎七分食前服大便祕結入白蜜半匙煎按易簡方附子建中湯方後云治疝氣發作加蜜一箸頭煎名蜜附子湯寧志丸治心虛血虛多驚直指方人參茯苓茯神柏子琥珀當歸酸棗炒遠志酒浸半日焙各半兩乳香硃砂別研石菖各一兩上末蜜圓梧子大每三十丸食後棗湯下按千金定志小丸百一選方産後寧志膏兩合無當歸柏子又比魏氏八物定志丸則有紫石英無柏子茯苓琥珀當歸寧志膏治心臟虧虛神志不守恐怖驚惕常多恍惚易於健忘睡臥不寧夢涉危險一切心疾皆治之局方酸棗仁微炒去皮一本作二兩人參去蘆各一兩辰砂研細水飛半兩乳香以乳鉢坐水盞中細研一分上各研和勻煉蜜丸如彈子大每服一粒溫酒化下棗湯亦得空心臨臥服按百一選方寧志丸有當歸石菖茯苓鼻中瘜肉不通利方外臺細辛瓜蒂各等分末以吹鼻中須臾涕出頻吹之差千金方絮裹如棗大塞鼻中須臾通張文仲亦治鼻癰不聞香臭榮衛返魂湯流注癰疽發者傷折非此不能效至於救壞病活死肌真仙妙劑主之準繩何首烏不犯鐵當歸木通去皮節赤芍藥炒白芷不見火茴香炒土烏藥炒陳皮殼麵炒若噁心加薑汁炒甘草上方止九味各等分水酒湯使隨症用之惟流注加獨活每服四錢病在上食後服病在下食前服又名通順散或何首烏散漢防己散治傷寒熱毒逼心譫語見鬼神不安宜服聖惠方漢防己半兩桂心三分防風三分去蘆甘草半兩炙微赤銼生地黃二斤絞取汁上件藥搗羅為末入地黃汁水一大盞調令勻入銀器中盛甑中蒸半日取去每服三合以溫水下之不計時候服之即金匱防己地黃湯也駃豉丹治傷寒留飲宿食不消方同上豆豉一升巴豆去油三百枚今用二百枚杏仁六十枚黃芩黃連大黃麻黃各四兩芒硝甘遂各三兩上九味為末以酒和丸如大豆服二丸不得下者增之葦莖湯治咳有微熱煩滿胸中甲錯是為肺癰金匱肺痿葦莖二升薏苡仁半升桃仁五十枚瓜瓣半升上四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿蜘蛛散陰孤疝氣者偏有小大時時上下主之金匱跌蹶蜘蛛十四枚熬焦桂枝半兩上二味為散取八分一匕飲和服日再服蜜丸亦可蒲灰散厥而皮水者主之金匱水氣小便不利者主之同上蒲灰七分滑石三分上二味為散飲服方寸匕日三服膈氣丸治氣食憂勞思慮方事證方半夏湯浸七次薄切焙桔梗各二兩炒肉桂不見火枳殼去穰麩炒各一錢半上細末薑汁糊丸梧子大薑湯下三十丸臨臥服實脾散治脾元虛腫本事方大附子一個炮去皮臍草果子去皮乾薑炮各二兩甘草一兩炙大腹連皮六個木香一個切片上用水於砂器內同煮一半以來擘開乾薑心肉白為度不得全令水乾恐近底焦取出銼焙為末每服空心日午用沸湯點服一方有厚朴白朮木香茯苓共十味治遍身腫不煩渴大便自調或溏泄小便雖少而不赤澀此屬陰水此湯主之實脾飲治水腫回春治中滿或鼓脹兼脾虛發腫飽悶同上蒼朮白朮厚朴枳殼陳皮茯苓各一錢砂仁七分木香三分香附豬苓澤瀉大腹皮各八分上銼作劑燈心一團水煎磨木香調服或枳殼代枳實名分消湯十五畫調胃承氣湯傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與此湯若重發汗復加燒針者四逆湯主之傷寒太陽發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與此湯同上太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜此湯同上傷寒十三日過經讝語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治若自下利者脈當微厥今反和者此為內實也此湯主之同上太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與此湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也同上陽明病不吐不下心煩者可與此湯同上陽明太陽病三日發汗不解蒸蒸發熱者屬胃也宜此湯同上傷寒吐後腹脹滿者與此湯同上大便不通胃氣不和者同上邪熱傳裡無痞滿惟存宿結而有瘀熱者主之溫疫論有生薑芒硝半升甘草二兩炙大黃四兩去皮酒漬洗上三味以水三升煮取一升去滓內芒硝更煮兩沸頓服調中湯療夏月及初秋忽有暴寒折於盛熱熱結四肢則壯熱頭痛傷於胃則下利或血或水或赤帶下壯熱且悶脈微且數宜下之方外臺又調中湯去大黃即治風溫證兼治陽病因下遂協利不止及傷寒不因下自利表不解而脈浮數者皆可去大黃煎之殊驗也活人書大黃葛根黃芩芍藥桔梗茯苓藁本白朮甘草炙各二兩上九味以水九升煮取三升分三服服別相去二食久勿以食隔須取快下壯熱便歇其下亦止也凡秋夏旱熱積日忽有暴寒折之熱無可散喜搏著肌中作壯熱氣也胃為六腑之長最易得傷非忽暴寒傷之而下也虛冷人則不壯熱但下利或霍亂也少實人有服五石人喜壯熱其適與藥吃斷下則加熱鬱悶而死矣亦有不止便作壅熱毒壯熱甚不歇則劇是以宜此調中湯下之和其胃氣其表熱者宜前胡大黃下之也調中湯論曰産後腹痛及瀉利者何答曰産後腸胃虛怯寒邪易侵若未滿月欲冷當風乘虛襲留於原膜散於腹脅故腹痛作陳或如錐刀所刺流入大腸水穀不化洞泄腸鳴或下赤白胠脅䐜脹或痛走不定急服此湯立愈若醫者以為積滯取之禍不旋踵謹之謹之婦人大全良方高良薑當歸桂心芍藥附子炮川芎各一分甘草半分上為粗末每服三錢匕水三盞煎至一盞去滓熱服評曰産後下痢非止一證當隨所因而調之既云欲冷當風何所不至寒熱風濕本屬外因喜怒憂思還從自性況勞逸飢飽皆能致病若其洞泄可服調中湯赤白滯下非此能愈各隨門類別有正方調經方産後四肢浮腫者何答曰産後敗血乘虛停積於五臟經流入四肢留淫日深卻還不得腐壞如水故令四肢面目浮腫醫人不識便作水氣治之凡治水氣多用導水藥極虛人夫差後既虛之是為重虛往往因致夭枉但服此散行瘀腫消即愈三因方沒藥別研琥珀桂心赤芍藥當歸各一兩細辛麝香各半錢別研上為末每服半錢匕生薑汁溫酒各少許調勻服增損四物湯産後乍寒乍熱者何答曰陰陽不和敗血不散能令乍寒乍熱産後血氣虛損陰陽不和陰勝則乍寒陽勝則乍熱陰陽相乘則或寒或熱若因産勞臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則謬矣陰陽不和宜增損四物湯敗血不散奪命丹又問二者何以別之答曰時有刺痛者敗血俱寒熱無他證者陰陽不和宜此方三因方治婦人血氣不足四肢惰怠乏力少氣兼治産後下血過多榮衛虛損陽氣不和乍寒乍熱並宜服之易簡方當歸去蘆甘草炙芍藥川芎去蘆乾薑炮人參各等分上㕮咀每服四錢水一盞煎至六分去滓熱服樂令黃耆湯療虛勞少氣胸心痰冷時驚惕心中悸動手足逆冷體常自汗補諸不足五臟六腑虛損腸鳴風濕榮衛不調百病又治風裡急方外臺黃耆二兩當歸三兩烏頭三兩炮去皮尖破四片入蜜炙之金黃色桂心三兩生薑四兩蜀椒二兩去汗人參二兩芍藥二兩大棗七枚擘茯苓二兩遠志二兩去心半夏四兩洗上十二味㕮咀切以水一斗五升煮取四升分服八合日三夜再忌生蔥羊肉餳豬肉冷水大酢千金有橘皮細辛前胡甘草麥門冬無烏頭蜀椒遠志為十四味潤腸湯治大便閉結不通回春當歸熟地火麻仁去殼桃仁去皮杏仁去皮枳殼厚朴去粗皮黃芩大黃各等分甘草上銼一劑水煎空心熱服大便通即止藥不得多服如修合潤腸丸將藥加減各為末煉蜜為丸如梧桐子大每服五十丸空心白湯吞下切忌辛熱之物廣濟半夏湯療胸脅不利腹中脹氣急妨悶外臺腳氣心煩悶氣急不安方同上半夏一升湯洗去滑生薑八兩桂心三兩檳榔二兩半末上四味切以水八升煮減半內檳榔仁末煎取二升八合絞去滓分溫三服服別相去如人行五六里進一服微利為度蔓荊子散治大焦熱耳內生膿或耳鳴而聾回春蔓荊子升麻木通赤芍麥門冬去心炙甘草生地前胡赤苓桑白皮蜜水炒甘菊花各等分上銼一劑生薑三片棗二枚水煎食後服蔞貝養榮湯痰涎湧甚胸膈不清者宜之溫疫知母天花粉貝母瓜蔞實橘紅白芍紫蘇子水薑煎服潰堅湯治五積六聚諸般癥瘕痃癖血塊之總司也回春當歸白朮去蘆半夏薑炒陳皮枳實麩炒砂仁香附子山楂肉厚朴薑炒木香各等分上銼一劑薑一片水煎磨木香調服十六畫橘皮湯乾嘔噦若手足厥者主之金匱橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈橘皮湯治肺熱氣上咳息奔喘方千金橘皮麻黃各三兩柴胡乾紫蘇刪繁作干藍各三兩宿薑杏仁各四兩石膏八兩上七味㕮咀以水九升煮麻黃兩沸去沫下諸藥煮取三升去滓分三服不差與兩劑橘皮湯療妊娠嘔吐不下食同上橘皮竹茹人參白朮各十八銖生薑一兩厚朴十二銖上六味㕮咀以水七升煮取二升半分三服不差重作橘皮湯治飲酒過度酒毒積在腸胃或嘔吐不食渴多引飲聖濟陳橘皮湯浸去白炒葛根銼甘草炙銼石膏打碎各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候橘皮大黃朴硝方鱠食之在心胸間不化吐復不出速下除之久成症病治之方金匱橘皮一兩大黃二兩朴硝二兩上三味以水一大升煮至小升頓服即消橘皮枳實生薑湯胸痹胸中氣塞短氣茯苓杏仁甘草湯主之此湯亦主之同上肘後千金曰治胸痹胸中愊愊如滿噎食習習如癢喉中澀唾吐澡沫同上橘皮一斤枳實三兩生薑半斤上三味以水五升煮取二升分溫再服橘皮竹茹湯噦逆者主之同上橘皮二斤竹茹二斤大棗三十枚生薑汁半斤甘草五兩人參一兩上六味以水一升煮取三升溫服一升日三服濟生方無大棗有枇杷葉麥門冬半夏茯苓俱九味治胃熱多渴嘔噦不食霍亂轉筋洗方濟生方蓼一把去兩頭水三升煮取二升放溫重洗獨活湯治風腰腳疼痛不可忍足脛痛痹方聖濟獨活去蘆頭一分黃耆銼半兩防風去叉茯神去木桂去粗皮白蘚皮羚羊角鎊各一錢酸棗仁炒半兩桃仁去皮尖雙仁炒一兩上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服空心日午夜臥各一獨參湯治元氣虛弱惡寒發熱或作渴煩躁痰喘氣促或氣虛卒中不語口噤或痰涎上湧手足逆冷或婦人難産産後不醒喘急等證薛氏人參二兩上一味水煎人參性寒故薑佐之如不應急用參附湯聖濟録治胃寒氣滿不能轉化易飢不能食者方人參末二錢生附子末半錢生薑二錢水七合煎二合雞子清一枚打轉空心服之獨活寄生湯夫腰背痛者皆由腎氣虛弱臥冷濕地當風得之不以速治能流入腳膝為偏枯冷痹緩弱疼重或腰痛攣腳重痹宜急服此方千金方獨活三兩寄生一作續斷杜仲牛膝細辛秦艽茯苓桂心防風芎藭乾地黃人參甘草當歸芍藥各二兩上十五味㕮咀以水一斗煮取三升分二服溫身勿冷風虛下利者除乾地黃服復取蒴藋葉火燎厚安席上及熱眠上冷復燎之冬月取根春取莖熬臥之佳其餘薄尉不及蒴藋蒸為愈也諸處風濕亦用此法新産竟或患腹痛不得轉動及腳腰攣痛不得屈伸痹弱者宜服此湯除風消血肘後有附子一枚無寄生人參甘草當歸危氏得效方去寄生芍藥用斷續名萬金湯治風補虛順榮衛通血脈並腰膝沉重緩弱無力及治手足風纍效血虛體弱加鹿茸肉蓯蓉各半兩獨活散治冷滯風氣攻刺腰胯疼痛聖惠方獨活一兩牛膝二兩附子炮一兩川芎桂心芍藥當歸各三分桃仁半兩上八味每三錢水一中盞薑半分煎六分食前溫服澤漆湯咳而脈浮者厚朴麻黃湯主之脈沉者此方主之金匱咳嗽半夏半升紫蘇五兩一作紫菀澤漆三斤以東流水五斗煮取一斗五升生薑五兩白前五兩甘草黃芩人參桂枝各三兩上九味㕮咀內澤漆汁中煮取五升溫服五合至夜盡澤瀉湯心下有支飲其人若冒眩者主之金匱痰飲澤瀉五兩術二兩上二味以水二升煮取一升分溫再服澤瀉散治妊娠氣壅身體腹脅浮腫喘急大便不通小便赤澀宜服準繩澤瀉木通桑白皮赤茯苓枳殼檳榔各一錢半上作一服水二鍾生薑五片煎至一鍾食前服龍膽湯治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣發熱大吐哯者若已能進哺中食不消壯熱及變蒸不解中客人鬼氣並諸驚癇方悉主之十歲已下小兒皆服之小兒龍膽湯第一是新出腹嬰兒方若日月長大者以次依此為例若必知客忤及有魃氣者可加人參當歸各加龍膽多少也一百日兒加三銖二百日兒加六銖一歲兒加半兩余藥準此千金龍膽鉤藤柴胡黃芩桔梗芍藥茯神甘草炙各六銖蜣螂二枚大黃一兩上十味㕮咀以水一升煮取五合為劑也服之如有節度藥有虛實虛藥宜足數合水也兒生一日至七日分一合為三服兒生八日至十五日分一合半為三服兒生十六日至二十日分二合為三服兒生二十日至三十日分三合為三服兒生三十日至四十日盡五合為三服皆得下即止勿再服也龍膽瀉肝湯治肝經濕熱玉莖患瘡或便毒懸癰小便赤澀或久潰爛不愈又治陰囊腫痛紅熱甚者並效正宗治婦人陰癃癢痛薛己龍膽草連翹生地黃澤瀉各一錢車前子木通歸尾山梔甘草黃連黃芩各五分大黃二錢便祕加水二鍾煎八分食前服導赤各半湯治患傷寒後心下不硬腹中不滿大小便如常身無寒熱漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思形如醉人庸醫不識而誤人者多不知熱傳手少陰心經心火上而逼肺金所以神昏名越經證無人知之六書黃連山梔黃芩滑石甘草知母犀角茯神麥門冬人參水二鍾薑棗煎之槌法加燈心一握龍眼肉十枚煎沸熱服壽世保元名瀉心導赤散無龍眼肉生用地黃汁三匕導痰湯治一切痰厥頭目旋運或痰飲留積不散胸膈痞塞脅肋脹滿頭痛吐逆喘急痰嗽涕唾稠黏坐臥不安飲食不思濟生方半夏湯洗七次四兩天南星炮去皮枳實去瓤麩炒赤茯苓去皮橘紅各一兩甘草炙半兩上㕮咀每服四錢水二盞薑十片煎八合溫服食後按百一選方無南星有桂又入門加香附子烏藥木香名順氣導痰湯又加黃芩黃連名清熱導痰湯又加羌活防風白朮名祛風導痰湯又加遠志菖蒲黃芩黃連硃砂名寧心導痰湯皆後世方名也頭風神方廣筆記土茯苓忌鐵四兩金銀花三錢蔓荊子一錢玄參八分防風一錢明天麻一錢辛荑川芎各五分黑豆四十九粒燈心二十撮芽茶五錢河水井水各一鍾半煎一鍾服頭風摩散金匱大附子一枚炮鹽等分上二味為散沐了以方寸匕已摩疾上令藥力行樺皮散治肺藏風毒遍身瘡疥及癮疹瘙癢瘙之成瘡又治頭上風刺及婦人粉刺局方荊芥杏仁去皮尖用水二碗於銅鍋內熬候減水一半急取出放令乾各二兩甘草炙半兩枳實去穰用炭火燒存性取出於濕紙上令冷樺皮燒灰稱各四兩上藥除杏仁外並搗羅為末卻將杏仁別研令極細次用諸藥末旋旋入研令勻每服二錢食後調下溫酒服日進三服瘡疥甚者每日頻服歷節諸風方療歷節諸風百節痠痛不可忍外臺松脂卅斤煉五十遍不能三十遍亦可用上一味以煉酥三升溫和脂三升熟攪令極調且空腹酒服方寸匕日三數食麵粥為佳慎魚腥生冷酢物果子一百日瘥積年患氣發作有時心腹絞痛忽然氣絶腹中堅實醫所不治復謂之蠱方千金方檳榔大者四十枚附子一枚半夏一升柴胡三兩生薑八兩橘皮甘草桂心當歸枳實各二兩上十味㕮咀以水一斗煮取三升分三服五日一劑服三劑永除根本錢氏白朮散治小兒脾胃久虛嘔吐泄瀉頻並不止津液枯竭煩渴多燥但欲飲水乳食不進羸困少力因而失治變成風癇不問陰陽虛實並宜服之同上白茯苓去皮人參去蘆白朮不見火藿香去土梗木香不見火甘草炙各一兩乾薑銼二兩上為粗末每服一錢水一小盞煎至半盞去滓通口服不拘時更量兒大小加減渴甚者並煎任意飲之燒褌散傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者主之傷寒取婦人中褌近陰處火燒作灰上薑水煎又小兒骨蒸勞熱肌瘦減食者每服一錢加小麥十七畫療冷氣兩肋脹滿痃氣不能食方外臺白朮枳實炙生薑茯苓各三兩人參桔梗各二兩桂心一兩半上七味切以水八升煮取二升五合去滓分溫三服如人行七八里久服療患氣兼水身面腫垂死長壽公姚僧垣處二方應手即差先服湯方同上桑白皮四兩橘皮二兩海藻三兩洗去咸郁李仁碎各四兩赤小豆一升上五味以水八升煮取二升半分三服甚效療水病方同上烏豆一大升粒小者桑白皮五升細切上二味以水五斗和煮可一斗汁濾去滓於銅器中重湯煎如餳可作丸即成所患人每服取利小便為度其小便復舊色身上腫除候體中熱煩即服之禁房勞及食死牛馬肉油膩麴酒等經數日得食羊頭肉兔肉水病忌食羊頭蹄此云得食恐誤也療水病身腫方鯉魚一頭極大者去頭尾及骨惟取肉上一味以水二斗赤小豆一升和魚肉者可取二升以上汁生布絞去滓頓服盡如不能盡分為二服後服溫暖服訖下利利盡即差忌牛肉白酒生冷麵豬魚油酪藥滓埋之勿令人食療腳氣滿小便少者方檳榔四十枚切大豆三升桑根白皮切二升上三味以水二斗煮取六升分六服間粥亦得若冷脹加吳茱萸二升生薑二兩用亦良療漆瘡方同上煮椒湯洗頻四五度又嚼糯米敷上干即易之頻四五度即差忌熱面肉飲酒薏苡附子敗醬散腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿主之金匱腸癰薏苡十分附子二分敗醬五分上三味杵為末取方寸匕以水二升煎減半頓服小便當下薏苡附子散胸痹緩急者主之同上胸痹薏苡十五兩大附子十枚焙上二味杵為末服方寸匕日三服薏苡仁散治腳氣痹攣煩疼掣痛行步不得氣滿心胸塞悶不得眠臥宜服聖惠方薏苡仁二兩地骨皮一兩五加皮二兩半制木通二兩木香三兩羚羊角節一兩牛膝一兩去苗上藥搗篩為散每服四錢以水一中盞煎至六分去滓不計時候溫服薏苡仁散治濕傷腎腎不養肝肝自生風遂成風濕流注四肢筋骨或入在肩髃肌肉疼痛漸入在指中本事方薏苡仁一兩當歸小川芎乾薑甘草各半兩官桂川烏茵芋人參羌活白朮麻黃獨活各半兩上為細末每服二錢空心臨臥酒調下日三服薑椒湯主胸中積聚痰飲飲食減少胃氣不足咳逆吐哯方外臺半夏三兩洗生薑汁七合桂心附子炮甘草炙茯苓桔梗各一兩蜀椒二合橘皮二兩切上九味切以水七升煮取二升半去滓內薑汁煎取四升半分三服服三劑佳若欲服大散並諸五石丸必先服此方及進黃耆丸輩必佳忌海藻菘菜羊肉餳生蔥豬肉冷水酢物薯蕷湯治中心驚悸而四肢緩頭面熱心胸痰滿頭目眩冒如欲搖動者千金薯蕷麥門冬人參各四兩生地黃前胡芍藥各八分枳實遠志生薑各三分茯苓茯神各六分半夏五分甘草黃芩竹葉各二分秫米三合上十六味㕮咀取江水高舉手揚三百九十下量取三斗煮米減一斗內半夏復減九升去滓下藥煮取四升分四服無江水處以千里東流水代之揚手令上頭也秦中無江水涇渭水可用薄荷湯痧有於暑者此方主之玉衡薄荷香薷連翹各一錢紫朴金銀花木通各七分水二鍾煎七分冷服十八畫瀉心湯本以下之故心下痞與此湯痞不解其人渴而口燥煩小便不利者五苓散主之傷寒太陽篇下心氣不足吐血衄血用此湯亦治霍亂金匱婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞此湯主之同上傷寒服湯藥下利不止心下痞硬服此湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復不止者當利其小便傷寒太陽治丈夫婦人三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩躁不美飲食下焦有熱小便赤澀大便祕結五藏俱熱即生痎癤瘡痍及治五般痔疾糞門腫痛或下鮮血方局方心氣不足吐血衄血胸脅刺脹同苓連煎服亦單為散水煎服本草百病主治大黃條下大黃二兩黃連黃芩各一兩上三味以水三升煮取一升頓服之瀉肝湯治眼赤漠漠不見物息肉生方千金柴胡芍藥大黃各四兩決明子澤瀉黃芩杏仁各三兩升麻枳實梔子仁竹葉各二兩上十一味㕮咀水九升煮取一升七合分三服熱多體壯加大黃一兩羸老去大黃加梔子仁五兩瀉白散治肺癰準繩治嗽喘脅痛滿氣促肺經溫熱等症肺火咳嗽之要方也玉機桑白皮炒二錢地骨皮甘草炙貝母去心紫菀桔梗炒當歸酒拌各半錢瓜蔞仁一錢半作一劑水一鍾薑三片煎八分食遠服瀉白消毒飲痘疹發熱之初多似傷寒惟麻疹則咳嗽噴嚏鼻流清涕眼泡腫其淚汪汪面浮腮赤或嘔惡或泄利或手掐眉目鼻面此為異耳輕者主之幼科準繩桑白皮地骨皮二味自採鮮者各三錢牛蒡子炒研荊芥穗各一錢半桔梗甘草各一錢浮萍曬乾二錢上為粗末每服三五錢水一盞煎六分濾清服瀉胃湯治牙痛如神回春當歸川芎芍藥生地黃黃連牡丹皮山梔子荊芥薄荷防風甘草上銼一劑水煎食遠頻服歸母苦參丸妊娠小便難飲食如故主之金匱當歸貝母苦參各四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸男子加滑石半兩歸脾湯治脾經失血少寐發熱盜汗或思慮傷脾不能攝血以致妄行或健忘怔忡驚悸不寐或心脾傷痛嗜臥少食或憂思傷脾血虛發熱或肢體作痛大便不調或婦人經候不準晡熱或瘰癧流注不能消散潰斂濟生方黃蓍人參白朮茯苓酸棗炒龍眼各二錢當歸遠志各一錢甘草炙木香各五分上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候本方無當歸遠志薛立齋加之又加柴胡梔子仁名加味歸脾湯前症兼熱者主之歸靈湯治楊梅瘡不問新久但元氣虛弱者宜此藥正宗川芎當歸白芍熟地米仁木瓜防己天花粉金銀花白蘚皮人參白朮各一錢甘草五分威靈仙六分土茯苓二兩牛膝下部加五分水三鍾煎二鍾二次量病上下食前後服之渣再煎八分服雞舌香散治男子女人陰陽不和藏府虛弱中膈氣滯宿寒留飲停積不消胸膈脹滿心脾引痛攻刺腹脅有妨飲食又治中酒吐酒停飲浸漬嘔逆噁心噫氣吞酸並皆治之局方天台烏去木肉桂去粗皮不見火香附子炮去毛赤芍藥高良薑去蘆頭用麻油炒各四兩一本作一兩甘草炙半兩上為細末每服二錢入鹽少許用沸湯點服不拘時候按此方諸書考之少丁香耳此無丁香雞舌者恐其諸功用同於丁香仍如犀角消毒之例也雞屎白散轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者主之金匱雞屎白上一味為散取方寸匕以水六合和溫服藍葉散治小兒月內發一切丹聖惠方藍葉一兩黃芩犀角大黃炒柴胡柏子各一兩升麻石膏各一分半甘草半分炙上每一錢水一小盞煎五分去滓下竹瀝半合更煎三四沸溫服轉胞不得小便主之方外臺雀矢半合車前子滑石各四兩通草芍藥各二兩上五味切以水七升煮取三升服五合日三先食服立愈斷利湯治心胸下伏水方千金半夏一升生薑五兩茯苓甘草龍骨各二兩附子一兩人參黃連各三兩大棗十二枚上九味㕮咀以水八升煮取三升分三服鯉魚湯治妊娠腹大胎間有水氣方千金鯉魚一頭二斤白朮生薑各五兩芍藥當歸各三兩茯苓四兩上六味㕮咀以水一斗二升先煮鯉魚澄清取八升內藥煎取三升分五服檳芍順氣湯下痢膿血更加發熱而渴心腹痞滿嘔而不食此疫痢兼證最為危急夫疫者胃家事也蓋疫邪傳胃十常八九既傳入胃必從下解疫邪不能自出必借大腸之氣傳送而下而疫方愈夫痢者大腸內事也大腸既病失其傳送之職故正糞不行純乎下痢膿血而已所以向來穀食停積在胃直須大腸邪氣退而胃氣通行正糞自此而下今大腸失職正糞尚不自行又何能與胃載毒而出毒既不前羈留在胃最能敗壞真氣在胃一日有一日之害一時有一時之害耗氣搏血神脫氣盡而死凡遇疫痢兼證者在痢尤為吃緊疫痢俱急者宜此方誠為一舉兩得此方專治下痢頻數裡急後重兼舌胎黃得疫之重症者檳榔芍藥枳實厚朴大黃生薑煎服檳榔散治脾寒飲食不消勞倦氣脹噫滿憂恚不樂方千金方檳榔八枚皮子兼用人參茯苓神麯厚朴麥蘗吳茱萸白朮各二兩上八味治下篩食後酒服方寸匕日再一方用橘皮一兩半檳榔湯治肝虛寒脅下痛脹滿氣急目昏濁視目不明同上檳榔十四枚附子七枚母薑七兩茯苓橘皮桂心各三兩桔梗白朮各四兩吳茱萸五兩上九味㕮咀以水九升煮取三升去滓溫服每服一升若氣喘者加芎藭三兩半夏四兩甘草二兩檳榔散治水腫準繩檳榔半兩另研末商陸生薑各一兩桑白皮一兩半甘草炙二錢半上除檳榔外水二大盞煎至一大盞去滓五更初作二服每服調檳榔二錢半服至平明當利如未利再服檳榔湯治一切腳痛順氣防壅濟生方檳榔香附橘皮紫蘇木瓜甘草炙各一兩上每四錢水一盞半薑五片煎八分溫服婦人腳氣多由血虛加當歸半兩室女腳氣多由血實加芍藥一兩半如大便結虛弱者加枳實壯盛者加大黃永類鈐方無五加皮俱六味名檳蘇散同治檳榔湯療心頭冷哽結痛下氣外臺檳榔十顆生薑青木香各三兩橘皮枳實炙甘草炙大黃各二兩上七味切以水六升煮取二升半絞去滓分溫三服服別人行四五里進一服取微利忌生菜熱面炙肉海藻菘菜等十九畫獺肝散肘後獺肝散冷勞又主鬼疰一門相染金匱獺肝一具上炙乾末之水服方寸匕日三服麗澤通氣湯治久風鼻塞醫通羌活獨活防風蒼朮去皮切麻油拌炒升麻葛根各八分麻黃連節四分川椒五分白芷錢半甘草炙七分生薑三片大蔥二枚擘蔥白三寸水煎食遠服冬月倍麻黃加細辛三分夏月去獨活加石膏三錢忌一切冷物及風涼處坐臥二十畫藿香正氣散治傷寒頭疼憎寒壯熱上喘咳嗽五勞七傷八般風痰五般膈氣心腹冷痛反胃嘔惡吐瀉霍亂藏腑虛鳴山嵐瘴瘧遍身虛腫婦人産前産後血氣刺痛小兒疳傷並皆治之局方大腹皮茯苓去皮白芷紫蘇去土各一兩陳橘皮去白桔梗白朮厚朴去粗皮薑汁製半夏曲甘草炙各二兩一本作二兩半藿香去土三兩上藥細末每服二錢水一盞薑三片棗一枚同煎至七分熱服如要出汗衣被蓋再煎並服藿香半夏散治胃虛中寒停痰留飲噦逆嘔吐胸滿噎痞短氣倦怠不入飲食同上藿香葉一兩丁香皮半兩半夏湯浸洗七次炒令微黃二兩上為散每服二錢水一盞生薑七片同煎至六分一本作七分去滓食前溫服藿仁養胃湯治胃虛不食四肢痿弱行立不能皆由陽明虛宗筋無所養遂成痿躄入門藿香烏藥白朮人參茯神茯苓半夏曲砂仁薏苡仁各一錢半蓽澄茄甘草各一錢薑棗煎服蘇子降氣湯治中脘不快心腹脹滿陰陽壅滯氣不升降胸膈噎塞喘促短氣乾噦煩滿咳嗽痰涎口中無味嗜臥減食宿寒留飲停積不消脅下支結常覺妨悶專治腳氣上衝心腹堅滿肢體浮腫有妨飲食局方治虛陽上攻氣不升降上盛下虛痰涎壅盛喘促短氣咳嗽回春治腳弱上氣昔宋湘東王在南洲患腳氣困篤服此湯大得力方千金方本名紫蘇子湯紫蘇子半夏各一升前胡厚朴甘草當歸各一兩橘皮三兩大棗二十枚桂心四兩生薑一兩上十味㕮咀以水一斗三升煮取三升半分為五服日三夜一蘇解散治痘初壯熱頭痛或腰痛腹痛作脹一切熱毒甚者保赤全書紫蘇乾葛防風荊芥白芷蟬退紫草升麻牛蒡子木通甘草上各等分加燈心七根蔥白七莖水煎熱服蘇恭防己湯主通身體滿小便澀上氣下痰水不能食食則脹者方外臺桑白皮五兩大豆五升以水二斗並桑白皮煮取一斗去滓防己橘皮赤茯苓麻黃去節各三兩生薑五兩旋覆花一兩杏仁八十枚紫蘇莖葉二兩切上十味切以前件藥汁煮取三升去滓分為三服力弱者分為五服相去六七里久微覆當汗小便利腫氣消下冷多加茱萸四兩熱多加玄參四兩忌酢物礬石湯治腳氣衝心金匱中風礬石二兩上一味以漿水一斗五升煎三五沸浸腳良礬石丸婦人經水閉不利藏堅癖不止中有乾血下白物主之金匱雜病礬石一分燒杏仁一分上二味末之煉蜜和丸棗核大內藏中劇者再內之嚴氏玄胡索湯治婦人室女七情傷感遂使血與氣並心腹作痛或連腰脅或引背膂上下攻刺甚作搐搦經候不調但是一切血氣疼痛並可服之濟生方當歸炒玄胡炒芍藥蒲黃炒桂枝各半兩薑黃乳香沒藥木香各半兩甘草各二錢半上每四錢水一盞半薑七片煎七分食前溫服吐逆嘔加半夏陳皮各半兩蘆根湯風毒腳氣昏煩壯熱頭疼嘔吐口乾外臺蘆根生半兩赤茯苓葛根知母淡竹葉麥門冬三錢炙甘草五錢上七味粗搗篩每服五錢匕用水一盞半煎至八分去滓食後溫服近晚再服二十一畫攝生飲治一切卒中不論中風中寒中暑中濕及痰厥氣厥之類不省人事初作即用此方無熱者用此回春南星濕紙裹煨半夏薑湯洗木香各一錢半蒼朮生細辛石菖蒲甘草生各一錢上以水二升煎取一升去渣溫服鐵刷湯治男子脾積心氣痛婦人血氣刺痛及治中酒惡心一切瘧痢氣疾腸風下血臟毒滑泄瀉局方蒼朮八兩米浸一宿良薑六兩油炒茴香炒二兩甘草炙八兩半上為細末每服二錢生薑三片鹽一捻水一盞煎至七分溫服或用熱酒調下亦得如脾寒用酒一盞煎臨發時連進三服兼治四方之人不伏水土小兒臟寒脫肛並用薑三片棗子一枚煎服如冒狀暑熱擦生薑冷水調下若行路早起棗子一個去核包藥少許同生薑三片嚼下能闢四時非節疫癘瘴氣等疾續斷丸治風濕四肢浮腫肌肉麻痹甚則手足無力筋脈緩急本事方續斷萆薢當歸炒附子炮防風天麻各一兩乳香研沒藥各半兩川芎三分上為細末蜜丸梧子大酒或飲下食前服二十二畫缺二十三畫驚悸丸治驚憂積氣心受風邪發則牙關緊急涎潮昏塞醒則精神若癡本事方附子炮去皮臍南木香白殭蠶去絲嘴炒花蛇酒浸去皮骨炒橘紅天麻去蘆麻黃去根節各半兩乾蠍一兩去毒紫蘇子一兩淘洗天南星洗浸薄切生薑汁浸一夕半兩硃砂水飛一分留少許作衣上為末入研腦麝少許同研極勻煉蜜杵丸如龍眼大每服一粒金銀薄荷湯化下溫酒亦得蠲痹湯治身體煩重背項拘急或痛或重舉動艱難及手足冷痹腳腿沉重筋脈無力濟生方當歸去蘆酒浸赤芍藥黃耆去苗片子薑黃羌活各一兩半甘草炙半兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至八分去滓溫服不拘時候二十四畫鱉甲煎丸病瘧以月一日發當以十五日愈設不差當月盡解如其不差當云何師曰此結為癥瘕名為瘧母急治之金匱瘧鱉甲十二分炙烏扇三分燒黃芩三分柴胡六分鼠婦三分熬乾薑三分大黃三分芍藥五分桂枝三分葶藶一分熬石葦三分去毛厚朴三分牡丹五分去心瞿麥二分阿膠三分炙紫葳三分半夏三分人參一分蟅蟲五分熬蜂窠四分炙赤硝十二分蜣螂六分熬桃仁二分上二十三味為末取鍛灶下灰一斗清酒一斛五升浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥煎為丸如梧子大空心服七丸日三服鱉甲散治勞黃手足煩熱肢節疼痛小腹拘急時有虛汗聖惠方鱉甲一兩半酢炙柴胡茵陳地骨皮赤芍藥黃耆梔子麥門冬各三兩上八味每三錢以水一中盞煎六分溫服
